<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Calendar</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendar">
<meta name="theme-color" content="#050507">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050507; --surface:#101014; --surface-2:#1C1C22; --surface-3:#24242C;
  --border:rgba(255,255,255,0.09); --border-2:rgba(255,255,255,0.14);
  --text:#FFFFFF; --text-mid:rgba(255,255,255,0.75); --text-dim:rgba(255,255,255,0.55); --text-fade:rgba(255,255,255,0.35);
  --accent:#FF8A3D;
  --accent-bg:rgba(255,138,61,0.14);
  --accent-soft:rgba(255,138,61,0.08);
  --ok:#30D158; --ok-bg:rgba(48,209,88,0.12);
  --warn:#FFD60A; --warn-bg:rgba(255,214,10,0.12);
  --block:#FF453A; --block-bg:rgba(255,69,58,0.12);
  --done:#5AC8FA; --done-bg:rgba(90,200,250,0.12);

  --c-party:#FF8A3D;
  --c-date:#FF453A;
  --c-event:#BF5AF2;
  --c-appt:#5AC8FA;
  --c-work:#6E7074;
  --c-other:#FFD60A;

  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
  --radius:14px;
  --radius-sm:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{padding:16px 14px 120px}
@media(min-width:900px){body{padding:24px 32px 140px}}

/* ============ HEADER ============ */
.hero{
  max-width:1180px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 18px 16px;position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 400px 200px at 85% -20%,var(--accent-soft),transparent);pointer-events:none}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}
.hero-title{font-size:24px;font-weight:900;letter-spacing:-0.03em}
.hero-sub{font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.hero-stats{display:flex;gap:16px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;gap:2px;min-width:0}
.hero-stat-val{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1}
.hero-stat-val.accent{color:var(--accent)}
.hero-stat-lbl{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}

.hero-actions{display:flex;gap:8px;flex-shrink:0}
.icon-btn{
  width:40px;height:40px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text-mid);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--font);font-weight:700;
}
.icon-btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-2)}
.icon-btn.primary{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.icon-btn.primary:hover{background:#ffa15e}

/* ============ TOOLBAR ============ */
.toolbar{
  max-width:1180px;margin:0 auto 14px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:8px 14px;font-size:12px;font-weight:700;
  color:var(--text-mid);cursor:pointer;transition:all 0.15s;
  letter-spacing:0.02em;display:inline-flex;align-items:center;gap:6px;
}
.chip:hover{background:var(--surface-2);color:var(--text)}
.chip.active{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6}
.chip .count{opacity:0.65;font-weight:600;font-size:11px}
.chip.active .count{opacity:0.9}

.sync-banner{
  max-width:1180px;margin:0 auto 14px;
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);padding:12px 14px;
  display:flex;align-items:center;gap:12px;font-size:13px;
}
.sync-banner.ok{border-left-color:var(--ok)}
.sync-banner.warn{border-left-color:var(--warn)}
.sync-banner-msg{flex:1;color:var(--text-mid);font-weight:600}
.sync-banner a{color:var(--accent);font-weight:700;text-decoration:none}
.sync-banner a:hover{text-decoration:underline}
.sync-banner-btn{
  background:var(--accent);color:#0a0a0f;border:none;
  padding:6px 12px;border-radius:8px;font-family:var(--font);
  font-weight:800;font-size:12px;cursor:pointer;letter-spacing:0.02em;
}
.sync-banner-btn:hover{background:#ffa15e}
.sync-banner-btn.ghost{background:var(--surface-2);color:var(--text-mid);border:1px solid var(--border)}
.sync-banner-btn.ghost:hover{background:var(--surface-3);color:var(--text)}

/* ============ HORIZON SECTIONS ============ */
.horizon{max-width:1180px;margin:0 auto}
.h-group{margin-bottom:22px}
.h-group-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  margin:0 2px 10px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.h-group-title{font-size:14px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--text)}
.h-group-sub{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:0.04em}

.day-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:8px;transition:border-color 0.15s;
  display:grid;grid-template-columns:56px 44px 1fr;gap:12px;align-items:start;
}
.day-row:hover{border-color:var(--border-2)}
.day-row.today{border-color:var(--accent);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,138,61,0.04) 100%)}
.day-row.weekend{background:linear-gradient(135deg,var(--surface) 0%,rgba(90,200,250,0.03) 100%)}
.day-row.has-priority{border-left:3px solid var(--accent);padding-left:11px}

.day-date{text-align:center}
.day-dow{font-size:10px;font-weight:800;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase}
.day-num{font-size:22px;font-weight:900;letter-spacing:-0.03em;line-height:1;margin-top:2px}
.day-row.today .day-num{color:var(--accent)}
.day-row.weekend .day-dow{color:var(--done)}

.day-density{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px;
}
.density-bar{
  width:6px;border-radius:3px;background:var(--surface-3);
  min-height:8px;transition:background 0.2s;
}
.density-bar.fill-1{height:14px;background:var(--ok)}
.density-bar.fill-2{height:26px;background:var(--warn)}
.density-bar.fill-3{height:40px;background:var(--accent)}
.density-bar.fill-4{height:56px;background:var(--block)}
.density-count{font-size:10px;font-weight:800;color:var(--text-dim);letter-spacing:0.04em}

.day-events{display:flex;flex-direction:column;gap:6px;min-width:0}
.event-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:10px;padding:8px 10px;
  transition:all 0.15s;cursor:pointer;min-width:0;
}
.event-pill:hover{background:var(--surface-3);border-color:var(--border-2)}
.event-pill.priority{
  background:linear-gradient(135deg,var(--surface-2) 0%,rgba(255,138,61,0.12) 100%);
  border-color:rgba(255,138,61,0.35);
}
.event-cat{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:20px}
.event-cat.cat-party{background:var(--c-party)}
.event-cat.cat-date{background:var(--c-date)}
.event-cat.cat-event{background:var(--c-event)}
.event-cat.cat-appt{background:var(--c-appt)}
.event-cat.cat-work{background:var(--c-work)}
.event-cat.cat-other{background:var(--c-other)}
.event-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.event-title{font-size:14px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-meta{font-size:11px;color:var(--text-dim);font-weight:600;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.event-meta .sep{color:var(--text-fade)}
.event-src{
  font-size:9px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
  background:var(--surface-3);color:var(--text-dim);
}
.event-src.gcal{background:rgba(90,200,250,0.15);color:var(--done)}
.event-actions{display:flex;gap:4px;flex-shrink:0}
.star-btn{
  width:32px;height:32px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-fade);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--font);
}
.star-btn:hover{background:var(--surface-3);color:var(--accent)}
.star-btn.on{background:var(--accent-bg);color:var(--accent);border-color:rgba(255,138,61,0.35)}
.del-btn{
  width:32px;height:32px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-fade);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.del-btn:hover{background:var(--block-bg);color:var(--block);border-color:rgba(255,69,58,0.35)}

.empty-horizon{
  text-align:center;padding:60px 20px;color:var(--text-dim);
  background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);
}
.empty-horizon-title{font-size:18px;font-weight:800;color:var(--text-mid);margin-bottom:8px}
.empty-horizon-msg{font-size:13px;line-height:1.5;max-width:340px;margin:0 auto}

/* ============ MODAL ============ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  padding:60px 16px 16px;overflow-y:auto;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius);
  width:100%;max-width:460px;padding:22px;position:relative;
}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-0.02em;margin-bottom:16px}
.modal-close{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text-mid);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;
  padding:10px 12px;border-radius:10px;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-picker{display:flex;flex-wrap:wrap;gap:6px}
.cat-opt{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface-2);font-size:12px;font-weight:700;cursor:pointer;
  color:var(--text-mid);transition:all 0.15s;display:flex;align-items:center;gap:6px;
}
.cat-opt .swatch{width:8px;height:8px;border-radius:50%}
.cat-opt.on{border-color:var(--accent);color:var(--text);background:var(--accent-bg)}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border-radius:10px;border:1px solid var(--border);cursor:pointer}
.checkbox-row input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.checkbox-row label{font-size:13px;font-weight:700;color:var(--text);margin:0;cursor:pointer;text-transform:none;letter-spacing:0}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn{
  flex:1;padding:12px;border-radius:10px;border:none;
  font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;
  letter-spacing:0.01em;transition:all 0.15s;
}
.btn.primary{background:var(--accent);color:#0a0a0f}
.btn.primary:hover{background:#ffa15e}
.btn.ghost{background:var(--surface-2);color:var(--text-mid);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--surface-3);color:var(--text)}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;
  padding:10px 16px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none;transition:all 0.2s;z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* embedded mode (inside daily-planner iframe) */
body.embed{padding-top:14px}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-row">
    <div>
      <div class="hero-title">Calendar</div>
      <div class="hero-sub" id="heroSub">Horizon view</div>
    </div>
    <div class="hero-actions">
      <button class="icon-btn" id="syncBtn" title="Sync Google Calendar">&#8635;</button>
      <button class="icon-btn primary" id="addBtn" title="Add event">+</button>
    </div>
  </div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-val accent" id="statPriority">0</div>
      <div class="hero-stat-lbl">Priority ahead</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statNext">—</div>
      <div class="hero-stat-lbl">Next priority in</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statBusy">0</div>
      <div class="hero-stat-lbl">Busy days ahead</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statTotal">0</div>
      <div class="hero-stat-lbl">Total events</div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar" id="filterBar"></div>

<!-- SYNC STATUS -->
<div id="syncBanner"></div>

<!-- HORIZON -->
<div class="horizon" id="horizon"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add event</div>
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="field">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Event title" autocomplete="off">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fDate">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Start time</label>
        <input type="time" id="fStart">
      </div>
      <div class="field">
        <label>End time</label>
        <input type="time" id="fEnd">
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="cat-picker" id="fCatPicker"></div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Optional notes"></textarea>
    </div>
    <div class="field">
      <div class="checkbox-row" id="fPriorityRow">
        <input type="checkbox" id="fPriority">
        <label for="fPriority">Mark as priority</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="btnCancel">Cancel</button>
      <button class="btn ghost" id="btnDelete" style="display:none;color:#FF453A">Delete</button>
      <button class="btn primary" id="btnSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONSTANTS ============ */
const MANUAL_KEY='calendar-events-v1';
const GCAL_PRI_KEY='calendar-gcal-priority-v1';
const GCAL_CACHE_KEY='calendar-gcal-cache-v1';
const FILTER_KEY='calendar-filter-v1';

const CATEGORIES=[
  {id:'party',label:'Party',color:'#FF8A3D'},
  {id:'date',label:'Date',color:'#FF453A'},
  {id:'event',label:'Event',color:'#BF5AF2'},
  {id:'appt',label:'Appt',color:'#5AC8FA'},
  {id:'work',label:'Work',color:'#6E7074'},
  {id:'other',label:'Other',color:'#FFD60A'},
];

const PARAMS=new URLSearchParams(location.search);
const EMBED=PARAMS.get('embed')==='1';
if(EMBED) document.body.classList.add('embed');

/* ============ STATE ============ */
let state={
  manual:[],       // manual events from localStorage
  gcal:[],         // live GCal events
  gcalPriority:{}, // map of gcal event id -> true
  filter:'all',    // 'all' | 'priority' | category id
  syncStatus:'idle',// idle | syncing | connected | needs_auth | error
  syncedAt:null,
  lastError:null,
  editingId:null,  // manual event id being edited
  modalCat:'event',
};

/* ============ STORAGE ============ */
function loadManual(){
  try{
    const r=JSON.parse(localStorage.getItem(MANUAL_KEY)||'null');
    return Array.isArray(r?.events)?r.events:[];
  }catch(e){return[]}
}
function saveManual(){
  localStorage.setItem(MANUAL_KEY,JSON.stringify({events:state.manual}));
}
function loadGcalPriority(){
  try{return JSON.parse(localStorage.getItem(GCAL_PRI_KEY)||'{}')}catch(e){return{}}
}
function saveGcalPriority(){
  localStorage.setItem(GCAL_PRI_KEY,JSON.stringify(state.gcalPriority));
}
function loadGcalCache(){
  try{
    const r=JSON.parse(localStorage.getItem(GCAL_CACHE_KEY)||'null');
    if(r && r.events && r.syncedAt){
      state.gcal=r.events;
      state.syncedAt=r.syncedAt;
    }
  }catch(e){}
}
function saveGcalCache(){
  localStorage.setItem(GCAL_CACHE_KEY,JSON.stringify({events:state.gcal,syncedAt:state.syncedAt}));
}
function loadFilter(){
  return localStorage.getItem(FILTER_KEY)||'all';
}
function saveFilter(){
  localStorage.setItem(FILTER_KEY,state.filter);
}

/* ============ DATE HELPERS (Chicago) ============ */
function todayCT(){
  const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const y=parts.find(p=>p.type==='year').value;
  const m=parts.find(p=>p.type==='month').value;
  const d=parts.find(p=>p.type==='day').value;
  return `${y}-${m}-${d}`;
}
function dateFromKey(k){
  // parse YYYY-MM-DD as local date
  const [y,m,d]=k.split('-').map(Number);
  return new Date(y,m-1,d);
}
function keyFromDate(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function daysBetween(fromKey,toKey){
  const a=dateFromKey(fromKey);
  const b=dateFromKey(toKey);
  return Math.round((b-a)/86400000);
}
function dayOfWeek(key){
  const d=dateFromKey(key);
  return d.getDay();
}
function isWeekend(key){
  const dow=dayOfWeek(key);
  return dow===0||dow===6;
}
function formatDow(key){
  const d=dateFromKey(key);
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function formatDayNum(key){
  const d=dateFromKey(key);
  return d.getDate();
}
function formatDateLabel(key){
  const d=dateFromKey(key);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function formatMonthLabel(key){
  const d=dateFromKey(key);
  return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function formatTime12(hhmm){
  if(!hhmm) return '';
  const [h,m]=hhmm.split(':').map(Number);
  const h12=h===0?12:h>12?h-12:h;
  const ap=h>=12?'PM':'AM';
  return m===0?`${h12} ${ap}`:`${h12}:${String(m).padStart(2,'0')} ${ap}`;
}

/* ============ UNIFIED EVENT LIST ============ */
// Normalizes manual + gcal into { id, source, title, date, start, end, category, priority, location, notes }
function unified(){
  const today=todayCT();
  const out=[];

  for(const e of state.manual){
    if(!e||!e.date) continue;
    if(e.date<today) continue;
    out.push({
      id:e.id, source:'manual', title:e.title||'(untitled)',
      date:e.date, start:e.start||'', end:e.end||'',
      category:e.category||'other', priority:!!e.priority,
      location:'', notes:e.notes||'', _ref:e,
    });
  }

  for(const g of state.gcal){
    if(!g||!g.date) continue;
    if(g.date<today) continue;
    const pri=!!state.gcalPriority[g.id];
    out.push({
      id:g.id, source:'gcal', title:g.summary||'(untitled)',
      date:g.date, start:g.start||'', end:g.end||'',
      category:g.category||'event', priority:pri,
      location:g.location||'', notes:'',
      cal:g.cal||'', allDay:!!g.allDay,
      timeStr:g.timeStr||'',
    });
  }

  // sort by date, then start time
  out.sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    const as=a.start||(a.allDay?'00:00':'99:99');
    const bs=b.start||(b.allDay?'00:00':'99:99');
    return as<bs?-1:as>bs?1:0;
  });

  return out;
}

/* ============ FILTER ============ */
function applyFilter(list){
  if(state.filter==='all') return list;
  if(state.filter==='priority') return list.filter(e=>e.priority);
  return list.filter(e=>e.category===state.filter);
}

/* ============ HORIZON GROUPING ============ */
// Non-empty groups only, so lone event 6 weeks out still surfaces.
function groupByHorizon(list){
  const today=todayCT();
  const groups={};
  for(const e of list){
    const d=daysBetween(today,e.date);
    let key;
    if(d<0) continue;
    else if(d===0) key='TODAY';
    else if(d<=1) key='TOMORROW';
    else if(d<=6) key='THIS WEEK';
    else if(d<=13) key='NEXT WEEK';
    else if(d<=27) key='IN 2–4 WEEKS';
    else if(d<=55) key='IN 1–2 MONTHS';
    else key='LATER';
    if(!groups[key]) groups[key]={events:[],days:new Set()};
    groups[key].events.push(e);
    groups[key].days.add(e.date);
  }
  const order=['TODAY','TOMORROW','THIS WEEK','NEXT WEEK','IN 2–4 WEEKS','IN 1–2 MONTHS','LATER'];
  return order.filter(k=>groups[k]).map(k=>({key:k,events:groups[k].events,dayCount:groups[k].days.size}));
}

function groupEventsByDay(events){
  const map={};
  for(const e of events){
    if(!map[e.date]) map[e.date]=[];
    map[e.date].push(e);
  }
  return Object.entries(map).map(([date,evs])=>({date,events:evs}));
}

/* ============ RENDERERS ============ */
function densityClass(count,hasPriority){
  if(hasPriority && count<=1) return 'fill-2';
  if(count===0) return '';
  if(count===1) return 'fill-1';
  if(count===2) return 'fill-2';
  if(count===3) return 'fill-3';
  return 'fill-4';
}

function renderStats(){
  const list=unified();
  const today=todayCT();
  const priorityEvents=list.filter(e=>e.priority);
  const busyDays=new Set(list.map(e=>e.date)).size;

  document.getElementById('statPriority').textContent=priorityEvents.length;
  document.getElementById('statTotal').textContent=list.length;
  document.getElementById('statBusy').textContent=busyDays;

  if(priorityEvents.length){
    const next=priorityEvents[0];
    const diff=daysBetween(today,next.date);
    let label;
    if(diff===0) label='Today';
    else if(diff===1) label='Tomorrow';
    else if(diff<7) label=`${diff} days`;
    else if(diff<14) label='1 week';
    else if(diff<28) label=`${Math.round(diff/7)} weeks`;
    else label=`${Math.round(diff/30)} mo`;
    document.getElementById('statNext').textContent=label;
  }else{
    document.getElementById('statNext').textContent='—';
  }

  const sub=state.syncedAt
    ? `Synced ${new Date(state.syncedAt).toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit'}).toLowerCase()}`
    : 'Horizon view';
  document.getElementById('heroSub').textContent=sub;
}

function renderFilterBar(){
  const list=unified();
  const counts={all:list.length,priority:list.filter(e=>e.priority).length};
  for(const c of CATEGORIES) counts[c.id]=list.filter(e=>e.category===c.id).length;

  const chips=[
    {id:'all',label:'All',color:null},
    {id:'priority',label:'★ Priority',color:null},
    ...CATEGORIES.map(c=>({id:c.id,label:c.label,color:c.color})),
  ];

  const bar=document.getElementById('filterBar');
  bar.innerHTML=chips.map(c=>{
    const n=counts[c.id]||0;
    if(c.id!=='all' && c.id!=='priority' && n===0) return '';
    const active=state.filter===c.id?'active':'';
    const dot=c.color?`<span class="dot" style="background:${c.color}"></span>`:'';
    return `<div class="chip ${active}" data-f="${c.id}">${dot}${c.label}<span class="count">${n}</span></div>`;
  }).join('');

  bar.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{
      state.filter=ch.dataset.f;
      saveFilter();
      render();
    };
  });
}

function renderSyncBanner(){
  const el=document.getElementById('syncBanner');
  if(state.syncStatus==='needs_auth'){
    el.innerHTML=`<div class="sync-banner warn"><div class="sync-banner-msg">Connect Google Calendar to see parties, dates, and events pulled in automatically.</div><a href="/api/google-auth"><button class="sync-banner-btn">Connect</button></a></div>`;
  }else if(state.syncStatus==='syncing'){
    el.innerHTML=`<div class="sync-banner"><div class="sync-banner-msg">Syncing Google Calendar…</div></div>`;
  }else if(state.syncStatus==='error'){
    el.innerHTML=`<div class="sync-banner warn"><div class="sync-banner-msg">Sync issue: ${escapeHTML(state.lastError||'unknown error')}</div><button class="sync-banner-btn ghost" onclick="syncNow()">Retry</button></div>`;
  }else{
    el.innerHTML='';
  }
}

function renderHorizon(){
  const container=document.getElementById('horizon');
  const list=applyFilter(unified());

  if(!list.length){
    const msg=state.filter==='all'
      ? 'No events ahead. Hit + to add one, or sync Google Calendar.'
      : state.filter==='priority'
        ? 'No priority events ahead. Star an event to pin it here.'
        : 'No events in this category.';
    container.innerHTML=`<div class="empty-horizon"><div class="empty-horizon-title">Clear horizon</div><div class="empty-horizon-msg">${msg}</div></div>`;
    return;
  }

  const groups=groupByHorizon(list);
  const today=todayCT();

  container.innerHTML=groups.map(g=>{
    const days=groupEventsByDay(g.events);
    const dayHTML=days.map(({date,events})=>renderDayRow(date,events,today)).join('');
    const sub=g.events.length===1?'1 event':`${g.events.length} events · ${g.dayCount} ${g.dayCount===1?'day':'days'}`;
    return `<div class="h-group"><div class="h-group-head"><div class="h-group-title">${g.key}</div><div class="h-group-sub">${sub}</div></div>${dayHTML}</div>`;
  }).join('');

  // wire up event handlers
  container.querySelectorAll('.star-btn').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();toggleStar(b.dataset.src,b.dataset.id)};
  });
  container.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();deleteEvent(b.dataset.id)};
  });
  container.querySelectorAll('.event-pill').forEach(p=>{
    p.onclick=()=>{
      if(p.dataset.src==='manual') openModal(p.dataset.id);
    };
  });
}

function renderDayRow(date,events,today){
  const hasPriority=events.some(e=>e.priority);
  const isToday=date===today;
  const weekend=isWeekend(date);
  const cls=['day-row'];
  if(isToday) cls.push('today');
  if(weekend) cls.push('weekend');
  if(hasPriority) cls.push('has-priority');

  const dClass=densityClass(events.length,hasPriority);

  const eventsHTML=events.map(e=>renderEventPill(e)).join('');

  return `<div class="${cls.join(' ')}">
    <div class="day-date">
      <div class="day-dow">${formatDow(date)}</div>
      <div class="day-num">${formatDayNum(date)}</div>
    </div>
    <div class="day-density">
      <div class="density-bar ${dClass}"></div>
      <div class="density-count">${events.length}</div>
    </div>
    <div class="day-events">${eventsHTML}</div>
  </div>`;
}

function renderEventPill(e){
  const cls=['event-pill'];
  if(e.priority) cls.push('priority');
  const timeStr=e.allDay||(!e.start&&e.source==='manual')
    ? 'All day'
    : e.source==='gcal' && e.timeStr
      ? e.timeStr
      : e.start
        ? (e.end?`${formatTime12(e.start)} – ${formatTime12(e.end)}`:formatTime12(e.start))
        : '';
  const metaBits=[];
  if(timeStr) metaBits.push(`<span>${escapeHTML(timeStr)}</span>`);
  if(e.location) metaBits.push(`<span class="sep">·</span><span>${escapeHTML(e.location)}</span>`);
  if(e.cal && e.source==='gcal') metaBits.push(`<span class="sep">·</span><span>${escapeHTML(e.cal)}</span>`);
  const srcBadge=e.source==='gcal'?`<span class="event-src gcal">GCal</span>`:'';
  const delBtn=e.source==='manual'?`<button class="del-btn" data-id="${escapeAttr(e.id)}" title="Delete">&times;</button>`:'';
  const starOn=e.priority?'on':'';
  return `<div class="${cls.join(' ')}" data-src="${e.source}" data-id="${escapeAttr(e.id)}">
    <div class="event-cat cat-${e.category}"></div>
    <div class="event-body">
      <div class="event-title">${escapeHTML(e.title)}</div>
      <div class="event-meta">${srcBadge}${metaBits.join('')}</div>
    </div>
    <div class="event-actions">
      <button class="star-btn ${starOn}" data-src="${e.source}" data-id="${escapeAttr(e.id)}" title="Toggle priority">${e.priority?'★':'☆'}</button>
      ${delBtn}
    </div>
  </div>`;
}

function render(){
  renderStats();
  renderFilterBar();
  renderSyncBanner();
  renderHorizon();
}

/* ============ ACTIONS ============ */
function toggleStar(source,id){
  if(source==='manual'){
    const e=state.manual.find(x=>x.id===id);
    if(!e) return;
    e.priority=!e.priority;
    saveManual();
  }else{
    state.gcalPriority[id]=!state.gcalPriority[id];
    if(!state.gcalPriority[id]) delete state.gcalPriority[id];
    saveGcalPriority();
  }
  render();
}

function deleteEvent(id){
  const e=state.manual.find(x=>x.id===id);
  if(!e) return;
  if(!confirm(`Delete "${e.title}"?`)) return;
  state.manual=state.manual.filter(x=>x.id!==id);
  saveManual();
  showToast('Event deleted');
  render();
}

/* ============ MODAL ============ */
function openModal(id){
  state.editingId=id||null;
  const mb=document.getElementById('modalBg');
  const title=document.getElementById('modalTitle');
  const delBtn=document.getElementById('btnDelete');

  if(id){
    const e=state.manual.find(x=>x.id===id);
    if(!e) return;
    title.textContent='Edit event';
    delBtn.style.display='';
    document.getElementById('fTitle').value=e.title||'';
    document.getElementById('fDate').value=e.date||'';
    document.getElementById('fStart').value=e.start||'';
    document.getElementById('fEnd').value=e.end||'';
    document.getElementById('fNotes').value=e.notes||'';
    document.getElementById('fPriority').checked=!!e.priority;
    state.modalCat=e.category||'event';
  }else{
    title.textContent='Add event';
    delBtn.style.display='none';
    document.getElementById('fTitle').value='';
    document.getElementById('fDate').value=todayCT();
    document.getElementById('fStart').value='';
    document.getElementById('fEnd').value='';
    document.getElementById('fNotes').value='';
    document.getElementById('fPriority').checked=true;
    state.modalCat='event';
  }
  renderCatPicker();
  mb.classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),50);
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  state.editingId=null;
}

function renderCatPicker(){
  const el=document.getElementById('fCatPicker');
  el.innerHTML=CATEGORIES.map(c=>{
    const on=state.modalCat===c.id?'on':'';
    return `<div class="cat-opt ${on}" data-c="${c.id}"><span class="swatch" style="background:${c.color}"></span>${c.label}</div>`;
  }).join('');
  el.querySelectorAll('.cat-opt').forEach(opt=>{
    opt.onclick=()=>{state.modalCat=opt.dataset.c;renderCatPicker();};
  });
}

function saveEvent(){
  const title=document.getElementById('fTitle').value.trim();
  const date=document.getElementById('fDate').value;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const notes=document.getElementById('fNotes').value.trim();
  const priority=document.getElementById('fPriority').checked;
  if(!title){showToast('Title required');return}
  if(!date){showToast('Date required');return}
  if(state.editingId){
    const e=state.manual.find(x=>x.id===state.editingId);
    if(e){
      e.title=title;e.date=date;e.start=start;e.end=end;
      e.notes=notes;e.priority=priority;e.category=state.modalCat;
    }
  }else{
    state.manual.push({
      id:'m-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      title,date,start,end,notes,priority,category:state.modalCat,
    });
  }
  saveManual();
  closeModal();
  showToast('Saved');
  render();
}

function deleteFromModal(){
  if(!state.editingId) return;
  const e=state.manual.find(x=>x.id===state.editingId);
  if(!e) return;
  if(!confirm(`Delete "${e.title}"?`)) return;
  state.manual=state.manual.filter(x=>x.id!==state.editingId);
  saveManual();
  closeModal();
  showToast('Deleted');
  render();
}

/* ============ GOOGLE CALENDAR SYNC ============ */
// Maps GCal summary to category. Heuristic only — user can still manually categorize via priority flags.
function categorizeGcal(summary,location){
  const s=(summary||'').toLowerCase();
  const l=(location||'').toLowerCase();
  if(/party|birthday|celebration|wedding|cocktail|mixer|bash/.test(s)) return 'party';
  if(/date|dinner with|drinks with/.test(s)) return 'date';
  if(/appt|appointment|doctor|dentist|checkup|medical|haircut|barber/.test(s)) return 'appt';
  if(/sync|standup|stand-up|1:1|1on1|retro|planning|review|sprint|demo|call with|meeting|interview/.test(s)) return 'work';
  if(/show|concert|festival|game|match|trip|flight|vacation|brunch|lunch|hangout/.test(s)) return 'event';
  return 'other';
}

// Convert "6 PM - 7 PM" style time string to first time as HH:mm
function parseGcalTime(timeStr){
  if(!timeStr || timeStr==='All day') return {start:'',end:'',timeStr:timeStr||''};
  const m=timeStr.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*-\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if(!m) return {start:'',end:'',timeStr};
  const to24=(h,mm,ap)=>{
    let H=parseInt(h,10)%12;
    if(ap.toUpperCase()==='PM') H+=12;
    return `${String(H).padStart(2,'0')}:${mm||'00'}`;
  };
  return {start:to24(m[1],m[2],m[3]),end:to24(m[4],m[5],m[6]),timeStr};
}

function dateFromStartISO(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
    const y=parts.find(p=>p.type==='year').value;
    const m=parts.find(p=>p.type==='month').value;
    const day=parts.find(p=>p.type==='day').value;
    return `${y}-${m}-${day}`;
  }catch(e){return ''}
}

async function syncNow(){
  state.syncStatus='syncing';state.lastError=null;
  renderSyncBanner();
  try{
    const r=await fetch('/api/calendar',{credentials:'same-origin'});
    if(r.status===401){state.syncStatus='needs_auth';renderSyncBanner();return}
    if(r.status===412){state.syncStatus='needs_auth';renderSyncBanner();return}
    if(!r.ok){
      const txt=await r.text().catch(()=>String(r.status));
      throw new Error(txt||`HTTP ${r.status}`);
    }
    const data=await r.json();
    const byDate=data.by_date||{};
    const events=[];
    for(const [dk,items] of Object.entries(byDate)){
      for(const it of items){
        const t=parseGcalTime(it.time);
        const d=it.startISO?dateFromStartISO(it.startISO):dk;
        events.push({
          id:String(it.id||`${dk}-${events.length}`),
          summary:it.summary||'(untitled)',
          date:d,
          start:t.start,
          end:t.end,
          timeStr:it.time||'',
          location:it.location||'',
          cal:it.cal||'',
          allDay:!!it.allDay,
          category:categorizeGcal(it.summary,it.location),
        });
      }
    }
    state.gcal=events;
    state.syncedAt=data.synced_at||new Date().toISOString();
    state.syncStatus='connected';
    saveGcalCache();
    showToast(`Synced ${events.length} events`);
    render();
  }catch(e){
    console.error('sync failed',e);
    state.syncStatus='error';
    state.lastError=e.message||String(e);
    render();
  }
}

/* ============ UTIL ============ */
function escapeHTML(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return escapeHTML(s)}
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ============ INIT ============ */
function init(){
  state.manual=loadManual();
  state.gcalPriority=loadGcalPriority();
  state.filter=loadFilter();
  loadGcalCache();
  render();

  document.getElementById('addBtn').onclick=()=>openModal(null);
  document.getElementById('syncBtn').onclick=syncNow;
  document.getElementById('modalClose').onclick=closeModal;
  document.getElementById('btnCancel').onclick=closeModal;
  document.getElementById('btnSave').onclick=saveEvent;
  document.getElementById('btnDelete').onclick=deleteFromModal;
  document.getElementById('modalBg').addEventListener('click',(e)=>{if(e.target.id==='modalBg')closeModal()});
  document.addEventListener('keydown',(e)=>{if(e.key==='Escape')closeModal()});

  // Auto-sync on load if we've synced before OR if fresh session
  syncNow();
}

document.addEventListener('DOMContentLoaded',init);
</script>
