<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Calendar</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendar">
<meta name="theme-color" content="#F5F1E8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* Warm paper — matches goal-board for easy reading */
  --bg:#F5F1E8; --surface:#FFFFFF; --surface-2:#EDE7D7; --surface-3:#E4DCC8;
  --border:rgba(60,60,67,0.14); --border-2:rgba(60,60,67,0.22);
  --text:#1C1C1E; --text-mid:rgba(60,60,67,0.72); --text-dim:rgba(60,60,67,0.52); --text-fade:rgba(60,60,67,0.36);
  --accent:#FF8A3D;
  --accent-bg:rgba(255,138,61,0.14);
  --accent-soft:rgba(255,138,61,0.08);
  --ok:#16A34A; --ok-bg:rgba(22,163,74,0.12);
  --warn:#D97706; --warn-bg:rgba(217,119,6,0.14);
  --block:#DC2626; --block-bg:rgba(220,38,38,0.12);
  --done:#0284C7; --done-bg:rgba(2,132,199,0.12);

  --c-party:#E06610;
  --c-date:#DC2626;
  --c-event:#9333EA;
  --c-appt:#0284C7;
  --c-work:#4B5563;
  --c-other:#D97706;

  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
  --radius:14px;
  --radius-sm:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{padding:16px 14px 120px}
@media(min-width:900px){body{padding:24px 32px 140px}}

/* ============ HEADER ============ */
.hero{
  max-width:1320px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 18px 16px;position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 400px 200px at 85% -20%,var(--accent-soft),transparent);pointer-events:none}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}
.hero-title{font-size:24px;font-weight:900;letter-spacing:-0.03em}
.hero-sub{font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.hero-stats{display:flex;gap:16px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;gap:2px;min-width:0}
.hero-stat-val{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1}
.hero-stat-val.accent{color:var(--accent)}
.hero-stat-lbl{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}

.hero-actions{display:flex;gap:8px;flex-shrink:0}
.icon-btn{
  width:40px;height:40px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text-mid);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--font);font-weight:700;
}
.icon-btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-2)}
.icon-btn.primary{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.icon-btn.primary:hover{background:#ffa15e}

/* ============ TOOLBAR ============ */
.toolbar{
  max-width:1320px;margin:0 auto 14px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:8px 14px;font-size:12px;font-weight:700;
  color:var(--text-mid);cursor:pointer;transition:all 0.15s;
  letter-spacing:0.02em;display:inline-flex;align-items:center;gap:6px;
}
.chip:hover{background:var(--surface-2);color:var(--text)}
.chip.active{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6}
.chip .count{opacity:0.65;font-weight:600;font-size:11px}
.chip.active .count{opacity:0.9}

.sync-banner{
  max-width:1320px;margin:0 auto 14px;
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);padding:12px 14px;
  display:flex;align-items:center;gap:12px;font-size:13px;
}
.sync-banner.ok{border-left-color:var(--ok)}
.sync-banner.warn{border-left-color:var(--warn)}
.sync-banner-msg{flex:1;color:var(--text-mid);font-weight:600}
.sync-banner a{color:var(--accent);font-weight:700;text-decoration:none}
.sync-banner a:hover{text-decoration:underline}
.sync-banner-btn{
  background:var(--accent);color:#0a0a0f;border:none;
  padding:6px 12px;border-radius:8px;font-family:var(--font);
  font-weight:800;font-size:12px;cursor:pointer;letter-spacing:0.02em;
}
.sync-banner-btn:hover{background:#ffa15e}
.sync-banner-btn.ghost{background:var(--surface-2);color:var(--text-mid);border:1px solid var(--border)}
.sync-banner-btn.ghost:hover{background:var(--surface-3);color:var(--text)}

/* ============ VIEW SWITCHER ============ */
.view-switch{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.view-switch .view-btn{
  padding:7px 14px;border:none;background:none;color:var(--text-dim);font-family:var(--font);
  font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  border-radius:7px;cursor:pointer;transition:all .12s;
}
.view-switch .view-btn:hover{color:var(--text)}
.view-switch .view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(60,60,67,0.08)}

/* ============ MONTH VIEW ============ */
.month-view{max-width:1320px;margin:0 auto;padding:2px 2px 12px}
.month-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
.month-title{font-size:18px;font-weight:800;letter-spacing:-0.02em;color:var(--text);flex:1;min-width:0}
.month-nav-btn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-family:var(--font);
}
.month-nav-btn:hover{background:var(--surface-2);border-color:var(--text-mid)}
.month-today-btn{
  padding:0 12px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-mid);font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;font-family:var(--font);
  transition:all .12s;
}
.month-today-btn:hover{background:var(--surface-2);color:var(--text)}
.month-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;
  font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);
}
.month-weekdays > div{text-align:center;padding:2px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;grid-auto-rows:minmax(0,1fr)}
.month-cell{
  min-height:0;height:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:4px 6px 5px;display:flex;flex-direction:column;gap:2px;overflow:hidden;
  transition:all .12s;
}
.month-cell.other{background:transparent;border-color:transparent}
.month-cell.other .mc-num{color:var(--text-fade)}
.month-cell.weekend{background:linear-gradient(135deg,var(--surface) 0%,rgba(2,132,199,0.04) 100%)}
.month-cell.today{
  background:linear-gradient(135deg,#FFF5EC 0%,rgba(255,138,61,0.18) 100%);
  border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent) inset,0 2px 8px rgba(255,138,61,0.18);
}
.month-cell.today.weekend{background:linear-gradient(135deg,#FFF5EC 0%,rgba(255,138,61,0.18) 100%)}
.month-cell.has-priority{border-color:rgba(255,138,61,0.5)}
.mc-head{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-shrink:0}
.mc-num{font-size:12px;font-weight:700;color:var(--text);line-height:1}
.month-cell.today .mc-num{color:var(--accent);font-weight:900;font-size:14px;letter-spacing:-0.03em}
.month-cell.today .mc-num::after{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:4px;vertical-align:middle;box-shadow:0 0 0 2px rgba(255,138,61,0.25)}
.mc-count{font-size:9px;font-weight:800;color:var(--text-dim);letter-spacing:.4px;text-transform:uppercase;line-height:1}
.mc-events{display:flex;flex-direction:column;gap:2px;min-width:0;overflow:hidden;flex:1 1 auto}
.mc-pill{
  display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text);
  padding:1px 5px;border-radius:4px;background:var(--surface-2);cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;line-height:1.25;
  transition:all .1s;flex-shrink:0;
}
.mc-pill:hover{background:var(--surface-3)}
.mc-pill.priority{background:rgba(255,138,61,0.14);color:var(--accent)}
.mc-pill .mc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mc-pill .mc-txt{overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.mc-more{
  font-size:9px;font-weight:800;color:var(--accent);padding:1px 4px;letter-spacing:.2px;line-height:1.2;
  flex-shrink:0;cursor:pointer;border-radius:4px;background:rgba(255,138,61,0.08);
  align-self:flex-start;transition:all .12s;
}
.mc-more:hover{background:rgba(255,138,61,0.18);color:#0a0a0f}
.month-cell{cursor:pointer}
.month-cell.other{cursor:default}
.month-empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px}

/* ============ DAY MODAL ============ */
.day-modal{max-width:480px}
.day-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;margin-top:4px}
.day-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .12s;min-width:0;
}
.day-item:hover{background:var(--surface-3);border-color:var(--border-2)}
.day-item.priority{border-color:rgba(255,138,61,0.45);background:#FFF5EC}
.day-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px}
.day-item-body{flex:1;min-width:0}
.day-item-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.3;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis}
.day-item-meta{font-size:11px;color:var(--text-dim);font-weight:600;display:flex;gap:8px;flex-wrap:wrap}
.day-item-meta .sep{color:var(--text-fade)}
.day-empty{text-align:center;padding:32px 16px;color:var(--text-dim);font-size:13px}
/* Month grid fits available vertical space on desktop */
@media(min-width:900px){
  .month-grid{height:calc(100dvh - 220px);min-height:460px;max-height:720px}
}

@media(max-width:760px){
  .month-view{padding:2px 0 60px}
  .month-header{gap:6px;margin-bottom:10px}
  .month-title{font-size:17px}
  .month-nav-btn{width:32px;height:32px;font-size:14px;border-radius:8px}
  .month-today-btn{padding:0 10px;height:32px;font-size:10px;border-radius:8px}
  .month-weekdays{gap:3px;font-size:9px;letter-spacing:.8px;margin-bottom:4px}
  .month-grid{gap:3px;height:auto;max-height:none;grid-auto-rows:auto}
  .month-cell{min-height:72px;height:auto;padding:4px 4px;gap:2px;border-radius:7px}
  .mc-num{font-size:11px}
  .mc-count{font-size:8px}
  .mc-pill{font-size:9px;padding:1px 4px;gap:3px;border-radius:4px}
  .mc-pill .mc-dot{width:4px;height:4px}
  .view-switch .view-btn{padding:6px 10px;font-size:11px}
}

/* ============ HORIZON SECTIONS ============ */
/* Flat auto-fill grid — days flow left-to-right, section heads span full row */
.horizon{
  max-width:none;margin:0;
  display:grid;grid-template-columns:1fr;gap:8px;
  align-items:start;
}
@media(min-width:720px){
  .horizon{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  /* On desktop, day cards already show their own date header — suppress the
     horizon section dividers so days pack tightly across the grid. */
  .h-group-head{display:none}
}
.h-group{display:contents}
.h-group-days{display:contents}
.h-group-head{
  grid-column:1 / -1;
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  margin:10px 2px 2px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.h-group:first-child .h-group-head{margin-top:0}
.h-group-title-wrap{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;min-width:0}
.h-group-title{font-size:13px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--text)}
.h-group-range{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:0.01em;text-transform:none}
.h-group-sub{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:0.04em;flex-shrink:0}

.day-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 13px;transition:border-color 0.15s,box-shadow 0.15s;
  display:flex;flex-direction:column;gap:8px;min-width:0;
  box-shadow:0 1px 2px rgba(60,60,67,0.04);
}
.day-row:hover{border-color:var(--border-2);box-shadow:0 2px 8px rgba(60,60,67,0.08)}
.day-row.today{border-color:var(--accent);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,138,61,0.06) 100%)}
.day-row.weekend{background:linear-gradient(135deg,var(--surface) 0%,rgba(2,132,199,0.04) 100%)}
.day-row.has-priority{border-left:3px solid var(--accent);padding-left:13px}

.day-head{display:flex;align-items:center;gap:10px;min-width:0}
.day-date{display:flex;align-items:baseline;gap:6px;min-width:0;flex:1}
.day-dow{font-size:10px;font-weight:800;letter-spacing:0.12em;color:var(--text-dim);text-transform:uppercase}
.day-num{font-size:18px;font-weight:900;letter-spacing:-0.03em;line-height:1}
.day-mo{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:0.02em;text-transform:uppercase}
.day-row.today .day-num{color:var(--accent)}
.day-row.weekend .day-dow{color:var(--done)}

.day-density-inline{display:flex;align-items:center;gap:6px;flex-shrink:0}
.density-dot{width:8px;height:8px;border-radius:50%;background:var(--surface-3)}
.density-dot.fill-1{background:var(--ok)}
.density-dot.fill-2{background:var(--warn)}
.density-dot.fill-3{background:var(--accent)}
.density-dot.fill-4{background:var(--block)}
.density-count{font-size:11px;font-weight:800;color:var(--text-dim);letter-spacing:0.04em}

.day-events{display:flex;flex-direction:column;gap:8px;min-width:0}
.event-pill{
  display:flex;align-items:center;gap:9px;
  background:#FBF7EE;border:1px solid rgba(60,60,67,0.12);
  border-radius:9px;padding:8px 10px;
  transition:all 0.15s;cursor:pointer;min-width:0;
}
.event-pill:hover{background:#FFFFFF;border-color:rgba(60,60,67,0.22);box-shadow:0 1px 3px rgba(60,60,67,0.06)}
.event-pill.priority{
  background:#FFF5EC;
  border-color:rgba(255,138,61,0.45);
}
.event-cat{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:20px}
.event-cat.cat-party{background:var(--c-party)}
.event-cat.cat-date{background:var(--c-date)}
.event-cat.cat-event{background:var(--c-event)}
.event-cat.cat-appt{background:var(--c-appt)}
.event-cat.cat-work{background:var(--c-work)}
.event-cat.cat-other{background:var(--c-other)}
.event-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.event-title{font-size:15px;font-weight:700;letter-spacing:-0.01em;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;padding:1px 4px;margin-left:-4px;border-radius:4px}
.event-title:hover{background:rgba(60,60,67,0.06)}
.event-title.editing{background:rgba(60,60,67,0.08);outline:1px solid var(--accent)}
.event-title input{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:14px;font-weight:700;
  letter-spacing:-0.01em;padding:0;
}
.event-edited-mark{font-size:9px;color:var(--text-fade);margin-left:4px;font-weight:700;letter-spacing:0.04em}
.event-meta{font-size:11px;color:var(--text-dim);font-weight:600;display:flex;gap:8px;align-items:center;flex-wrap:nowrap;overflow:hidden;white-space:nowrap;min-width:0}
.event-meta .sep{color:var(--text-fade);flex-shrink:0}
.event-meta .event-loc{overflow:hidden;text-overflow:ellipsis;min-width:0;max-width:100%}
.event-meta > span:not(.sep):not(.event-src):not(.event-notes-dot){overflow:hidden;text-overflow:ellipsis;min-width:0}
.event-src{
  font-size:9px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
  background:var(--surface-3);color:var(--text-dim);
}
.event-src.gcal{background:rgba(2,132,199,0.14);color:var(--done)}
.event-notes-dot{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:5px;
  background:rgba(255,255,255,0.08);color:var(--text-mid);
  flex-shrink:0;transition:all 0.15s;
}
.event-notes-dot.mine{background:var(--accent-bg);color:var(--accent)}
.event-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.join-btn{
  height:32px;padding:0 12px;border-radius:8px;
  background:var(--accent);color:#1C1C1E;
  font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  text-decoration:none;border:1px solid rgba(0,0,0,0.08);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--font);
  box-shadow:0 1px 2px rgba(60,60,67,0.08);
}
.join-btn:hover{filter:brightness(1.06);box-shadow:0 2px 6px rgba(255,138,61,0.32)}
.join-btn:active{transform:translateY(1px)}
.star-btn{
  width:32px;height:32px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-fade);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--font);
}
.star-btn:hover{background:var(--surface-3);color:var(--accent)}
.star-btn.on{background:var(--accent-bg);color:var(--accent);border-color:rgba(255,138,61,0.35)}
.del-btn{
  width:32px;height:32px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-fade);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.del-btn:hover{background:var(--block-bg);color:var(--block);border-color:rgba(255,69,58,0.35)}

.empty-horizon{
  grid-column:1 / -1;
  text-align:center;padding:60px 20px;color:var(--text-dim);
  background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);
}
.empty-horizon-title{font-size:18px;font-weight:800;color:var(--text-mid);margin-bottom:8px}
.empty-horizon-msg{font-size:13px;line-height:1.5;max-width:340px;margin:0 auto}

/* ============ MODAL ============ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  padding:60px 16px 16px;overflow-y:auto;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius);
  width:100%;max-width:460px;padding:22px;position:relative;
}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-0.02em;margin-bottom:16px}
.modal-close{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text-mid);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;
  padding:10px 12px;border-radius:10px;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-picker{display:flex;flex-wrap:wrap;gap:6px}
.loc-row{display:flex;gap:8px;align-items:stretch}
.loc-row input{flex:1}
.loc-maps-btn{flex:0 0 auto;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;height:auto}
.event-loc{color:inherit;text-decoration:underline;text-decoration-color:var(--text-fade);text-underline-offset:2px;transition:color 0.15s}
.event-loc:hover{color:var(--accent);text-decoration-color:var(--accent)}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px 12px;margin:-4px 0 14px;font-size:12px;font-weight:700;color:var(--text-mid)}
.detail-meta .bit{display:inline-flex;align-items:center;gap:4px}
.detail-loc{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.detail-loc .loc-text{flex:1;min-width:0;font-size:14px;font-weight:600;color:var(--text)}
.detail-desc{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;color:var(--text-mid);white-space:pre-wrap;max-height:220px;overflow:auto}
.detail-desc a{color:var(--accent);text-decoration:underline}
.cat-opt{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface-2);font-size:12px;font-weight:700;cursor:pointer;
  color:var(--text-mid);transition:all 0.15s;display:flex;align-items:center;gap:6px;
}
.cat-opt .swatch{width:8px;height:8px;border-radius:50%}
.cat-opt.on{border-color:var(--accent);color:var(--text);background:var(--accent-bg)}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border-radius:10px;border:1px solid var(--border);cursor:pointer}
.checkbox-row input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.checkbox-row label{font-size:13px;font-weight:700;color:var(--text);margin:0;cursor:pointer;text-transform:none;letter-spacing:0}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn{
  flex:1;padding:12px;border-radius:10px;border:none;
  font-family:var(--font);font-weight:800;font-size:14px;cursor:pointer;
  letter-spacing:0.01em;transition:all 0.15s;
}
.btn.primary{background:var(--accent);color:#0a0a0f}
.btn.primary:hover{background:#ffa15e}
.btn.ghost{background:var(--surface-2);color:var(--text-mid);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--surface-3);color:var(--text)}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;
  padding:10px 16px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none;transition:all 0.2s;z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* embedded mode (inside daily-planner iframe) */
body.embed{padding-top:14px}

/* ============ MOBILE POLISH ============ */
@media(max-width:640px){
  body{padding:8px 10px 120px}

  /* Collapse hero — events show immediately, stats swipe-row below */
  .hero{padding:10px 12px;border-radius:10px;margin-bottom:8px}
  .hero-title{font-size:16px}
  .hero-sub{font-size:9px;letter-spacing:0.08em}
  .hero-actions{gap:5px}
  .icon-btn{width:32px;height:32px;font-size:14px;border-radius:8px}

  /* Stats become a tight horizontal-swipe strip instead of 2x2 grid */
  .hero-stats{
    display:flex;gap:8px;margin-top:10px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
    scroll-snap-type:x mandatory;padding-bottom:2px;
  }
  .hero-stats::-webkit-scrollbar{display:none}
  .hero-stat{min-width:32vw;flex-shrink:0;scroll-snap-align:start;padding:0 2px}
  .hero-stat-val{font-size:16px}
  .hero-stat-lbl{font-size:9px;letter-spacing:0.06em;white-space:nowrap}

  .toolbar{gap:6px;margin-bottom:12px}
  .chip{padding:6px 11px;font-size:11px;gap:5px}
  .chip .count{font-size:10px}
  .chip .dot{width:5px;height:5px}

  .sync-banner{flex-wrap:wrap;padding:10px 12px;gap:8px;font-size:12px}
  .sync-banner-msg{flex:1 1 100%}
  .sync-banner-btn{padding:6px 11px}

  .h-group{margin-bottom:18px}
  .h-group-head{margin-bottom:8px;padding-bottom:6px;gap:6px;flex-wrap:wrap}
  .h-group-title{font-size:12px}
  .h-group-range{font-size:11px}
  .h-group-sub{font-size:10px;width:100%}

  .day-row{padding:10px;border-radius:12px;gap:7px}
  .day-row.has-priority{padding-left:7px}
  .day-head{gap:8px}
  .day-num{font-size:17px}
  .day-dow{font-size:10px;letter-spacing:0.1em}
  .day-mo{font-size:10px}

  .event-pill{padding:6px 8px;gap:6px;border-radius:9px}
  .event-cat{width:3px;min-height:16px}
  .event-body{gap:1px}
  .event-title{font-size:13px;padding:0 2px;margin-left:-2px}
  .event-title input{font-size:13px}
  .event-meta{font-size:10px;gap:5px}
  .event-meta .event-cal-wrap{display:none}
  .event-meta .event-loc-wrap{min-width:0;overflow:hidden;flex:1 1 auto}
  .event-meta .event-loc{max-width:100%}
  .event-src{display:none}
  .event-edited-mark{font-size:8px}
  .event-actions{gap:3px}
  .star-btn,.del-btn{width:30px;height:30px;font-size:14px;border-radius:7px}

  .modal{padding:18px;border-radius:12px}
  .modal-title{font-size:16px}
  .field input,.field select,.field textarea{font-size:14px;padding:9px 11px}
  .field-row{gap:8px}

  .empty-horizon{padding:40px 16px}
  .empty-horizon-title{font-size:16px}
  .empty-horizon-msg{font-size:12px}
}

/* very narrow — iPhone SE and similar */
@media(max-width:380px){
  .hero-title{font-size:18px}
  .hero-stats{gap:8px 10px}
  .hero-stat-val{font-size:16px}
  .chip{padding:6px 9px;font-size:11px}
  .event-meta{flex-wrap:wrap}
  .icon-btn{width:34px;height:34px;font-size:15px}
}

/* ============ TWO-COLUMN LAYOUT (desktop) ============ */
@media(min-width:900px){
  body{padding:20px 28px;max-width:none;margin:0}
  .cal-layout{
    display:grid;grid-template-columns:220px 1fr;gap:22px;
    align-items:start;
  }
  .cal-sidebar-pane{
    position:sticky;top:20px;
    display:flex;flex-direction:column;gap:10px;
    max-height:calc(100vh - 40px);overflow-y:auto;
    padding-right:4px;
  }
  .cal-sidebar-pane .hero{margin:0;padding:14px 14px 12px}
  .cal-sidebar-pane .hero-title{font-size:18px}
  /* Stats stack vertically: label on left, value on right */
  .cal-sidebar-pane .hero-stats{
    display:flex;flex-direction:column;gap:8px;margin-top:12px;
  }
  .cal-sidebar-pane .hero-stat{
    display:flex;flex-direction:row-reverse;align-items:center;justify-content:space-between;
    min-width:0;padding:8px 10px;border-radius:8px;background:var(--surface-2);
  }
  .cal-sidebar-pane .hero-stat-val{font-size:17px}
  .cal-sidebar-pane .hero-stat-lbl{font-size:9.5px;letter-spacing:0.07em;white-space:normal}
  /* Filter chips stack vertically */
  .cal-sidebar-pane .toolbar{margin:0;flex-direction:column;align-items:stretch;gap:6px}
  .cal-sidebar-pane .toolbar .chip{
    justify-content:flex-start;padding:8px 12px;border-radius:8px;font-size:12px;
  }
  .cal-sidebar-pane .toolbar .chip .count{margin-left:auto}
  .cal-main{min-width:0;width:100%}
  .cal-main .horizon{max-width:none;margin:0}
  .cal-main .month-view{max-width:none;margin:0;width:100%}
}
body.embed .cal-layout{display:block}
body.embed .cal-sidebar-pane{position:static;max-height:none;overflow:visible}
@media(min-width:900px){
  body.embed{padding:0}
  body.embed .cal-layout{display:grid}
}
</style>
</head>
<body>

<div class="cal-layout">
<aside class="cal-sidebar-pane">

<!-- HERO -->
<div class="hero">
  <div class="hero-row">
    <div>
      <div class="hero-title">Calendar</div>
      <div class="hero-sub" id="heroSub">Horizon view</div>
    </div>
    <div class="hero-actions">
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      <button class="icon-btn" id="syncBtn" title="Sync Google Calendar">&#8635;</button>
      <button class="icon-btn primary" id="addBtn" title="Add event">+</button>
    </div>
  </div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-val accent" id="statPriority">0</div>
      <div class="hero-stat-lbl">Priority ahead</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statNext">—</div>
      <div class="hero-stat-lbl">Next priority in</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statBusy">0</div>
      <div class="hero-stat-lbl">Busy days ahead</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="statTotal">0</div>
      <div class="hero-stat-lbl">Total events</div>
    </div>
  </div>
</div>

<!-- VIEW SWITCH -->
<div class="view-switch" role="tablist" aria-label="Calendar view">
  <button class="view-btn active" id="viewHorizonBtn" role="tab" aria-selected="true">Horizon</button>
  <button class="view-btn" id="viewMonthBtn" role="tab" aria-selected="false">Month</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar" id="filterBar"></div>

<!-- SYNC STATUS -->
<div id="syncBanner"></div>

</aside>
<main class="cal-main">

<!-- HORIZON -->
<div class="horizon" id="horizon"></div>

<!-- MONTH VIEW -->
<div class="month-view" id="monthView" style="display:none">
  <div class="month-header">
    <button class="month-nav-btn" id="monthPrev" title="Previous month">&lsaquo;</button>
    <div class="month-title" id="monthTitle">—</div>
    <button class="month-nav-btn" id="monthNext" title="Next month">&rsaquo;</button>
    <button class="month-today-btn" id="monthToday" title="Jump to today">Today</button>
  </div>
  <div class="month-weekdays">
    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>
  <div class="month-grid" id="monthGrid"></div>
</div>

</main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add event</div>
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="field">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Event title" autocomplete="off">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fDate">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Start time</label>
        <input type="time" id="fStart">
      </div>
      <div class="field">
        <label>End time</label>
        <input type="time" id="fEnd">
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="cat-picker" id="fCatPicker"></div>
    </div>
    <div class="field">
      <label>Location</label>
      <div class="loc-row">
        <input type="text" id="fLocation" placeholder="Address or place" autocomplete="off">
        <a id="fLocationMaps" class="btn ghost loc-maps-btn" target="_blank" rel="noopener" style="display:none">Maps</a>
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Optional notes"></textarea>
    </div>
    <div class="field">
      <div class="checkbox-row" id="fPriorityRow">
        <input type="checkbox" id="fPriority">
        <label for="fPriority">Mark as priority</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="btnCancel">Cancel</button>
      <button class="btn ghost" id="btnDelete" style="display:none;color:#FF453A">Delete</button>
      <button class="btn primary" id="btnSave">Save</button>
    </div>
  </div>
</div>

<!-- GCAL DETAIL MODAL -->
<div class="modal-bg" id="detailBg">
  <div class="modal">
    <div class="field" style="margin-bottom:10px">
      <label>Title</label>
      <input type="text" id="detailTitle" placeholder="Event title">
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-weight:600">Renames are saved locally and restore if Google updates the event.</div>
    </div>
    <button class="modal-close" id="detailClose">&times;</button>
    <div class="detail-meta" id="detailMeta"></div>
    <a class="btn primary join-btn" id="detailJoin" href="#" target="_blank" rel="noopener" style="display:none;margin-bottom:10px;text-decoration:none;text-align:center">Join meeting</a>
    <div class="field" id="detailLocField" style="display:none">
      <label>Location</label>
      <div class="detail-loc" id="detailLoc"></div>
    </div>
    <div class="field" id="detailDescField" style="display:none">
      <label>Description</label>
      <div class="detail-desc" id="detailDesc"></div>
    </div>
    <div class="field">
      <label>My notes</label>
      <textarea id="detailNotes" placeholder="Add your own notes (saved on this device)"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="detailCancel">Close</button>
      <button class="btn primary" id="detailSave">Save</button>
    </div>
  </div>
</div>

<!-- DAY EVENTS MODAL -->
<div class="modal-bg" id="dayBg">
  <div class="modal day-modal">
    <div class="modal-title" id="dayTitle">Day</div>
    <button class="modal-close" id="dayClose">&times;</button>
    <div class="day-list" id="dayList"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settingsBg">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <button class="modal-close" id="settingsClose">&times;</button>
    <div class="field">
      <label>Timezone</label>
      <select id="fTz"></select>
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-weight:600" id="fTzHint"></div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="btnSettingsCancel">Cancel</button>
      <button class="btn primary" id="btnSettingsSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONSTANTS ============ */
const MANUAL_KEY='calendar-events-v1';
const GCAL_PRI_KEY='calendar-gcal-priority-v1';
const GCAL_TITLE_KEY='calendar-gcal-titles-v1';
const GCAL_NOTES_KEY='calendar-gcal-notes-v1';
const GCAL_CACHE_KEY='calendar-gcal-cache-v1';
const FILTER_KEY='calendar-filter-v1';
const TIMEZONE_KEY='calendar-tz-v1';
const DEFAULT_TZ='America/Chicago';

const TIMEZONES=[
  {id:'America/Chicago',label:'Central — Chicago (CT)'},
  {id:'America/New_York',label:'Eastern — New York (ET)'},
  {id:'America/Denver',label:'Mountain — Denver (MT)'},
  {id:'America/Los_Angeles',label:'Pacific — Los Angeles (PT)'},
  {id:'America/Phoenix',label:'Arizona (MST no DST)'},
  {id:'America/Anchorage',label:'Alaska (AKT)'},
  {id:'Pacific/Honolulu',label:'Hawaii (HST)'},
  {id:'UTC',label:'UTC'},
  {id:'Europe/London',label:'London (GMT/BST)'},
  {id:'Europe/Paris',label:'Paris (CET/CEST)'},
];

const CATEGORIES=[
  {id:'party',label:'Party',color:'#FF8A3D'},
  {id:'date',label:'Date',color:'#FF453A'},
  {id:'event',label:'Event',color:'#BF5AF2'},
  {id:'appt',label:'Appt',color:'#5AC8FA'},
  {id:'work',label:'Work',color:'#6E7074'},
  {id:'other',label:'Other',color:'#FFD60A'},
];

const PARAMS=new URLSearchParams(location.search);
const EMBED=PARAMS.get('embed')==='1';
if(EMBED) document.body.classList.add('embed');

/* ============ STATE ============ */
let state={
  manual:[],       // manual events from localStorage
  gcal:[],         // live GCal events
  gcalPriority:{}, // map of gcal event id -> true
  gcalTitles:{},   // map of gcal event id -> overridden title
  gcalNotes:{},    // map of gcal event id -> user-added notes
  filter:'priority',// 'all' | 'priority' | 'manual' | calendar label (Personal/TWEG/Partiful)
  syncStatus:'idle',// idle | syncing | connected | needs_auth | error
  syncedAt:null,
  lastError:null,
  editingId:null,  // manual event id being edited
  detailId:null,   // gcal event id open in detail modal
  modalCat:'event',
  tz:DEFAULT_TZ,
  view:'horizon',  // 'horizon' | 'month'
  monthCursor:null,// 'YYYY-MM' currently viewed in month view
};
const VIEW_KEY='calendar-view-v1';
const MONTH_CURSOR_KEY='calendar-month-cursor-v1';
function loadView(){try{return localStorage.getItem(VIEW_KEY)||'horizon'}catch(e){return'horizon'}}
function saveView(){try{localStorage.setItem(VIEW_KEY,state.view)}catch(e){}}
function loadMonthCursor(){try{return localStorage.getItem(MONTH_CURSOR_KEY)||null}catch(e){return null}}
function saveMonthCursor(){try{if(state.monthCursor)localStorage.setItem(MONTH_CURSOR_KEY,state.monthCursor)}catch(e){}}

/* ============ STORAGE ============ */
function loadManual(){
  try{
    const r=JSON.parse(localStorage.getItem(MANUAL_KEY)||'null');
    return Array.isArray(r?.events)?r.events:[];
  }catch(e){return[]}
}
function saveManual(){
  localStorage.setItem(MANUAL_KEY,JSON.stringify({events:state.manual}));
}
function loadGcalPriority(){
  try{return JSON.parse(localStorage.getItem(GCAL_PRI_KEY)||'{}')}catch(e){return{}}
}
function saveGcalPriority(){
  localStorage.setItem(GCAL_PRI_KEY,JSON.stringify(state.gcalPriority));
}
function loadGcalTitles(){
  try{return JSON.parse(localStorage.getItem(GCAL_TITLE_KEY)||'{}')}catch(e){return{}}
}
function saveGcalTitles(){
  localStorage.setItem(GCAL_TITLE_KEY,JSON.stringify(state.gcalTitles));
}
function loadGcalNotes(){
  try{return JSON.parse(localStorage.getItem(GCAL_NOTES_KEY)||'{}')}catch(e){return{}}
}
function saveGcalNotes(){
  localStorage.setItem(GCAL_NOTES_KEY,JSON.stringify(state.gcalNotes));
}
function mapsUrlFor(location){
  if(!location) return '';
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(location);
}
function loadGcalCache(){
  try{
    const r=JSON.parse(localStorage.getItem(GCAL_CACHE_KEY)||'null');
    if(r && r.events && r.syncedAt){
      state.gcal=r.events;
      state.syncedAt=r.syncedAt;
    }
  }catch(e){}
}
function saveGcalCache(){
  localStorage.setItem(GCAL_CACHE_KEY,JSON.stringify({events:state.gcal,syncedAt:state.syncedAt}));
}
function loadFilter(){
  return localStorage.getItem(FILTER_KEY)||'priority';
}
function saveFilter(){
  localStorage.setItem(FILTER_KEY,state.filter);
}
function loadTz(){
  return localStorage.getItem(TIMEZONE_KEY)||DEFAULT_TZ;
}
function saveTz(){
  localStorage.setItem(TIMEZONE_KEY,state.tz);
}

/* ============ DATE HELPERS (Chicago) ============ */
function todayCT(){
  const parts=new Intl.DateTimeFormat('en-US',{timeZone:state.tz||DEFAULT_TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const y=parts.find(p=>p.type==='year').value;
  const m=parts.find(p=>p.type==='month').value;
  const d=parts.find(p=>p.type==='day').value;
  return `${y}-${m}-${d}`;
}
function dateFromKey(k){
  // parse YYYY-MM-DD as local date
  const [y,m,d]=k.split('-').map(Number);
  return new Date(y,m-1,d);
}
function keyFromDate(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function daysBetween(fromKey,toKey){
  const a=dateFromKey(fromKey);
  const b=dateFromKey(toKey);
  return Math.round((b-a)/86400000);
}
function dayOfWeek(key){
  const d=dateFromKey(key);
  return d.getDay();
}
function isWeekend(key){
  const dow=dayOfWeek(key);
  return dow===0||dow===6;
}
function formatDow(key){
  const d=dateFromKey(key);
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function formatDayNum(key){
  const d=dateFromKey(key);
  return d.getDate();
}
function formatDateLabel(key){
  const d=dateFromKey(key);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function formatMonthLabel(key){
  const d=dateFromKey(key);
  return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function formatTime12(hhmm){
  if(!hhmm) return '';
  const [h,m]=hhmm.split(':').map(Number);
  const h12=h===0?12:h>12?h-12:h;
  const ap=h>=12?'PM':'AM';
  return m===0?`${h12} ${ap}`:`${h12}:${String(m).padStart(2,'0')} ${ap}`;
}

function formatIsoTime(iso,tz){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    if(isNaN(d.getTime())) return '';
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:tz||state.tz||DEFAULT_TZ,hour:'numeric',minute:'2-digit',hour12:true}).formatToParts(d);
    const h=parts.find(p=>p.type==='hour').value;
    const m=parts.find(p=>p.type==='minute').value;
    const ap=(parts.find(p=>p.type==='dayPeriod')||{}).value||'';
    return m==='00'?`${h} ${ap.toUpperCase()}`:`${h}:${m} ${ap.toUpperCase()}`;
  }catch(e){return ''}
}

function formatIsoRange(startISO,endISO,tz){
  const s=formatIsoTime(startISO,tz);
  if(!endISO || endISO===startISO) return s;
  const e=formatIsoTime(endISO,tz);
  if(!e) return s;
  return `${s} – ${e}`;
}

function tzAbbrev(tz){
  try{
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:tz||state.tz||DEFAULT_TZ,timeZoneName:'short'}).formatToParts(new Date());
    return (parts.find(p=>p.type==='timeZoneName')||{}).value||'';
  }catch(e){return ''}
}

/* ============ UNIFIED EVENT LIST ============ */
// Normalizes manual + gcal into { id, source, title, date, start, end, category, priority, location, notes }
function unified(){
  const today=todayCT();
  const out=[];

  for(const e of state.manual){
    if(!e||!e.date) continue;
    if(e.date<today) continue;
    out.push({
      id:e.id, source:'manual', title:e.title||'(untitled)',
      date:e.date, start:e.start||'', end:e.end||'',
      category:e.category||'other', priority:!!e.priority,
      location:e.location||'', notes:e.notes||'', _ref:e,
    });
  }

  for(const g of state.gcal){
    if(!g||!g.date) continue;
    if(g.date<today) continue;
    const pri=!!state.gcalPriority[g.id];
    const override=state.gcalTitles[g.id];
    out.push({
      id:g.id, source:'gcal',
      title:override || g.summary || '(untitled)',
      date:g.date, start:g.start||'', end:g.end||'',
      startISO:g.startISO||'', endISO:g.endISO||g.startISO||'',
      category:g.category||'event', priority:pri,
      location:g.location||'', notes:g.description||'',
      userNotes:state.gcalNotes[g.id]||'',
      meetingUrl:g.meetingUrl||'',
      cal:g.cal||'', allDay:!!g.allDay,
      timeStr:g.timeStr||'',
      edited:!!override, originalTitle:g.summary||'',
    });
  }

  // Dedupe — same date + start + normalized title collapses to one
  // (fixes GCal birthdays/holidays appearing twice across synced calendars)
  const seen=new Map();
  const deduped=[];
  for(const e of out){
    const key=`${e.date}|${e.start||''}|${(e.title||'').toLowerCase().replace(/\s+/g,' ').trim()}`;
    const existing=seen.get(key);
    if(existing){
      // Prefer manual over gcal, priority over non-priority
      const existingScore=(existing.source==='manual'?2:0)+(existing.priority?1:0);
      const newScore=(e.source==='manual'?2:0)+(e.priority?1:0);
      if(newScore>existingScore){
        const idx=deduped.indexOf(existing);
        if(idx>=0) deduped[idx]=e;
        seen.set(key,e);
      }
      continue;
    }
    seen.set(key,e);
    deduped.push(e);
  }

  // sort by date, then start time
  deduped.sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    const as=a.start||(a.allDay?'00:00':'99:99');
    const bs=b.start||(b.allDay?'00:00':'99:99');
    return as<bs?-1:as>bs?1:0;
  });

  return deduped;
}

/* ============ FILTER ============ */
function eventSourceKey(e){
  // Returns filter key for this event: 'manual' or calendar label ('Personal'/'TWEG'/'Partiful')
  if(e.source==='manual') return 'manual';
  return e.cal || 'Other';
}
function applyFilter(list){
  if(state.filter==='all') return list;
  if(state.filter==='priority') return list.filter(e=>e.priority);
  return list.filter(e=>eventSourceKey(e)===state.filter);
}

/* ============ HORIZON GROUPING ============ */
// Non-empty groups only, so lone event 6 weeks out still surfaces.
// TWEG (work) has daily meetings — collapse Today/Tomorrow into This Week for that filter.
function groupByHorizon(list){
  const today=todayCT();
  const collapseNear=state.filter==='TWEG';
  const groups={};
  for(const e of list){
    const d=daysBetween(today,e.date);
    let key;
    if(d<0) continue;
    else if(collapseNear && d<=6) key='THIS WEEK';
    else if(d===0) key='TODAY';
    else if(d<=1) key='TOMORROW';
    else if(d<=6) key='THIS WEEK';
    else if(d<=13) key='NEXT WEEK';
    else if(d<=27) key='IN 2–4 WEEKS';
    else if(d<=55) key='IN 1–2 MONTHS';
    else key='LATER';
    if(!groups[key]) groups[key]={events:[],days:new Set()};
    groups[key].events.push(e);
    groups[key].days.add(e.date);
  }
  const order=['TODAY','TOMORROW','THIS WEEK','NEXT WEEK','IN 2–4 WEEKS','IN 1–2 MONTHS','LATER'];
  return order.filter(k=>groups[k]).map(k=>({
    key:k,
    events:groups[k].events,
    dayCount:groups[k].days.size,
    range:horizonRange(k,today,collapseNear),
  }));
}

function horizonRange(key,today,collapseNear){
  // Day offsets for each bucket
  const offsets={
    'TODAY':[0,0],
    'TOMORROW':[1,1],
    'THIS WEEK':collapseNear?[0,6]:[2,6],
    'NEXT WEEK':[7,13],
    'IN 2–4 WEEKS':[14,27],
    'IN 1–2 MONTHS':[28,55],
    'LATER':[56,null],
  };
  const [startOff,endOff]=offsets[key]||[null,null];
  if(startOff===null) return '';
  const t=dateFromKey(today);
  const start=new Date(t);start.setDate(t.getDate()+startOff);
  if(endOff===null){
    return formatRangeDate(start)+' →';
  }
  const end=new Date(t);end.setDate(t.getDate()+endOff);
  if(startOff===endOff) return formatRangeDate(start);
  return `${formatRangeDate(start)} – ${formatRangeDate(end)}`;
}

function formatRangeDate(d){
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function groupEventsByDay(events){
  const map={};
  for(const e of events){
    if(!map[e.date]) map[e.date]=[];
    map[e.date].push(e);
  }
  return Object.entries(map).map(([date,evs])=>({date,events:evs}));
}

/* ============ RENDERERS ============ */
function densityClass(count,hasPriority){
  if(hasPriority && count<=1) return 'fill-2';
  if(count===0) return '';
  if(count===1) return 'fill-1';
  if(count===2) return 'fill-2';
  if(count===3) return 'fill-3';
  return 'fill-4';
}

function renderStats(){
  const list=unified();
  const today=todayCT();
  const priorityEvents=list.filter(e=>e.priority);
  const busyDays=new Set(list.map(e=>e.date)).size;

  document.getElementById('statPriority').textContent=priorityEvents.length;
  document.getElementById('statTotal').textContent=list.length;
  document.getElementById('statBusy').textContent=busyDays;

  if(priorityEvents.length){
    const next=priorityEvents[0];
    const diff=daysBetween(today,next.date);
    let label;
    if(diff===0) label='Today';
    else if(diff===1) label='Tomorrow';
    else if(diff<7) label=`${diff} days`;
    else if(diff<14) label='1 week';
    else if(diff<28) label=`${Math.round(diff/7)} weeks`;
    else label=`${Math.round(diff/30)} mo`;
    document.getElementById('statNext').textContent=label;
  }else{
    document.getElementById('statNext').textContent='—';
  }

  const tzBadge=tzAbbrev(state.tz);
  const sub=state.syncedAt
    ? `Synced ${new Date(state.syncedAt).toLocaleTimeString('en-US',{timeZone:state.tz||DEFAULT_TZ,hour:'numeric',minute:'2-digit'}).toLowerCase()} · ${tzBadge}`
    : `Horizon view · ${tzBadge}`;
  document.getElementById('heroSub').textContent=sub;
}

function renderFilterBar(){
  const list=unified();
  // Build source buckets from actual events present
  const sourceCounts={};
  for(const e of list){
    const k=eventSourceKey(e);
    sourceCounts[k]=(sourceCounts[k]||0)+1;
  }
  const SOURCE_COLORS={Personal:'#5AC8FA',TWEG:'#BF5AF2',Partiful:'#FF8A3D',Birthdays:'#FFD60A',manual:'#30D158'};
  const SOURCE_LABELS={manual:'Manual'};

  // Priority first, then TWEG, then All, then remaining calendar sources
  const chips=[
    {id:'priority',label:'Priority',color:'#FF8A3D',starred:true,count:list.filter(e=>e.priority).length},
  ];
  if(sourceCounts['TWEG']){
    chips.push({id:'TWEG',label:'TWEG',color:SOURCE_COLORS['TWEG'],count:sourceCounts['TWEG']});
  }
  chips.push({id:'all',label:'All',color:null,count:list.length});
  // Remaining sources: Partiful, Personal, Birthdays, manual (TWEG already placed)
  const sourceOrder=['Partiful','Personal','Birthdays','manual'];
  for(const k of sourceOrder){
    if(sourceCounts[k]){
      chips.push({id:k,label:SOURCE_LABELS[k]||k,color:SOURCE_COLORS[k]||'#6E7074',count:sourceCounts[k]});
    }
  }
  // Any other sources we didn't predict (TWEG already placed above)
  const placed=new Set(['TWEG',...sourceOrder]);
  for(const k of Object.keys(sourceCounts)){
    if(!placed.has(k)){
      chips.push({id:k,label:k,color:'#6E7074',count:sourceCounts[k]});
    }
  }

  const bar=document.getElementById('filterBar');
  bar.innerHTML=chips.map(c=>{
    const active=state.filter===c.id?'active':'';
    const dot=c.color?`<span class="dot" style="background:${c.color}"></span>`:'';
    const star=c.starred?'★ ':'';
    return `<div class="chip ${active}" data-f="${c.id}">${dot}${star}${escapeHTML(c.label)}<span class="count">${c.count}</span></div>`;
  }).join('');

  bar.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{
      state.filter=ch.dataset.f;
      saveFilter();
      render();
    };
  });
}

function renderSyncBanner(){
  const el=document.getElementById('syncBanner');
  if(state.syncStatus==='needs_auth'){
    // If we have cached events, this is a reconnect (token expired), otherwise first-time connect
    const isReconnect=(state.gcal&&state.gcal.length>0)||!!state.syncedAt;
    const msg=isReconnect
      ? 'Google Calendar sign-in expired. Reconnect to keep events in sync.'
      : 'Connect Google Calendar to see parties, dates, and events pulled in automatically.';
    const label=isReconnect?'Reconnect':'Connect';
    el.innerHTML=`<div class="sync-banner warn"><div class="sync-banner-msg">${msg}</div><a href="/api/google-auth"><button class="sync-banner-btn">${label}</button></a></div>`;
  }else if(state.syncStatus==='syncing'){
    el.innerHTML=`<div class="sync-banner"><div class="sync-banner-msg">Syncing Google Calendar…</div></div>`;
  }else if(state.syncStatus==='error'){
    el.innerHTML=`<div class="sync-banner warn"><div class="sync-banner-msg">Sync issue: ${escapeHTML(state.lastError||'unknown error')}</div><button class="sync-banner-btn ghost" onclick="syncNow()">Retry</button></div>`;
  }else{
    el.innerHTML='';
  }

function renderHorizon(){
  const container=document.getElementById('horizon');
  const list=applyFilter(unified());

  if(!list.length){
    const totalUnfiltered=unified().length;
    const msg=state.filter==='priority'
      ? (totalUnfiltered
          ? 'Nothing flagged as priority yet. Tap All to see everything, or star an event to pin it here.'
          : 'No events on the horizon. Tap + to add one, or sync Google Calendar.')
      : state.filter==='all'
        ? 'No events ahead. Hit + to add one, or sync Google Calendar.'
        : 'No events from this calendar.';
    container.innerHTML=`<div class="empty-horizon"><div class="empty-horizon-title">Clear horizon</div><div class="empty-horizon-msg">${msg}</div></div>`;
    return;
  }

  const groups=groupByHorizon(list);
  const today=todayCT();

  container.innerHTML=groups.map(g=>{
    const days=groupEventsByDay(g.events);
    const dayHTML=days.map(({date,events})=>renderDayRow(date,events,today)).join('');
    const sub=g.events.length===1?'1 event':`${g.events.length} events · ${g.dayCount} ${g.dayCount===1?'day':'days'}`;
    const rangeHTML=g.range?`<span class="h-group-range">${escapeHTML(g.range)}</span>`:'';
    return `<div class="h-group"><div class="h-group-head"><div class="h-group-title-wrap"><span class="h-group-title">${g.key}</span>${rangeHTML}</div><div class="h-group-sub">${sub}</div></div><div class="h-group-days">${dayHTML}</div></div>`;
  }).join('');

  // wire up event handlers
  container.querySelectorAll('.star-btn').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();toggleStar(b.dataset.src,b.dataset.id)};
  });
  container.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();deleteEvent(b.dataset.id)};
  });
  // Title click now opens detail modal (editable there) — no more inline rename
  container.querySelectorAll('.event-pill').forEach(p=>{
    p.onclick=(e)=>{
      // don't open modal if click landed on action buttons, the location link, or the meeting join link
      if(e.target.closest('.event-actions,.event-loc,.join-btn')) return;
      if(p.dataset.src==='manual') openModal(p.dataset.id);
      else if(p.dataset.src==='gcal') openDetailModal(p.dataset.id);
    };
  });
}

/* ============ MONTH VIEW ============ */
function monthKeyFromToday(){
  const t=todayCT();
  return t.slice(0,7); // YYYY-MM
}
function parseMonthKey(mk){
  const [y,m]=mk.split('-').map(Number);
  return {y,m};
}
function shiftMonth(mk,delta){
  const {y,m}=parseMonthKey(mk);
  const d=new Date(y,m-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(mk){
  const {y,m}=parseMonthKey(mk);
  const d=new Date(y,m-1,1);
  return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function catColor(cat){
  const c=CATEGORIES.find(x=>x.id===cat);
  return c?c.color:'#6E7074';
}

function renderMonth(){
  const grid=document.getElementById('monthGrid');
  const titleEl=document.getElementById('monthTitle');
  if(!grid||!titleEl) return;

  if(!state.monthCursor) state.monthCursor=monthKeyFromToday();
  titleEl.textContent=monthLabel(state.monthCursor);

  const {y,m}=parseMonthKey(state.monthCursor);
  const firstOfMonth=new Date(y,m-1,1);
  const firstDow=firstOfMonth.getDay(); // 0=Sun
  // Start grid on Sunday of the week containing day 1
  const gridStart=new Date(y,m-1,1-firstDow);
  const today=todayCT();

  // Build event map for the visible range (42 days)
  const events=applyFilter(unified());
  const eventsByDate={};
  for(const e of events){
    if(!e.date) continue;
    (eventsByDate[e.date]=eventsByDate[e.date]||[]).push(e);
  }
  // Sort each day: priority first, then by time
  Object.keys(eventsByDate).forEach(k=>{
    eventsByDate[k].sort((a,b)=>{
      if((a.priority?0:1)!==(b.priority?0:1)) return (a.priority?0:1)-(b.priority?0:1);
      const at=a.startISO||a.start||'';
      const bt=b.startISO||b.start||'';
      return at.localeCompare(bt);
    });
  });

  const cells=[];
  for(let i=0;i<42;i++){
    const d=new Date(gridStart.getFullYear(),gridStart.getMonth(),gridStart.getDate()+i);
    const key=keyFromDate(d);
    const inMonth=d.getMonth()===m-1;
    const isToday=key===today;
    const weekend=(d.getDay()===0||d.getDay()===6);
    const evs=eventsByDate[key]||[];
    const hasPriority=evs.some(e=>e.priority);
    const cls=['month-cell'];
    if(!inMonth) cls.push('other');
    if(weekend) cls.push('weekend');
    if(isToday) cls.push('today');
    if(hasPriority) cls.push('has-priority');

    const visibleCount=evs.length<=3?3:2;
    const visible=evs.slice(0,visibleCount);
    const extra=evs.length-visible.length;
    const pills=visible.map(e=>{
      const color=catColor(e.category);
      const priCls=e.priority?'priority':'';
      return `<div class="mc-pill ${priCls}" data-src="${e.source}" data-id="${escapeAttr(e.id)}" title="${escapeAttr(e.title)}"><span class="mc-dot" style="background:${color}"></span><span class="mc-txt">${escapeHTML(e.title)}</span></div>`;
    }).join('');
    const more=extra>0?`<div class="mc-more">+${extra} more</div>`:'';
    const countChip=evs.length?`<span class="mc-count">${evs.length}</span>`:'';

    cells.push(`<div class="${cls.join(' ')}" data-date="${key}">
      <div class="mc-head"><span class="mc-num">${d.getDate()}</span>${countChip}</div>
      <div class="mc-events">${pills}${more}</div>
    </div>`);
  }
  grid.innerHTML=cells.join('');

  // wire pill clicks (individual event -> open edit/detail modal)
  grid.querySelectorAll('.mc-pill').forEach(p=>{
    p.onclick=(ev)=>{
      ev.stopPropagation();
      if(p.dataset.src==='manual') openModal(p.dataset.id);
      else if(p.dataset.src==='gcal') openDetailModal(p.dataset.id);
    };
  });
  // cell click (blank area or +more) -> open day list
  grid.querySelectorAll('.month-cell').forEach(c=>{
    if(c.classList.contains('other')) return;
    c.onclick=(ev)=>{
      if(ev.target.closest('.mc-pill')) return;
      openDayModal(c.dataset.date);
    };
  });
}

function openDayModal(dateKey){
  if(!dateKey) return;
  const events=applyFilter(unified()).filter(e=>e.date===dateKey);
  events.sort((a,b)=>{
    if((a.priority?0:1)!==(b.priority?0:1)) return (a.priority?0:1)-(b.priority?0:1);
    const at=a.startISO||a.start||'';
    const bt=b.startISO||b.start||'';
    return at.localeCompare(bt);
  });
  const titleEl=document.getElementById('dayTitle');
  const listEl=document.getElementById('dayList');
  if(!titleEl||!listEl) return;
  // Friendly title: Wed, Apr 22 · 2026
  const d=dateFromKey(dateKey);
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  titleEl.textContent=`${dow}, ${mo} ${d.getDate()} · ${d.getFullYear()}`;
  if(!events.length){
    listEl.innerHTML=`<div class="day-empty">No events on this day.</div>`;
  } else {
    listEl.innerHTML=events.map(e=>{
      const color=catColor(e.category);
      const pri=e.priority?'priority':'';
      const time=e.startISO?(formatIsoRange(e.startISO,e.endISO,state.tz)||e.timeStr||''):(e.timeStr||e.start||'');
      const loc=e.location?`<span class="sep">·</span><span>${escapeHTML(e.location)}</span>`:'';
      const timeBit=time?`<span>${escapeHTML(time)}</span>`:'<span>All day</span>';
      return `<div class="day-item ${pri}" data-src="${e.source}" data-id="${escapeAttr(e.id)}">
        <span class="day-item-dot" style="background:${color}"></span>
        <div class="day-item-body">
          <div class="day-item-title">${escapeHTML(e.title||'(no title)')}</div>
          <div class="day-item-meta">${timeBit}${loc}</div>
        </div>
      </div>`;
    }).join('');
    listEl.querySelectorAll('.day-item').forEach(it=>{
      it.onclick=()=>{
        closeDayModal();
        if(it.dataset.src==='manual') openModal(it.dataset.id);
        else if(it.dataset.src==='gcal') openDetailModal(it.dataset.id);
      };
    });
  }
  document.getElementById('dayBg').classList.add('open');
}
function closeDayModal(){ document.getElementById('dayBg').classList.remove('open'); }

function setView(view){
  state.view=view;
  saveView();
  // Toggle active state on switch buttons
  const hBtn=document.getElementById('viewHorizonBtn');
  const mBtn=document.getElementById('viewMonthBtn');
  if(hBtn)hBtn.classList.toggle('active',view==='horizon');
  if(mBtn)mBtn.classList.toggle('active',view==='month');
  if(hBtn)hBtn.setAttribute('aria-selected',view==='horizon'?'true':'false');
  if(mBtn)mBtn.setAttribute('aria-selected',view==='month'?'true':'false');
  // Toggle containers
  const hEl=document.getElementById('horizon');
  const mEl=document.getElementById('monthView');
  if(hEl)hEl.style.display=view==='horizon'?'':'none';
  if(mEl)mEl.style.display=view==='month'?'':'none';
  render();
}
function monthShift(delta){
  state.monthCursor=shiftMonth(state.monthCursor||monthKeyFromToday(),delta);
  saveMonthCursor();
  renderMonth();
}
function monthJumpToday(){
  state.monthCursor=monthKeyFromToday();
  saveMonthCursor();
  renderMonth();
}

function renderDayRow(date,events,today){
  const hasPriority=events.some(e=>e.priority);
  const isToday=date===today;
  const weekend=isWeekend(date);
  const cls=['day-row'];
  if(isToday) cls.push('today');
  if(weekend) cls.push('weekend');
  if(hasPriority) cls.push('has-priority');

  const dClass=densityClass(events.length,hasPriority);
  const d=dateFromKey(date);
  const mo=d.toLocaleDateString('en-US',{month:'short'});

  const eventsHTML=events.map(e=>renderEventPill(e)).join('');

  return `<div class="${cls.join(' ')}">
    <div class="day-head">
      <div class="day-date">
        <span class="day-dow">${formatDow(date)}</span>
        <span class="day-num">${formatDayNum(date)}</span>
        <span class="day-mo">${mo}</span>
      </div>
      <div class="day-density-inline">
        <span class="density-dot ${dClass}"></span>
        <span class="density-count">${events.length}</span>
      </div>
    </div>
    <div class="day-events">${eventsHTML}</div>
  </div>`;
}

// Detect video meeting URL from structured field first, then scan free text.
const MEETING_URL_REGEX=/https?:\/\/(?:[\w-]+\.)?(?:zoom\.us|zoom\.com|zoomgov\.com|teams\.microsoft\.com|teams\.live\.com|meet\.google\.com|webex\.com|gotomeeting\.com|whereby\.com|chime\.aws)\/[^\s<>"')]+/i;
function findMeetingUrl(e){
  if(e&&e.meetingUrl) return e.meetingUrl;
  const haystack=[e&&e.location, e&&e.notes, e&&e.title, e&&e.originalTitle].filter(Boolean).join(' \n ');
  if(!haystack) return '';
  const m=haystack.match(MEETING_URL_REGEX);
  return m?m[0]:'';
}
function meetingPlatform(url){
  if(!url) return '';
  const u=url.toLowerCase();
  if(u.includes('zoom.us')||u.includes('zoom.com')||u.includes('zoomgov.com')) return 'Zoom';
  if(u.includes('teams.microsoft.com')||u.includes('teams.live.com')) return 'Teams';
  if(u.includes('meet.google.com')) return 'Meet';
  if(u.includes('webex.com')) return 'Webex';
  if(u.includes('gotomeeting.com')) return 'GoTo';
  if(u.includes('whereby.com')) return 'Whereby';
  if(u.includes('chime.aws')) return 'Chime';
  return 'Join';
}

function renderEventPill(e){
  const cls=['event-pill'];
  if(e.priority) cls.push('priority');
  let timeStr='';
  if(e.allDay){
    timeStr='All day';
  }else if(e.source==='gcal' && e.startISO){
    timeStr=formatIsoRange(e.startISO,e.endISO,state.tz)||e.timeStr||'';
  }else if(e.start){
    timeStr=e.end?`${formatTime12(e.start)} – ${formatTime12(e.end)}`:formatTime12(e.start);
  }else if(e.source==='manual'){
    timeStr='All day';
  }
  const metaBits=[];
  if(timeStr) metaBits.push(`<span class="event-time">${escapeHTML(timeStr)}</span>`);
  if(e.location) metaBits.push(`<span class="event-loc-wrap"><span class="sep">·</span><a class="event-loc" href="${escapeAttr(mapsUrlFor(e.location))}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open in Maps">${escapeHTML(e.location)}</a></span>`);
  if(e.cal && e.source==='gcal') metaBits.push(`<span class="event-cal-wrap"><span class="sep">·</span><span class="event-cal">${escapeHTML(e.cal)}</span></span>`);
  const srcBadge='';
  const hasUserNotes=!!(e.userNotes||'').trim();
  const hasDescription=!!((e.notes||'').trim())||hasUserNotes;
  const notesBadge=hasDescription?`<span class="event-notes-dot ${hasUserNotes?'mine':''}" title="${hasUserNotes?'Has your notes':'Has description'}"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="14" y2="17"/></svg></span>`:'';
  const delBtn=e.source==='manual'?`<button class="del-btn" data-id="${escapeAttr(e.id)}" title="Delete">&times;</button>`:'';
  const starOn=e.priority?'on':'';
  const editedMark=e.edited?`<span class="event-edited-mark" title="Renamed — original: ${escapeAttr(e.originalTitle)}">edited</span>`:'';
  const meetingUrl=findMeetingUrl(e);
  const platform=meetingPlatform(meetingUrl);
  const joinBtn=meetingUrl?`<a class="join-btn" href="${escapeAttr(meetingUrl)}" target="_blank" rel="noopener" title="Join ${escapeAttr(platform)}" onclick="event.stopPropagation()">${escapeHTML(platform)}</a>`:'';
  return `<div class="${cls.join(' ')}" data-src="${e.source}" data-id="${escapeAttr(e.id)}">
    <div class="event-cat cat-${e.category}"></div>
    <div class="event-body">
      <div class="event-title" data-src="${e.source}" data-id="${escapeAttr(e.id)}" title="Click to open">${escapeHTML(e.title)}${editedMark}</div>
      <div class="event-meta">${srcBadge}${notesBadge}${metaBits.join('')}</div>
    </div>
    <div class="event-actions">
      ${joinBtn}
      <button class="star-btn ${starOn}" data-src="${e.source}" data-id="${escapeAttr(e.id)}" title="Toggle priority">${e.priority?'★':'☆'}</button>
      ${delBtn}
    </div>
  </div>`;
}

function beginTitleEdit(titleEl){
  if(titleEl.classList.contains('editing')) return;
  const src=titleEl.dataset.src;
  const id=titleEl.dataset.id;
  const current=src==='manual'
    ? (state.manual.find(x=>x.id===id)?.title||'')
    : (state.gcalTitles[id] || state.gcal.find(x=>x.id===id)?.summary || '');
  titleEl.classList.add('editing');
  titleEl.innerHTML=`<input type="text" value="${escapeAttr(current)}">`;
  const input=titleEl.querySelector('input');
  input.focus();
  input.select();
  let committed=false;
  const commit=()=>{
    if(committed) return;
    committed=true;
    const next=input.value.trim();
    if(next && next!==current){
      if(src==='manual'){
        const ev=state.manual.find(x=>x.id===id);
        if(ev){ev.title=next;saveManual();showToast('Renamed')}
      }else{
        const orig=state.gcal.find(x=>x.id===id)?.summary||'';
        if(next===orig){
          delete state.gcalTitles[id];
        }else{
          state.gcalTitles[id]=next;
        }
        saveGcalTitles();
        showToast('Renamed locally');
      }
    }
    render();
  };
  const cancel=()=>{committed=true;render()};
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',(ev)=>{
    if(ev.key==='Enter'){ev.preventDefault();input.blur()}
    else if(ev.key==='Escape'){ev.preventDefault();cancel()}
  });
}

function saveEvent(){
  const title=document.getElementById('fTitle').value.trim();
  const date=document.getElementById('fDate').value;

  const end=document.getElementById('fEnd').value;
  const notes=document.getElementById('fNotes').value.trim();

  if(!date){showToast('Date required');return}
  if(state.editingId){
    const e=state.manual.find(x=>x.id===state.editingId);
    if(e){
      e.title=title;e.date=date;e.start=start;e.end=end;
      e.notes=notes;e.location=locVal;e.priority=priority;e.category=state.modalCat;
    }
  }else{
    state.manual.push({
      id:'m-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      title,date,start,end,notes,location:locVal,priority,category:state.modalCat,

  else if(g.start){ timeStr=g.end?`${formatTime12(g.start)} – ${formatTime12(g.end)}`:formatTime12(g.start); }

    const dateLbl=formatDateLabel(g.date);
    bits.push(`<span class="bit">${escapeHTML(dateLbl)}${timeStr?` · ${escapeHTML(timeStr)}`:''}</span>`);

  }

    locField.style.display='';
    locEl.innerHTML=`<span class="loc-text">${escapeHTML(g.location)}</span><a class="btn ghost loc-maps-btn" href="${escapeAttr(mapsUrlFor(g.location))}" target="_blank" rel="noopener">Maps</a>`;
  }else{

  }

  if(desc){

function linkifyText(s){
  if(!s) return '';
  const esc=escapeHTML(s);
  return esc.replace(/(https?:\/\/[^\s<>"')]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}

const MEETING_RE=/(https?:\/\/[^\s<>"')]*(?:zoom\.us\/(?:j|my|w)\/|meet\.google\.com\/|teams\.microsoft\.com\/|teams\.live\.com\/)[^\s<>"')]*)/i;
function detectMeetingUrl(g){
  if(!g) return '';
  if(g.meetingUrl) return g.meetingUrl;
  const hay=[g.location||'',g.description||''].join(' \n ');
  const m=hay.match(MEETING_RE);
  return m?m[1]:'';
}
function meetingKind(url){
  if(!url) return '';
  if(/zoom\.us/i.test(url)) return 'Zoom';
  if(/meet\.google\.com/i.test(url)) return 'Google Meet';
  if(/teams\.(?:microsoft|live)\.com/i.test(url)) return 'Teams';
  return '';
}

function closeDetailModal(){

function saveDetailNotes(){
  if(!state.detailId) return;
  const id=state.detailId;

  const noteVal=document.getElementById('detailNotes').value.trim();
  if(noteVal){ state.gcalNotes[id]=noteVal; }
  else { delete state.gcalNotes[id]; }

  const titleInput=document.getElementById('detailTitle');
  const newTitle=(titleInput.value||'').trim();

}

/* ============ GOOGLE CALENDAR SYNC ============ */
// Maps GCal summary to category. Heuristic only — user can still manually categorize via priority flags.
function categorizeGcal(summary,location){
  const s=(summary||'').toLowerCase();
  const l=(location||'').toLowerCase();
  if(/party|birthday|celebration|wedding|cocktail|mixer|bash/.test(s)) return 'party';
  if(/date|dinner with|drinks with/.test(s)) return 'date';
  if(/appt|appointment|doctor|dentist|checkup|medical|haircut|barber/.test(s)) return 'appt';
  if(/sync|standup|stand-up|1:1|1on1|retro|planning|review|sprint|demo|call with|meeting|interview/.test(s)) return 'work';
  if(/show|concert|festival|game|match|trip|flight|vacation|brunch|lunch|hangout/.test(s)) return 'event';
  return 'other';
}

// Convert "6 PM - 7 PM" style time string to first time as HH:mm
function parseGcalTime(timeStr){
  if(!timeStr || timeStr==='All day') return {start:'',end:'',timeStr:timeStr||''};
  const m=timeStr.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*-\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
  if(!m) return {start:'',end:'',timeStr};
  const to24=(h,mm,ap)=>{
    let H=parseInt(h,10)%12;
    if(ap.toUpperCase()==='PM') H+=12;
    return `${String(H).padStart(2,'0')}:${mm||'00'}`;
  };
  return {start:to24(m[1],m[2],m[3]),end:to24(m[4],m[5],m[6]),timeStr};
}

function dateFromStartISO(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
    const y=parts.find(p=>p.type==='year').value;
    const m=parts.find(p=>p.type==='month').value;
    const day=parts.find(p=>p.type==='day').value;
    return `${y}-${m}-${day}`;
  }catch(e){return ''}
}

async function syncNow(){
  state.syncStatus='syncing';state.lastError=null;
  renderSyncBanner();
  try{
    const r=await fetch('/api/calendar',{credentials:'same-origin'});
    if(r.status===401){state.syncStatus='needs_auth';renderSyncBanner();return}
    if(r.status===412){state.syncStatus='needs_auth';renderSyncBanner();return}
    if(!r.ok){
      const txt=await r.text().catch(()=>String(r.status));
      // Refresh token expired/revoked OR OAuth client misconfigured — treat as needs_auth
      // so user sees a Reconnect button instead of a Retry button that will keep failing.
      if(/invalid_grant|unauthorized_client|Token has been expired|Token has been revoked/i.test(txt)){
        state.syncStatus='needs_auth';
        renderSyncBanner();
        return;
      }
      throw new Error(txt||`HTTP ${r.status}`);
    }
    const data=await r.json();
    const byDate=data.by_date||{};
    const events=[];
    for(const [dk,items] of Object.entries(byDate)){
      for(const it of items){
        const t=parseGcalTime(it.time);
        const d=it.startISO?dateFromStartISO(it.startISO):dk;
        events.push({
          id:String(it.id||`${dk}-${events.length}`),
          summary:it.summary||'(untitled)',
          date:d,
          start:t.start,
          end:t.end,
          startISO:it.startISO||'',
          endISO:it.endISO||it.startISO||'',
          timeStr:it.time||'',
          location:it.location||'',
          cal:it.cal||'',
          allDay:!!it.allDay,
          meetingUrl:it.meetingUrl||'',
          description:it.description||'',
          category:categorizeGcal(it.summary,it.location),
        });
      }
    }
    state.gcal=events;
    state.syncedAt=data.synced_at||new Date().toISOString();
    state.syncStatus='connected';
    saveGcalCache();
    showToast(`Synced ${events.length} events`);
    render();
  }catch(e){
    console.error('sync failed',e);
    state.syncStatus='error';
    state.lastError=e.message||String(e);
    render();
  }
}

/* ============ UTIL ============ */
function escapeHTML(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return escapeHTML(s)}
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}
