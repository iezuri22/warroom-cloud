<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quarterly Goals</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quarterly">
<meta name="theme-color" content="#F3ECD8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Editorial paper palette — intentionally different from the dark planner */
  --paper:#F3ECD8;         /* aged cream */
  --paper-2:#EAE1C8;       /* darker card gutter */
  --ink:#0E0D0A;           /* near-black ink */
  --ink-mid:rgba(14,13,10,.68);
  --ink-dim:rgba(14,13,10,.42);
  --rule:rgba(14,13,10,.18);
  --rule-soft:rgba(14,13,10,.08);
  --card:#FDFAF0;          /* off-white paper */
  --card-alt:#FFFDF4;
  --accent:#B02B2B;        /* editorial crimson */
  --accent-ink:#FFF;
  --accent-soft:rgba(176,43,43,.08);
  --ok:#1F5641;            /* forest green */
  --ok-bg:rgba(31,86,65,.10);
  --warn:#A56A07;          /* amber ink */
  --warn-bg:rgba(165,106,7,.10);
  --block:#8B1D1D;         /* deep red */
  --block-bg:rgba(139,29,29,.10);
  --done:#33587A;          /* navy */
  --done-bg:rgba(51,88,122,.10);

  /* Pillar colors */
  --p-ezrk:#C75B1A;
  --p-vt:#1F7A53;
  --p-bha:#6A2C91;
  --p-work:#2857A8;
  --p-personal:#9A5B2E;

  --serif:'Fraunces','Times New Roman',serif;
  --sans:'IBM Plex Sans','Helvetica Neue',Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100dvh;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","ss02","ss03";letter-spacing:-0.005em}

/* Subtle paper grain — pure CSS */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(rgba(14,13,10,.035) 1px,transparent 1px),
    radial-gradient(rgba(14,13,10,.025) 1px,transparent 1px);
  background-size:3px 3px, 7px 7px;background-position:0 0, 1px 2px;
  mix-blend-mode:multiply;
}

.wrap{max-width:880px;margin:0 auto;padding:20px 16px 120px;position:relative;z-index:1}
@media(min-width:720px){.wrap{padding:36px 28px 140px}}

/* ============ MASTHEAD ============ */
.masthead{
  border-top:2px solid var(--ink);
  border-bottom:1px solid var(--ink);
  padding:12px 0 18px;margin-bottom:24px;
  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;
}
.masthead-top{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-mid);padding-bottom:6px;border-bottom:1px solid var(--rule-soft);margin-bottom:14px}
.masthead-top .edition{font-weight:600}
.masthead h1{
  font-family:var(--serif);font-weight:900;font-size:clamp(42px,9vw,72px);
  line-height:.92;letter-spacing:-0.035em;font-style:italic;
}
.masthead h1 .quarter{font-style:normal;display:block;font-size:.42em;font-weight:700;letter-spacing:-0.01em;color:var(--ink-mid);margin-top:4px;font-family:var(--sans)}
.masthead-meta{
  text-align:right;font-family:var(--mono);font-size:11px;color:var(--ink-mid);
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
}
.masthead-meta .big{font-size:38px;font-family:var(--serif);font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.02em}
.masthead-meta .lbl{text-transform:uppercase;letter-spacing:1.5px;font-size:9px}

/* ============ HEALTH STRIP ============ */
.health{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border:1px solid var(--ink);background:var(--card);margin-bottom:28px;
}
.health-cell{padding:14px 12px;border-right:1px solid var(--rule);text-align:center}
.health-cell:last-child{border-right:none}
.health-cell .v{font-family:var(--serif);font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em}
.health-cell .l{font-family:var(--mono);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink-mid);margin-top:6px}
.health-cell.on .v{color:var(--ok)}
.health-cell.at .v{color:var(--warn)}
.health-cell.bl .v{color:var(--block)}
.health-cell.dn .v{color:var(--done)}

/* ============ TOOLBAR ============ */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:18px}
.pillar-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:0}
.pchip{
  font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
  padding:6px 10px;background:transparent;border:1px solid var(--ink);color:var(--ink);
  cursor:pointer;transition:all .1s;border-radius:0;font-weight:600;
}
.pchip:hover{background:var(--ink);color:var(--paper)}
.pchip.active{background:var(--ink);color:var(--paper)}
.pchip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;transform:translateY(-1px)}

.add-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  padding:9px 16px;background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);
  cursor:pointer;transition:transform .1s;
}
.add-btn:hover{transform:translate(-2px,-2px);box-shadow:2px 2px 0 var(--ink)}
.add-btn:active{transform:translate(0,0);box-shadow:none}

/* ============ GOAL CARD ============ */
.goals-list{display:flex;flex-direction:column;gap:22px}

.goal{
  background:var(--card);border:1px solid var(--ink);
  position:relative;transition:transform .15s;
}
.goal:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink)}

.goal-top{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 18px;border-bottom:1px solid var(--rule);
  background:var(--paper-2);
  font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;
}
.goal-top-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill-pillar{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--ink)}
.pill-pillar .dot{width:8px;height:8px;border-radius:50%}
.pill-status{
  padding:4px 9px;border:1px solid currentColor;font-weight:700;letter-spacing:1.6px;
}
.pill-status.on{color:var(--ok);background:var(--ok-bg)}
.pill-status.at{color:var(--warn);background:var(--warn-bg)}
.pill-status.bl{color:var(--block);background:var(--block-bg)}
.pill-status.dn{color:var(--done);background:var(--done-bg)}
.goal-top-r{color:var(--ink-mid);font-weight:500}

.goal-head{padding:22px 22px 8px}
.goal-title{
  font-family:var(--serif);font-weight:800;font-style:italic;
  font-size:clamp(24px,4.6vw,34px);line-height:1.05;letter-spacing:-.025em;color:var(--ink);
  word-break:break-word;
}
.goal-title.is-done{text-decoration:line-through;text-decoration-thickness:2px;color:var(--ink-dim)}
.goal-north{
  font-family:var(--serif);font-weight:400;font-size:16px;line-height:1.45;color:var(--ink-mid);
  margin-top:10px;padding-left:12px;border-left:3px solid var(--accent);font-style:italic;
}
.goal-north:empty{display:none}

/* Progress */
.progress-row{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;
  padding:14px 22px 18px;border-bottom:1px dashed var(--rule);
}
.progress-bar-wrap{display:flex;flex-direction:column;gap:6px}
.progress-bar{height:10px;background:var(--paper-2);border:1px solid var(--ink);position:relative;overflow:hidden}
.progress-fill{height:100%;background:var(--ink);transition:width .25s}
.progress-fill.on{background:linear-gradient(90deg,var(--ok) 0%,#2B7A5C 100%)}
.progress-fill.at{background:linear-gradient(90deg,var(--warn) 0%,#C68617 100%)}
.progress-fill.bl{background:linear-gradient(90deg,var(--block) 0%,#B02E2E 100%)}
.progress-fill.dn{background:linear-gradient(90deg,var(--done) 0%,#4173A0 100%)}
.progress-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-mid)}
.progress-num{font-family:var(--serif);font-size:36px;font-weight:800;line-height:1;letter-spacing:-.025em}
.progress-num .pct{font-size:20px;font-weight:600;color:var(--ink-mid)}

/* Sections */
.goal-sections{padding:0 22px 8px}
.section{padding:14px 0;border-top:1px solid var(--rule-soft)}
.section:first-child{border-top:none}
.section-head{
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-mid);font-weight:700;padding:4px 0;
}
.section-head .arrow{transition:transform .15s;opacity:.5}
.section.open .section-head .arrow{transform:rotate(90deg)}
.section-body{display:none;padding:10px 0 4px}
.section.open .section-body{display:block}
.section-text{
  font-family:var(--serif);font-size:15px;line-height:1.55;color:var(--ink);
  white-space:pre-wrap;word-break:break-word;
}
.section-text.empty{color:var(--ink-dim);font-style:italic}
.section-edit-ta{
  width:100%;min-height:80px;padding:10px 12px;background:var(--card-alt);
  border:1px solid var(--ink);border-radius:0;resize:vertical;
  font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink);
  outline:none;
}
.section-edit-ta:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.section-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.sec-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
  padding:6px 10px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;
}
.sec-btn.primary{background:var(--ink);color:var(--paper)}
.sec-btn.danger{border-color:var(--block);color:var(--block)}

/* Footer of card */
.goal-foot{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 22px;background:var(--paper-2);border-top:1px solid var(--rule);
  font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-mid);
}
.goal-foot .btns{display:flex;gap:6px;flex-wrap:wrap}
.foot-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
  padding:5px 9px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;
}
.foot-btn:hover{background:var(--ink);color:var(--paper)}
.foot-btn.done-btn{border-color:var(--done);color:var(--done)}
.foot-btn.done-btn:hover{background:var(--done);color:#fff}
.foot-btn.del{border-color:var(--block);color:var(--block)}
.foot-btn.del:hover{background:var(--block);color:#fff}

/* ============ EMPTY STATE ============ */
.empty{
  padding:60px 24px;text-align:center;border:2px dashed var(--rule);background:var(--card);
}
.empty h3{font-family:var(--serif);font-style:italic;font-weight:700;font-size:28px;margin-bottom:10px;letter-spacing:-.02em}
.empty p{font-family:var(--serif);color:var(--ink-mid);font-size:15px;line-height:1.5;max-width:420px;margin:0 auto 18px}

/* ============ MODAL (add/edit) ============ */
.modal{
  position:fixed;inset:0;background:rgba(14,13,10,.55);z-index:100;display:none;
  align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;
}
.modal.open{display:flex}
.modal-card{
  background:var(--card);border:2px solid var(--ink);max-width:540px;width:100%;
  padding:28px 26px;position:relative;
}
.modal-head{
  font-family:var(--serif);font-style:italic;font-weight:800;font-size:28px;letter-spacing:-.02em;
  padding-bottom:14px;border-bottom:2px solid var(--ink);margin-bottom:18px;
}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink);line-height:1}

.field{margin-bottom:16px}
.field-label{
  font-family:var(--mono);font-size:10px;letter-spacing:1.8px;text-transform:uppercase;font-weight:700;
  color:var(--ink-mid);margin-bottom:6px;display:block;
}
.field-input{
  width:100%;padding:10px 12px;background:var(--card-alt);border:1px solid var(--ink);
  font-family:var(--serif);font-size:16px;color:var(--ink);outline:none;border-radius:0;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.field-textarea{min-height:70px;resize:vertical;line-height:1.5}

.pillar-picker,.status-picker{display:flex;flex-wrap:wrap;gap:6px}
.pick-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
  padding:8px 11px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:6px;
}
.pick-btn.active{background:var(--ink);color:var(--paper)}
.pick-btn .dot{width:8px;height:8px;border-radius:50%}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.field-row{grid-template-columns:1fr}}

.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:14px;border-top:1px solid var(--rule)}
.btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;
  padding:10px 16px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;
}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink)}

/* Floating add */
.fab{
  position:fixed;right:20px;bottom:24px;z-index:60;
  width:60px;height:60px;border-radius:0;background:var(--ink);color:var(--paper);
  border:none;cursor:pointer;font-family:var(--serif);font-size:30px;font-weight:700;
  box-shadow:4px 4px 0 var(--accent);transition:all .15s;
}
.fab:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--accent)}
.fab:active{transform:translate(0,0);box-shadow:2px 2px 0 var(--accent)}

/* Subtle animations */
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.goal{animation:slideIn .25s ease-out both}
</style>
</head>
<body>

<div class="wrap">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-top">
      <span class="edition" id="editionLbl">Edition · Loading</span>
      <span id="updatedLbl">Updated —</span>
    </div>
    <h1 id="quarterTitle">
      <em>The Quarterly</em>
      <span class="quarter" id="quarterSub">Q2 · 2026</span>
    </h1>
    <div class="masthead-meta">
      <span class="big" id="daysLeft">—</span>
      <span class="lbl">Days remaining</span>
    </div>
  </header>

  <!-- HEALTH STRIP -->
  <div class="health" id="healthStrip">
    <div class="health-cell on"><div class="v" id="cntOn">0</div><div class="l">On Track</div></div>
    <div class="health-cell at"><div class="v" id="cntAt">0</div><div class="l">At Risk</div></div>
    <div class="health-cell bl"><div class="v" id="cntBl">0</div><div class="l">Blocked</div></div>
    <div class="health-cell dn"><div class="v" id="cntDn">0</div><div class="l">Shipped</div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="pillar-chips" id="pillarChips"></div>
    <button class="add-btn" onclick="openAddModal()">+ New Goal</button>
  </div>

  <!-- GOALS LIST -->
  <div class="goals-list" id="goalsList"></div>

</div>

<!-- Floating add -->
<button class="fab" onclick="openAddModal()" title="New goal">+</button>

<!-- ADD/EDIT MODAL -->
<div class="modal" id="goalModal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-head" id="modalTitle">New Quarterly Goal</div>

    <div class="field">
      <label class="field-label">Goal title</label>
      <input type="text" class="field-input" id="fTitle" placeholder="e.g. Ship EZ Reader to the App Store" />
    </div>

    <div class="field">
      <label class="field-label">North Star — what does done look like?</label>
      <textarea class="field-input field-textarea" id="fNorth" placeholder="One sentence. The outcome that would make this quarter a win."></textarea>
    </div>

    <div class="field">
      <label class="field-label">Pillar</label>
      <div class="pillar-picker" id="pillarPicker"></div>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label">Status</label>
        <div class="status-picker" id="statusPicker"></div>
      </div>
      <div class="field">
        <label class="field-label">Target date</label>
        <input type="date" class="field-input" id="fTarget" />
      </div>
    </div>

    <div class="field">
      <label class="field-label">Progress (0–100)</label>
      <input type="number" class="field-input" id="fProgress" min="0" max="100" value="0" />
    </div>

    <div class="field">
      <label class="field-label">Why it matters</label>
      <textarea class="field-input field-textarea" id="fWhy" placeholder="Strategic rationale. What does landing this unlock?"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>

<script>
const SK='quarterly-goals-v1';
const PILLARS=[
  {id:'ezrk',label:'EZRK Apps',color:'var(--p-ezrk)'},
  {id:'vt',label:'VitalTouch',color:'var(--p-vt)'},
  {id:'bha',label:'Butterfly Health',color:'var(--p-bha)'},
  {id:'work',label:'Day Job',color:'var(--p-work)'},
  {id:'personal',label:'Personal',color:'var(--p-personal)'}
];
const STATUSES=[
  {id:'on',label:'On Track',cls:'on'},
  {id:'at',label:'At Risk',cls:'at'},
  {id:'bl',label:'Blocked',cls:'bl'},
  {id:'dn',label:'Shipped',cls:'dn'}
];

// State
let data=load();
let activeFilter='all';
let editingId=null;
let modalPillar='ezrk';
let modalStatus='on';
const expandedSections=new Set(); // goalId+":"+sectionKey
const editingSection={gid:null,key:null};

// ---- Data ----
function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // Seed with friendly defaults mapped to user's priorities
  return{
    currentQuarter:currentQuarterKey(),
    goals:[]
  };
}
function save(){
  try{
    localStorage.setItem(SK,JSON.stringify(data));
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push(SK,JSON.stringify(data))}catch{} }
  }catch(e){ console.warn('save failed',e); }
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ---- Quarter calc ----
function currentQuarterKey(d){
  d=d||new Date();
  const q=Math.floor(d.getMonth()/3)+1;
  return d.getFullYear()+'-Q'+q;
}
function currentQuarterRange(d){
  d=d||new Date();
  const q=Math.floor(d.getMonth()/3);
  const start=new Date(d.getFullYear(),q*3,1);
  const end=new Date(d.getFullYear(),q*3+3,0,23,59,59);
  return{start,end,q:q+1,y:d.getFullYear()};
}
function quarterEndKey(){
  const {end}=currentQuarterRange();
  return end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');
}
function daysLeft(){
  const {end}=currentQuarterRange();
  const ms=end.getTime()-Date.now();
  return Math.max(0,Math.ceil(ms/86400000));
}

// ---- Masthead / header ----
function renderMasthead(){
  const {q,y}=currentQuarterRange();
  const editionNum=((y-2020)*4+q);
  document.getElementById('editionLbl').textContent='Vol. '+y+' · No. '+editionNum;
  document.getElementById('quarterSub').textContent='Q'+q+' · '+y;
  document.getElementById('daysLeft').textContent=daysLeft();
  const g=data.goals||[];
  let latest=0;
  g.forEach(x=>{ if(x.updatedAt){ const t=new Date(x.updatedAt).getTime(); if(t>latest) latest=t; }});
  document.getElementById('updatedLbl').textContent = latest ? ('Updated '+relativeTime(latest)) : 'Updated —';
}
function relativeTime(t){
  const d=(Date.now()-t)/1000;
  if(d<60)return'just now';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  const days=Math.floor(d/86400);
  if(days<30)return days+'d ago';
  return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ---- Health ----
function renderHealth(){
  const g=data.goals||[];
  const counts={on:0,at:0,bl:0,dn:0};
  g.forEach(x=>{ if(counts[x.status]!=null) counts[x.status]++; });
  document.getElementById('cntOn').textContent=counts.on;
  document.getElementById('cntAt').textContent=counts.at;
  document.getElementById('cntBl').textContent=counts.bl;
  document.getElementById('cntDn').textContent=counts.dn;
}

// ---- Pillar chips ----
function renderPillarChips(){
  const all=data.goals||[];
  const el=document.getElementById('pillarChips');
  const counts={all:all.length};
  PILLARS.forEach(p=>{ counts[p.id]=all.filter(g=>g.pillar===p.id).length; });
  let html=`<button class="pchip ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All <span style="opacity:.5;margin-left:4px">${counts.all}</span></button>`;
  PILLARS.forEach(p=>{
    if(!counts[p.id]) return;
    html+=`<button class="pchip ${activeFilter===p.id?'active':''}" onclick="setFilter('${p.id}')"><span class="dot" style="background:${p.color}"></span>${p.label} <span style="opacity:.5;margin-left:4px">${counts[p.id]}</span></button>`;
  });
  el.innerHTML=html;
}
function setFilter(f){ activeFilter=f; renderPillarChips(); renderList(); }

// ---- Goal list ----
function statusMeta(id){ return STATUSES.find(s=>s.id===id)||STATUSES[0]; }
function pillarMeta(id){ return PILLARS.find(p=>p.id===id)||PILLARS[0]; }

function renderList(){
  const list=document.getElementById('goalsList');
  let goals=data.goals||[];
  if(activeFilter!=='all') goals=goals.filter(g=>g.pillar===activeFilter);
  // Sort: done to bottom; then blocked/at risk to top; then by progress asc
  const rank={on:1,at:0,bl:-1,dn:99};
  goals=goals.slice().sort((a,b)=>{
    if((rank[a.status]??1)!==(rank[b.status]??1)) return (rank[a.status]??1)-(rank[b.status]??1);
    return (a.progress||0)-(b.progress||0);
  });

  if(!goals.length){
    list.innerHTML=`<div class="empty">
      <h3>No quarterly goals yet.</h3>
      <p>Quarterly goals are the 3–5 strategic bets that define the next 90 days. Not todos. Big moves.</p>
      <button class="add-btn" onclick="openAddModal()">+ Set your first goal</button>
    </div>`;
    return;
  }
  list.innerHTML=goals.map(g=>renderGoalCard(g)).join('');
}

function renderGoalCard(g){
  const pm=pillarMeta(g.pillar);
  const sm=statusMeta(g.status);
  const progress=Math.max(0,Math.min(100,g.progress||0));
  const targetLbl = g.targetDate ? fmtDate(g.targetDate) : 'End of quarter';
  const daysToTarget = g.targetDate ? daysUntil(g.targetDate) : daysLeft();
  const isDone = g.status==='dn';

  const sections=[
    {k:'why',label:'Why it matters',val:g.why||''},
    {k:'move',label:"This week's move",val:g.thisWeek||''},
    {k:'milestones',label:'Milestones',val:g.milestones||''},
    {k:'wins',label:'Wins',val:g.wins||''},
    {k:'blockers',label:'Blockers',val:g.blockers||''}
  ];

  const sectionsHTML=sections.map(s=>{
    const openKey=g.id+':'+s.k;
    const isOpen=expandedSections.has(openKey);
    const isEditing=editingSection.gid===g.id && editingSection.key===s.k;
    let body='';
    if(isEditing){
      body=`<div class="section-body" style="display:block">
        <textarea class="section-edit-ta" id="edit-${g.id}-${s.k}" placeholder="Write freely. Context, story, decisions.">${escapeHtml(s.val)}</textarea>
        <div class="section-actions">
          <button class="sec-btn" onclick="cancelSectionEdit()">Cancel</button>
          <button class="sec-btn primary" onclick="saveSection('${g.id}','${s.k}')">Save</button>
        </div>
      </div>`;
    } else {
      body=`<div class="section-body">
        <div class="section-text ${s.val?'':'empty'}">${s.val?escapeHtml(s.val):'Tap to add —'}</div>
      </div>`;
    }
    return `<div class="section ${isOpen||isEditing?'open':''}">
      <div class="section-head" onclick="toggleSection('${g.id}','${s.k}',event)">
        <span>${s.label}${s.val?'':' <span style="color:var(--ink-dim);text-transform:none;letter-spacing:0;font-family:var(--serif);font-weight:400;font-style:italic;margin-left:6px">empty</span>'}</span>
        <span class="arrow">›</span>
      </div>
      ${body}
    </div>`;
  }).join('');

  return `<article class="goal" data-id="${g.id}">
    <div class="goal-top">
      <div class="goal-top-l">
        <span class="pill-pillar"><span class="dot" style="background:${pm.color}"></span>${pm.label}</span>
        <span class="pill-status ${sm.cls}">${sm.label}</span>
      </div>
      <div class="goal-top-r">${targetLbl}${daysToTarget!=null?' · '+daysToTarget+'d':''}</div>
    </div>
    <div class="goal-head">
      <div class="goal-title ${isDone?'is-done':''}">${escapeHtml(g.title||'Untitled goal')}</div>
      ${g.north?`<div class="goal-north">${escapeHtml(g.north)}</div>`:''}
    </div>
    <div class="progress-row">
      <div class="progress-bar-wrap">
        <div class="progress-lbl">Progress</div>
        <div class="progress-bar"><div class="progress-fill ${sm.cls}" style="width:${progress}%"></div></div>
      </div>
      <div class="progress-num">${progress}<span class="pct">%</span></div>
    </div>
    <div class="goal-sections">${sectionsHTML}</div>
    <div class="goal-foot">
      <span>Updated ${g.updatedAt?relativeTime(new Date(g.updatedAt).getTime()):'—'}</span>
      <div class="btns">
        <button class="foot-btn" onclick="cycleStatus('${g.id}')" title="Change status">Status</button>
        <button class="foot-btn" onclick="nudgeProgress('${g.id}',-5)">–5%</button>
        <button class="foot-btn" onclick="nudgeProgress('${g.id}',5)">+5%</button>
        <button class="foot-btn" onclick="openEditModal('${g.id}')">Edit</button>
        ${isDone?'':`<button class="foot-btn done-btn" onclick="markShipped('${g.id}')">Ship</button>`}
        <button class="foot-btn del" onclick="deleteGoal('${g.id}')">Delete</button>
      </div>
    </div>
  </article>`;
}

function toggleSection(gid,key,ev){
  if(ev) ev.stopPropagation();
  const k=gid+':'+key;
  // Double-tap to edit
  const card=document.querySelector(`.goal[data-id="${gid}"]`);
  const openBefore=expandedSections.has(k);
  if(!openBefore){
    expandedSections.add(k);
    renderList();
  } else {
    // Second tap opens editor
    editingSection.gid=gid; editingSection.key=key;
    renderList();
    setTimeout(()=>{
      const ta=document.getElementById('edit-'+gid+'-'+key);
      if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); }
    },50);
  }
}
function cancelSectionEdit(){
  editingSection.gid=null; editingSection.key=null;
  renderList();
}
function saveSection(gid,key){
  const ta=document.getElementById('edit-'+gid+'-'+key);
  if(!ta) return;
  const g=data.goals.find(x=>x.id===gid);
  if(!g) return;
  const map={why:'why',move:'thisWeek',milestones:'milestones',wins:'wins',blockers:'blockers'};
  g[map[key]]=ta.value.trim();
  g.updatedAt=new Date().toISOString();
  save();
  editingSection.gid=null; editingSection.key=null;
  expandedSections.add(gid+':'+key);
  renderAll();
}

function cycleStatus(gid){
  const g=data.goals.find(x=>x.id===gid);
  if(!g)return;
  const order=['on','at','bl','dn'];
  const idx=order.indexOf(g.status||'on');
  g.status=order[(idx+1)%order.length];
  g.updatedAt=new Date().toISOString();
  save();
  renderAll();
}
function nudgeProgress(gid,delta){
  const g=data.goals.find(x=>x.id===gid);
  if(!g)return;
  g.progress=Math.max(0,Math.min(100,(g.progress||0)+delta));
  if(g.progress===100 && g.status!=='dn') g.status='dn';
  if(g.progress<100 && g.status==='dn') g.status='on';
  g.updatedAt=new Date().toISOString();
  save();
  renderAll();
}
function markShipped(gid){
  const g=data.goals.find(x=>x.id===gid);
  if(!g)return;
  g.status='dn'; g.progress=100;
  g.updatedAt=new Date().toISOString();
  save();
  renderAll();
}
function deleteGoal(gid){
  if(!confirm('Delete this goal? This cannot be undone.'))return;
  data.goals=data.goals.filter(x=>x.id!==gid);
  save();
  renderAll();
}

// ---- Modal ----
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='New Quarterly Goal';
  document.getElementById('fTitle').value='';
  document.getElementById('fNorth').value='';
  document.getElementById('fWhy').value='';
  document.getElementById('fProgress').value='0';
  document.getElementById('fTarget').value=quarterEndKey();
  modalPillar='ezrk'; modalStatus='on';
  renderPickers();
  document.getElementById('goalModal').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),80);
}
function openEditModal(gid){
  const g=data.goals.find(x=>x.id===gid);
  if(!g)return;
  editingId=gid;
  document.getElementById('modalTitle').textContent='Edit Goal';
  document.getElementById('fTitle').value=g.title||'';
  document.getElementById('fNorth').value=g.north||'';
  document.getElementById('fWhy').value=g.why||'';
  document.getElementById('fProgress').value=String(g.progress||0);
  document.getElementById('fTarget').value=g.targetDate||quarterEndKey();
  modalPillar=g.pillar||'ezrk'; modalStatus=g.status||'on';
  renderPickers();
  document.getElementById('goalModal').classList.add('open');
}
function closeModal(){
  document.getElementById('goalModal').classList.remove('open');
  editingId=null;
}
function renderPickers(){
  document.getElementById('pillarPicker').innerHTML=PILLARS.map(p=>
    `<button class="pick-btn ${modalPillar===p.id?'active':''}" onclick="modalPillar='${p.id}';renderPickers()"><span class="dot" style="background:${p.color}"></span>${p.label}</button>`
  ).join('');
  document.getElementById('statusPicker').innerHTML=STATUSES.map(s=>
    `<button class="pick-btn ${modalStatus===s.id?'active':''}" onclick="modalStatus='${s.id}';renderPickers()">${s.label}</button>`
  ).join('');
}
function saveGoal(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ alert('Give the goal a title.'); return; }
  const north=document.getElementById('fNorth').value.trim();
  const why=document.getElementById('fWhy').value.trim();
  const progress=Math.max(0,Math.min(100,parseInt(document.getElementById('fProgress').value||'0',10)));
  const targetDate=document.getElementById('fTarget').value||quarterEndKey();
  const now=new Date().toISOString();
  if(editingId){
    const g=data.goals.find(x=>x.id===editingId);
    if(g){ Object.assign(g,{title,north,why,progress,targetDate,pillar:modalPillar,status:modalStatus,updatedAt:now}); }
  } else {
    if(!Array.isArray(data.goals)) data.goals=[];
    data.goals.unshift({
      id:uid(),title,north,why,progress,targetDate,pillar:modalPillar,status:modalStatus,
      thisWeek:'',milestones:'',wins:'',blockers:'',
      createdAt:now,updatedAt:now,
      quarter:currentQuarterKey()
    });
  }
  save();
  closeModal();
  renderAll();
}

// ---- Utilities ----
function escapeHtml(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}
function fmtDate(dk){
  const d=new Date(dk+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function daysUntil(dk){
  const d=new Date(dk+'T12:00:00');
  const ms=d.getTime()-Date.now();
  return Math.max(0,Math.ceil(ms/86400000));
}

// ---- Render all ----
function renderAll(){
  renderMasthead();
  renderHealth();
  renderPillarChips();
  renderList();
}

// Close modal on backdrop click or Esc
document.getElementById('goalModal').addEventListener('click',e=>{
  if(e.target.id==='goalModal') closeModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); cancelSectionEdit(); }
});

// Cross-tab sync
window.addEventListener('storage',e=>{
  if(e.key===SK){ data=load(); renderAll(); }
});

// First run: show empty state with seed suggestions
renderAll();

// Gentle helpful banner: if no goals AND current priorities suggest some, preload suggestions (user can accept/ignore)
(function firstRunHint(){
  if((data.goals||[]).length>0) return;
  // Don't auto-insert; just let the empty state speak.
})();

// Expose for quick debug
try{ window._quarterly={data,save,load,render:renderAll}; }catch{}
</script>
