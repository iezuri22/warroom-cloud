<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Quarterly Goals</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quarterly">
<meta name="theme-color" content="#F5F1E8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* Dark + white — TV-friendly. Read from across the room. */
  --bg:#050507; --surface:#15151B; --surface-2:#0E0E13; --surface-3:#1E1E26;
  --border:rgba(255,255,255,0.10); --border-2:rgba(255,255,255,0.20);
  --text:#FFFFFF; --text-mid:rgba(255,255,255,0.78); --text-dim:rgba(255,255,255,0.55); --text-fade:rgba(255,255,255,0.36);
  --accent:#FF8A3D;
  --accent-bg:rgba(255,138,61,0.18);
  --accent-soft:rgba(255,138,61,0.10);
  --ok:#4ADE80; --ok-bg:rgba(74,222,128,0.16);
  --warn:#FBBF24; --warn-bg:rgba(251,191,36,0.16);
  --block:#F87171; --block-bg:rgba(248,113,113,0.18);
  --done:#38BDF8; --done-bg:rgba(56,189,248,0.16);

  --p-ezrk:#FF8A3D;
  --p-vt:#30D158;
  --p-bha:#BF5AF2;
  --p-work:#5AC8FA;
  --p-personal:#FF9F0A;

  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
  --radius:14px;
  --radius-sm:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:17px}
body{padding:16px 14px 120px}
@media(min-width:1000px){html,body{font-size:18px}}
@media(min-width:1500px){html,body{font-size:19px}}
@media(min-width:900px){body{padding:24px 32px 140px}}

/* ============ HEADER ============ */
.hero{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 18px 16px;margin:0 auto 14px;position:relative;overflow:hidden;
  max-width:1180px;
}
.hero::after{
  content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-bg) 0%,transparent 70%);pointer-events:none;
}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);position:relative;z-index:1}
.hero-top .updated{color:var(--text-fade)}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;position:relative;z-index:1}
.hero-title{font-size:clamp(28px,7vw,40px);font-weight:900;letter-spacing:-.03em;line-height:1}
.hero-title .q{color:var(--accent)}
.hero-sub{font-size:12px;font-weight:600;color:var(--text-mid);margin-top:6px;letter-spacing:.2px}
.hero-days{text-align:right;flex-shrink:0}
.hero-days .n{font-size:clamp(32px,8vw,44px);font-weight:900;line-height:1;letter-spacing:-.03em;color:var(--text)}
.hero-days .l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px}

/* ============ HEALTH STRIP ============ */
.health{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 auto 16px;
  max-width:1180px;
}
@media(max-width:560px){
  /* Radically compact chrome on mobile — goals show immediately */
  body{padding:8px 10px 120px}
  /* Fold hero into one-line strip: "Q2 · 72d" + edition label */
  .hero{
    padding:10px 12px;margin-bottom:8px;border-radius:10px;
    background:var(--surface);
  }
  .hero::after{display:none}
  .hero-top{display:none}
  .hero-row{align-items:center;gap:8px}
  .hero-title{font-size:18px;letter-spacing:-.03em;line-height:1.1}
  .hero-sub{font-size:10px;margin-top:1px;letter-spacing:.3px}
  .hero-days{text-align:right}
  .hero-days .n{font-size:20px;line-height:1}
  .hero-days .l{font-size:8px;letter-spacing:.8px;margin-top:2px}
  /* Quarter nav shrinks to pair of tiny chevrons */
  .qnav{margin-bottom:8px;gap:4px}
  .qnav-btn{padding:5px 10px;font-size:10px;letter-spacing:.5px}
  /* Health strip — horizontal-swipe with full cards instead of 2x2 squished grid */
  .health{
    display:flex;grid-template-columns:none;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
    scroll-snap-type:x mandatory;gap:6px;padding-bottom:4px;margin-bottom:8px;
  }
  .health::-webkit-scrollbar{display:none}
  .hc{min-width:26vw;flex-shrink:0;scroll-snap-align:start;padding:8px 10px}
  .hc .v{font-size:18px}
  .hc .l{font-size:8.5px;letter-spacing:.8px}
  .toolbar{margin-bottom:8px}
  .chip{padding:5px 10px;font-size:10px}
}
.hc{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 8px;text-align:center;
}
.hc .v{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.02em}
.hc .l{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-top:5px}
@media(max-width:420px){
  .hc{padding:8px 6px}
  .hc .v{font-size:18px}
  .hc .l{font-size:8px;letter-spacing:1px}
}
.hc.on .v{color:var(--ok)}
.hc.at .v{color:var(--warn)}
.hc.bl .v{color:var(--block)}
.hc.dn .v{color:var(--done)}

/* ============ TOOLBAR ============ */
.toolbar{display:flex;align-items:center;gap:8px;margin:0 auto 14px;flex-wrap:wrap;max-width:1180px}
.chips{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:7px 11px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px;
}
.chip:active{transform:scale(.96)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip .num{font-size:9px;opacity:.6;font-weight:700;margin-left:2px}
.chip.active .num{opacity:.9}

.add-btn{
  font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:9px 14px;border-radius:10px;background:var(--accent);color:#000;border:none;cursor:pointer;
  flex-shrink:0;transition:transform .1s,filter .1s;
}
.add-btn:active{transform:scale(.97);filter:brightness(.95)}

/* ============ VIEW TOGGLE (List | Timeline) ============ */
.view-toggle{
  display:inline-flex;background:var(--surface-2);border:1px solid var(--border);
  border-radius:10px;padding:3px;gap:2px;margin:0 auto 12px;max-width:1180px;
}
.vt-btn{
  background:transparent;border:none;cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  color:var(--text-mid);padding:7px 14px;border-radius:7px;transition:all .12s;
}
.vt-btn:hover{color:var(--text)}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.25)}

/* ============ TIMELINE VIEW ============ */
.timeline{display:flex;flex-direction:column;gap:10px;max-width:1180px;margin:0 auto}
.tl-week{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px 12px;display:flex;flex-direction:column;gap:10px;position:relative;
}
.tl-week.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-bg)}
.tl-week.empty{opacity:.5}
.tl-week-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tl-week-label{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.tl-week-eyebrow{
  font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-fade);
}
.tl-week.current .tl-week-eyebrow{color:var(--accent)}
.tl-week-title{font-size:18px;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.tl-week-range{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:.2px}
.tl-week-count{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:.4px}
.tl-week-empty{
  font-size:13px;color:var(--text-fade);font-style:italic;letter-spacing:.1px;
}
.tl-goals{display:flex;flex-direction:column;gap:8px}
.tl-goal{
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;flex-direction:column;gap:6px;
  border-left:3px solid var(--accent);
}
.tl-goal-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.tl-goal-pillar{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:3px 7px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--text-mid);
  flex-shrink:0;
}
.tl-goal-title{font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--text);line-height:1.25;flex:1;min-width:0}
.tl-goal-tag{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:3px 7px;border-radius:999px;background:var(--accent-bg);color:var(--accent);
  flex-shrink:0;
}
.tl-tasks{display:flex;flex-direction:column;gap:4px;margin-left:6px}
.tl-task{
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
  color:var(--text-mid);line-height:1.3;
}
.tl-task .cb{
  width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border-2);
  flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;
}
.tl-task.done{color:var(--text-fade)}
.tl-task.done .cb{background:var(--ok);border-color:var(--ok);color:#000}
.tl-task.done .cb::after{content:'✓'}
.tl-task .due{
  margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--text-fade);
  flex-shrink:0;
}
.tl-task .due.overdue{background:var(--block-bg);color:var(--block)}
.tl-task .due.today{background:var(--ok-bg);color:var(--ok)}
.tl-task .due.soon{background:var(--accent-bg);color:var(--accent)}

/* ============ CARD ============ */
.list{display:grid;grid-template-columns:1fr;gap:14px;align-items:start;max-width:1180px;margin:0 auto}
@media(min-width:620px){.list{grid-template-columns:repeat(2,1fr);gap:16px}}
@media(min-width:1080px){.list{grid-template-columns:repeat(3,1fr);gap:18px}}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px 16px 14px;display:flex;flex-direction:column;gap:12px;
  transition:border-color .12s,transform .12s,box-shadow .12s;position:relative;
  box-shadow:0 1px 2px rgba(60,60,67,0.04);
}
.card:hover{border-color:var(--border-2);box-shadow:0 2px 8px rgba(60,60,67,0.08)}
.card.dn{background:rgba(22,163,74,0.04);border-color:rgba(22,163,74,0.25)}
.card.bl{border-color:rgba(220,38,38,0.3)}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-top-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.pillar{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-mid);
}
.pillar .d{width:8px;height:8px;border-radius:50%}
.status{
  font-size:9.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
}
.status.on{color:var(--ok);background:var(--ok-bg)}
.status.at{color:var(--warn);background:var(--warn-bg)}
.status.bl{color:var(--block);background:var(--block-bg)}
.status.dn{color:var(--done);background:var(--done-bg)}
.card-top-r{font-size:10.5px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;white-space:nowrap}
.card-top-r.overdue{color:var(--block)}
.card-top-r.soon{color:var(--warn)}

.title{font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.02em;color:var(--text);word-break:break-word}
.card.dn .title{color:var(--text-mid);opacity:0.8}

.notes{
  font-size:13px;font-weight:400;line-height:1.5;color:var(--text-mid);
  padding:9px 11px;background:var(--surface-2);border-left:2px solid var(--accent);border-radius:4px;
  white-space:pre-wrap;word-break:break-word;cursor:text;
}
.notes.empty{color:var(--text-fade);font-style:italic;border-left-color:var(--border)}

.prog-row{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;transition:width .25s ease;border-radius:3px}
.prog-fill.on{background:var(--ok)}
.prog-fill.at{background:var(--warn)}
.prog-fill.bl{background:var(--block)}
.prog-fill.dn{background:var(--done)}
.prog-num{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.01em;min-width:42px;text-align:right}

.actions{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--border);margin-top:2px;padding-top:10px}
.ab{
  font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.3px;
  padding:6px 10px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-mid);cursor:pointer;
  transition:all .1s;display:inline-flex;align-items:center;gap:4px;
}
.ab:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}
.ab:active{transform:scale(.97)}
.ab.primary{background:var(--accent-bg);color:var(--accent);border-color:rgba(255,138,61,.3)}
.ab.ship{color:var(--done);border-color:rgba(90,200,250,.25)}
.ab.del{color:var(--block);border-color:rgba(255,69,58,.22);margin-left:auto}
.ab svg{width:11px;height:11px}

/* ============ BOARD WORK SECTION ============ */
.work-section{margin-top:24px}
.work-section-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:12px;padding:0 2px;
}
.work-section-title{
  font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;
}
.work-section-title .tally{
  color:var(--text);background:var(--surface-2);padding:3px 8px;border-radius:5px;
  font-size:10px;font-weight:800;letter-spacing:.3px;text-transform:none;
}
.work-hidden-toggle{
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.4px;
  padding:5px 10px;border-radius:6px;background:transparent;color:var(--text-dim);
  border:1px solid var(--border);cursor:pointer;transition:all .1s;
}
.work-hidden-toggle:hover{color:var(--text);border-color:var(--border-2)}
.work-hidden-toggle.on{background:var(--surface-2);color:var(--text)}

/* ============ QUARTER NAV ============ */
.qnav{display:flex;align-items:center;gap:8px;margin:0 auto 14px;max-width:1180px}
.qnav-btn{
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.4px;
  padding:9px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .1s;flex:1;text-align:center;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.qnav-btn:hover{color:var(--text);border-color:var(--border-2);background:var(--surface-2)}
.qnav-btn:active{transform:scale(.98)}
.qnav-now{
  font-family:inherit;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:9px 12px;border-radius:8px;background:var(--accent);color:#000;border:none;cursor:pointer;
  transition:all .1s;flex-shrink:0;
}
.qnav-now:active{transform:scale(.97)}
.qnav-now.hidden{display:none}
.viewing-other-q .hero{border-color:rgba(255,138,61,.3)}

/* Board-work cards share the quarterly goal card look so they feel like peers, not second-class rows */
.card.is-hidden{opacity:.55;border-style:dashed}
.card .title.clickable{cursor:pointer;transition:color .12s}
.card .title.clickable:hover{color:var(--accent)}

.bwg-board-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text-mid);
  padding:3px 8px;border-radius:5px;background:var(--surface-2);
}
.bwg-board-pill .d{width:7px;height:7px;border-radius:50%}

/* Compact quarter select on board-work card */
.bwg-q-select{
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text-mid);
  padding:3px 20px 3px 8px;border-radius:5px;background:var(--surface-2);
  border:1px solid var(--border);cursor:pointer;outline:none;
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='rgba(60,60,67,0.5)' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 6px center;
}
.bwg-q-select:hover{border-color:var(--border-2);color:var(--text)}

/* Tasks toggle */
.bwg-tasks-toggle{
  font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.4px;
  padding:6px 10px;border-radius:6px;background:transparent;color:var(--text-dim);
  border:1px solid var(--border);cursor:pointer;transition:all .1s;align-self:flex-start;
}
.bwg-tasks-toggle:hover{color:var(--text);border-color:var(--border-2);background:var(--surface-2)}

/* Inline task list */
.bwg-tasks{display:flex;flex-direction:column;gap:2px;padding-top:10px;border-top:1px solid var(--border)}
.bwg-tasks.collapsed{padding-top:8px}
.bwg-task{
  display:flex;align-items:center;gap:9px;padding:5px 2px;font-size:13px;cursor:pointer;
  border-radius:5px;transition:background .1s;
}
.bwg-task:hover{background:var(--surface-2)}
.bwg-task input[type=checkbox]{
  appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border-2);
  border-radius:4px;background:var(--surface-2);cursor:pointer;flex-shrink:0;
  transition:all .12s;position:relative;
}
.bwg-task input[type=checkbox]:checked{background:var(--ok);border-color:var(--ok)}
.bwg-task input[type=checkbox]:checked::after{
  content:'';position:absolute;top:1px;left:4px;width:4px;height:8px;
  border:solid #000;border-width:0 2px 2px 0;transform:rotate(45deg);
}
.bwg-task-txt{flex:1;color:var(--text-mid);line-height:1.4;word-break:break-word;letter-spacing:-.01em}
.bwg-task.done .bwg-task-txt{color:var(--text-dim)}
.bwg-add-task{display:flex;align-items:center;gap:6px;margin-top:4px}
.bwg-add-task input{
  flex:1;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:12.5px;color:var(--text);outline:none;transition:border-color .1s;
}
.bwg-add-task input:focus{border-color:var(--accent)}
.bwg-add-task input::placeholder{color:var(--text-fade)}

/* "+ Today" button on every task row — sends task to daily planner */
.bwg-task-plan{
  font-family:inherit;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 7px;border-radius:4px;background:transparent;color:var(--text-fade);
  border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:all .1s;
  white-space:nowrap;
}
.bwg-task-plan:hover{color:var(--accent);border-color:rgba(255,138,61,.4);background:var(--accent-bg)}
.bwg-task-plan:active{transform:scale(.95)}
.bwg-task-plan.queued{color:var(--ok);border-color:rgba(48,209,88,.35);background:var(--ok-bg)}

/* Wrapper so each task can carry a date row underneath */
.bwg-task-wrap{padding:2px 0}
.bwg-task-wrap.done .bwg-task-dates{opacity:.45}
.bwg-task-wrap > .bwg-task{cursor:pointer}
.bwg-task-pushed{
  font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;background:var(--ok-bg);color:var(--ok);
  flex-shrink:0;
}
.bwg-task-due-pill{
  font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;
  background:var(--surface-2);color:var(--text-dim);
  flex-shrink:0;
}
.bwg-task-due-pill.soon{background:var(--accent-bg);color:var(--accent)}
.bwg-task-due-pill.overdue{background:var(--block-bg);color:var(--block)}
/* Dates row hidden by default; only revealed when the parent wrap is expanded
   (toggled by clicking the task body). */
.bwg-task-dates{
  display:none;align-items:center;flex-wrap:wrap;gap:6px;
  margin-left:25px;
  padding:2px 0 4px;
  font-size:11px;
}
.bwg-task-wrap.expanded > .bwg-task-dates{display:flex}
.bwg-task-dates-lbl{
  font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-fade);
}
.bwg-task-date{
  font-family:inherit;font-size:11px;color:var(--text-mid);
  padding:3px 6px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:5px;
  min-width:120px;
}
.bwg-task-date:focus{outline:none;border-color:var(--accent)}
.bwg-task-auto-hint{
  font-size:10px;color:var(--text-fade);font-weight:600;font-style:italic;
}
@media(max-width:560px){
  .bwg-task-dates{margin-left:22px;gap:4px}
  .bwg-task-date{min-width:108px;font-size:10.5px;padding:2px 5px}
  .bwg-task-auto-hint{flex-basis:100%;margin-left:0}
}

/* Toolbar-level show-hidden toggle */
.toolbar-hidden-toggle{
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  padding:8px 10px;border-radius:10px;background:transparent;color:var(--text-dim);
  border:1px solid var(--border);cursor:pointer;transition:all .1s;flex-shrink:0;
}
.toolbar-hidden-toggle:hover{color:var(--text);border-color:var(--border-2)}
.toolbar-hidden-toggle.on{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}

/* Toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;
  padding:10px 16px;font-size:12.5px;font-weight:700;letter-spacing:.2px;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;pointer-events:none;
  transition:opacity .18s,transform .18s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Two progress bars with labels */
.prog-row .prog-label{
  font-size:9.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-dim);min-width:46px;
}

.wg-empty{
  padding:30px 18px;text-align:center;border:1.5px dashed var(--border);border-radius:12px;
  color:var(--text-fade);font-size:13px;line-height:1.55;
}

/* ============ EMPTY ============ */
.empty{
  padding:48px 22px;text-align:center;border:2px dashed var(--border);border-radius:var(--radius);
  background:var(--surface);
}
.empty h3{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.empty p{font-size:13px;line-height:1.55;color:var(--text-mid);max-width:340px;margin:0 auto 16px}

/* ============ MODAL ============ */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;
}
.modal.open{display:flex}
.modal-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  max-width:480px;width:100%;padding:18px 18px 14px;position:relative;
  animation:popIn .2s ease-out;
}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:16px;font-weight:800;letter-spacing:-.01em;
  padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;padding:4px 8px;line-height:1}
.modal-close:hover{color:var(--text)}

.f{margin-bottom:12px}
.f-l{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block}
.f-i{
  width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:15px;color:var(--text);outline:none;transition:border-color .1s;
}
.f-i:focus{border-color:var(--accent)}
.f-i::placeholder{color:var(--text-fade)}
textarea.f-i{min-height:70px;resize:vertical;line-height:1.5;font-size:14px}

.picker{display:flex;flex-wrap:wrap;gap:5px}
.pk{
  font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:7px 11px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:6px;
}
.pk.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.pk .d{width:7px;height:7px;border-radius:50%}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:420px){.row{grid-template-columns:1fr}}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:5px;background:var(--surface-2);border-radius:3px;outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);
}
.slider-row .val{font-size:15px;font-weight:800;min-width:46px;text-align:right;letter-spacing:-.01em}

.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.btn{
  font-family:inherit;font-size:12px;font-weight:800;letter-spacing:.3px;
  padding:10px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text-mid);
  transition:all .1s;
}
.btn:hover{color:var(--text);border-color:var(--border-2)}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.97)}

/* FAB */
.fab{
  position:fixed;right:18px;bottom:22px;z-index:60;
  width:54px;height:54px;border-radius:50%;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:26px;font-weight:800;line-height:1;
  box-shadow:0 6px 18px rgba(255,138,61,.35),0 2px 4px rgba(0,0,0,.25);
  transition:transform .1s,filter .1s;
}
.fab:active{transform:scale(.95)}
.fab:hover{filter:brightness(1.05)}

/* ============ TWO-COLUMN LAYOUT (desktop) ============ */
@media(min-width:900px){
  body{padding:20px 28px;max-width:none;margin:0}
  .wg-layout{
    display:grid;grid-template-columns:230px 1fr;gap:22px;
    max-width:none;align-items:start;
  }
  .wg-sidebar{
    position:sticky;top:20px;
    display:flex;flex-direction:column;gap:10px;
    max-height:calc(100vh - 40px);overflow-y:auto;
    padding-right:4px;
  }
  .wg-sidebar .hero{max-width:none;margin:0}
  .wg-sidebar .qnav{margin:0;justify-content:flex-start;gap:6px;flex-wrap:wrap}
  .wg-sidebar .qnav-btn{font-size:11px;padding:6px 10px}
  .wg-sidebar .health{
    grid-template-columns:1fr;gap:6px;max-width:none;margin:0;
  }
  .wg-sidebar .health .hc{padding:10px 12px;display:flex;flex-direction:row-reverse;align-items:center;justify-content:space-between;gap:8px}
  .wg-sidebar .health .hc .v{font-size:18px}
  .wg-sidebar .health .hc .l{margin-top:0;font-size:9.5px;letter-spacing:.8px}
  .wg-sidebar .toolbar{
    margin:0;flex-direction:column;align-items:stretch;gap:10px;
  }
  .wg-sidebar .chips{flex-wrap:wrap;flex:none}
  .wg-sidebar .add-btn{width:100%}
  .wg-sidebar .toolbar-hidden-toggle{align-self:flex-start}
  .wg-main{min-width:0;width:100%}
  .wg-main .list{max-width:none;margin:0}
  /* Hide floating FAB on desktop — use + Goal button in sidebar */
  .fab{display:none}
}
</style>
</head>
<body>

<div class="wg-layout">
<aside class="wg-sidebar">
<header class="hero">
  <div class="hero-top">
    <span id="editionLbl">Edition —</span>
    <span class="updated" id="updatedLbl">Updated —</span>
  </div>
  <div class="hero-row">
    <div>
      <div class="hero-title">The <span class="q" id="quarterQ">Q2</span> Plan</div>
      <div class="hero-sub" id="quarterSub">April – June · 2026</div>
    </div>
    <div class="hero-days">
      <div class="n" id="daysLeft">—</div>
      <div class="l" id="daysLeftLbl">Days left</div>
    </div>
  </div>
</header>

<div class="qnav">
  <button class="qnav-btn" id="qnavPrev" onclick="shiftQuarter(-1)">‹ Prev</button>
  <button class="qnav-now hidden" id="qnavNow" onclick="jumpToCurrentQuarter()">Today</button>
  <button class="qnav-btn" id="qnavNext" onclick="shiftQuarter(1)">Next ›</button>
</div>

<div class="health">
  <div class="hc on"><div class="v" id="cntOn">0</div><div class="l">On Track</div></div>
  <div class="hc at"><div class="v" id="cntAt">0</div><div class="l">At Risk</div></div>
  <div class="hc bl"><div class="v" id="cntBl">0</div><div class="l">Blocked</div></div>
  <div class="hc dn"><div class="v" id="cntDn">0</div><div class="l">Shipped</div></div>
</div>

<div class="toolbar">
  <div class="chips" id="chips"></div>
  <button class="toolbar-hidden-toggle" id="hiddenToggle" onclick="toggleShowHidden()" style="display:none">Show hidden</button>
  <button class="add-btn" onclick="openAddModal()">+ Goal</button>
</div>

<div class="view-toggle" role="tablist" aria-label="Goals view">
  <button class="vt-btn" id="vtList" data-view="list" onclick="setGoalsView('list')">List</button>
  <button class="vt-btn" id="vtTimeline" data-view="timeline" onclick="setGoalsView('timeline')">Timeline</button>
</div>

</aside>
<main class="wg-main">
<div class="list" id="list"></div>
<div class="timeline" id="timeline" style="display:none"></div>
</main>
</div>

<div class="toast" id="toast"></div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" aria-label="Add goal">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head">
      <span id="modalTitle">New Quarterly Goal</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div class="f">
      <label class="f-l">Title</label>
      <input type="text" class="f-i" id="fTitle" placeholder="Ship EZ Reader to the App Store" />
    </div>

    <div class="f">
      <label class="f-l">Pillar</label>
      <div class="picker" id="pillarPicker"></div>
    </div>

    <div class="f">
      <label class="f-l">Quarter</label>
      <div class="picker" id="quarterPicker"></div>
    </div>

    <div class="row">
      <div class="f">
        <label class="f-l">Status</label>
        <div class="picker" id="statusPicker"></div>
      </div>
      <div class="f">
        <label class="f-l">Start date</label>
        <input type="date" class="f-i" id="fStart" />
      </div>
      <div class="f">
        <label class="f-l">Target date</label>
        <input type="date" class="f-i" id="fTarget" />
      </div>
    </div>

    <div class="f">
      <label class="f-l">Progress</label>
      <div class="slider-row">
        <input type="range" id="fProgressSlider" min="0" max="100" step="5" value="0" />
        <span class="val" id="fProgressLbl">0%</span>
      </div>
    </div>

    <div class="f">
      <label class="f-l">Notes (optional)</label>
      <textarea class="f-i" id="fNotes" placeholder="Context, blockers, anything worth remembering next check-in."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>

<script>
const SK='quarterly-goals-v1';
const BOARD_SK='goal-board-v2';
// Pillars/jobs are derived from the user's boards on the Board page.
// Source of truth: localStorage['goal-board-v2'].boards. Each board becomes
// a pillar/job: { id: board.id, label: board.name, color: board.color }.
// LEGACY_PILLARS is kept as a fallback so old goals (pillar='ezrk' etc.)
// still render their badge correctly even after the switch.
const LEGACY_PILLARS=[
  {id:'ezrk',label:'EZRK',color:'#FF8A3D'},
  {id:'vt',label:'VitalTouch',color:'#30D158'},
  {id:'bha',label:'BHA',color:'#BF5AF2'},
  {id:'work',label:'GovTech',color:'#5AC8FA'},
  {id:'personal',label:'Personal',color:'#FF9F0A'}
];
function loadPillars(){
  try{
    const raw=localStorage.getItem(BOARD_SK);
    if(raw){
      const d=JSON.parse(raw);
      if(Array.isArray(d?.boards)&&d.boards.length){
        return d.boards.map(b=>({id:b.id,label:b.name||'(unnamed)',color:b.color||'#888'}));
      }
    }
  }catch{}
  return LEGACY_PILLARS.slice();
}
let PILLARS=loadPillars();
const STATUSES=[
  {id:'on',label:'On Track',cls:'on'},
  {id:'at',label:'At Risk',cls:'at'},
  {id:'bl',label:'Blocked',cls:'bl'},
  {id:'dn',label:'Shipped',cls:'dn'}
];

let data=load();
let activeFilter='all';
let editingId=null;
let modalPillar='ezrk';
let modalStatus='on';
let modalQuarter=currentQuarterKey();
let viewQuarter=currentQuarterKey();
let showHidden=false;
// 'list' (default card grid) | 'timeline' (12-week vertical view)
let goalsView = (()=>{
  try { const v = localStorage.getItem('weekly-goals-view'); return v === 'timeline' ? 'timeline' : 'list'; }
  catch { return 'list'; }
})();

// ---- Board data access ----
function loadBoard(){
  try{const raw=localStorage.getItem(BOARD_SK); if(raw){const d=JSON.parse(raw); if(d&&Array.isArray(d.boards))return d;}}catch(e){}
  return{boards:[]};
}
function saveBoardData(d){
  try{
    const s=JSON.stringify(d);
    localStorage.setItem(BOARD_SK,s);
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push(BOARD_SK,s)}catch{} }
  }catch(e){}
}
function isBoardGoalDone(g){
  if(g.status==='dn') return true;
  const items=g.actionItems||[];
  if(!items.length) return !!g.completedAt;
  return items.every(i=>i.done);
}
function toggleHideBoardCard(boardId,goalId){
  const bd=loadBoard();
  const b=(bd.boards||[]).find(x=>x.id===boardId); if(!b)return;
  const g=(b.goals||[]).find(x=>x.id===goalId); if(!g)return;
  g.hideFromGoals=!g.hideFromGoals;
  saveBoardData(bd);
  renderAll();
}
function findBoardGoal(bd,boardId,goalId){
  const b=(bd.boards||[]).find(x=>x.id===boardId); if(!b)return null;
  const g=(b.goals||[]).find(x=>x.id===goalId); if(!g)return null;
  return{b,g};
}
function cycleBoardStatus(boardId,goalId){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  const order=['on','at','bl','dn'];
  r.g.status=order[(order.indexOf(r.g.status||'on')+1)%order.length];
  if(r.g.status==='dn' && !r.g.completedAt) r.g.completedAt=new Date().toISOString();
  if(r.g.status!=='dn') r.g.completedAt=null;
  r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd); renderAll();
}
function nudgeBoardStatusProgress(boardId,goalId,delta){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  r.g.statusProgress=Math.max(0,Math.min(100,(r.g.statusProgress||0)+delta));
  if(r.g.statusProgress===100 && r.g.status!=='dn'){r.g.status='dn'; r.g.completedAt=r.g.completedAt||new Date().toISOString();}
  if(r.g.statusProgress<100 && r.g.status==='dn'){r.g.status='on'; r.g.completedAt=null;}
  r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd); renderAll();
}
function shipBoardCard(boardId,goalId){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  r.g.status='dn'; r.g.statusProgress=100;
  r.g.completedAt=new Date().toISOString(); r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd); renderAll();
}
function toggleBoardTask(boardId,goalId,taskId){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  const it=(r.g.actionItems||[]).find(x=>x.id===taskId); if(!it)return;
  it.done=!it.done;
  r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd); renderAll();
}
function addBoardTask(evt,boardId,goalId){
  evt.preventDefault();
  const input=evt.target.querySelector('input');
  const text=(input.value||'').trim();
  if(!text) return false;
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r) return false;
  if(!Array.isArray(r.g.actionItems)) r.g.actionItems=[];
  r.g.actionItems.push({id:uid(),text,done:false});
  r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd);
  input.value='';
  renderAll();
  setTimeout(()=>{
    const el=document.querySelector(`[data-goal-id="${goalId}"] .bwg-add-task input`);
    if(el) el.focus();
  },40);
  return false;
}
function toggleBoardTasksHidden(boardId,goalId){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  r.g.hideTasks=!r.g.hideTasks;
  saveBoardData(bd); renderAll();
}
function setBoardQuarter(boardId,goalId,qk){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r)return;
  r.g.quarter=qk||null;
  r.g.updatedAt=new Date().toISOString();
  saveBoardData(bd);
  renderAll();
}
function bwgQuarterOptions(selected){
  // Window of quarters around now: 4 back, 8 forward
  const base=parseQuarterKey(currentQuarterKey());
  let out='';
  for(let i=-4;i<=8;i++){
    let nq=base.q+i, ny=base.y;
    while(nq<1){nq+=4;ny--;}
    while(nq>4){nq-=4;ny++;}
    const k=ny+'-Q'+nq;
    out+=`<option value="${k}"${k===selected?' selected':''}>Q${nq} ${ny}</option>`;
  }
  return out;
}
function toggleShowHidden(){
  showHidden=!showHidden;
  renderAll();
}

// ---- Data ----
function load(){
  try{const raw=localStorage.getItem(SK); if(raw) return JSON.parse(raw);}catch(e){}
  return{currentQuarter:currentQuarterKey(),goals:[]};
}
function save(){
  try{
    const s=JSON.stringify(data);
    localStorage.setItem(SK,s);
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push(SK,s)}catch{} }
  }catch(e){}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ---- Cross-page glue: infer pillar from board, map to daily-plan domain, push tasks ----
function boardPillar(b){
  if(!b) return 'personal';
  if(b.pillar && PILLARS.some(p=>p.id===b.pillar)) return b.pillar;
  const n=((b.name||'')+' '+(b.description||'')).toLowerCase();
  if(/\b(ezrk|ez reader|ez chef|sidequest|ez voter|ez money|ez learning|ez blueprint)\b/.test(n)) return 'ezrk';
  if(/\b(vitaltouch|vital touch|home care|caregiver|medicaid|client|idph)\b/.test(n)) return 'vt';
  if(/\b(bha|butterfly|cna|academy)\b/.test(n)) return 'bha';
  if(/\b(crm|city of chicago|govtech|day job|consulting|work|client work)\b/.test(n)) return 'work';
  return 'personal';
}
function pillarToDomain(p){
  // daily-planner domains: vt, work, personal, ezrk — fold bha into vt (health org cluster)
  if(p==='ezrk') return 'ezrk';
  if(p==='vt' || p==='bha') return 'vt';
  if(p==='work') return 'work';
  return 'personal';
}
function addTaskToTodaysPlan(text,domain){
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  let plan={};
  try{const raw=localStorage.getItem('daily-plan'); if(raw) plan=JSON.parse(raw)||{};}catch{plan={}}
  if(!Array.isArray(plan[today])) plan[today]=[];
  // Bail if this exact text+domain is already queued today (avoid double-adds on mash)
  if(plan[today].some(it=>(it.text||'').trim()===text.trim() && (it.domain||'personal')===domain)){
    showToast('Already on today');
    return false;
  }
  const h=new Date().toLocaleString('en-US',{hour:'numeric',hour12:false,timeZone:'America/Chicago'});
  const hour=parseInt(h,10)||0;
  const slot=hour>=17?'night':(hour>=12?'afternoon':'morning');
  plan[today].push({
    id:uid(),text:text,domain:domain||'personal',slot,originalSlot:slot,
    done:false,shifted:false,skipped:false,urgent:false,due:'',timeSpent:0,
    createdAt:new Date().toISOString()
  });
  try{
    const s=JSON.stringify(plan);
    localStorage.setItem('daily-plan',s);
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push('daily-plan',s)}catch{} }
  }catch(e){}
  showToast('Added to today');
  return true;
}
let _toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast'); if(!el) return;
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

// ---- Quarter calc ----
function currentQuarterKey(d){d=d||new Date();return d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1)}
function currentQuarterRange(d){
  d=d||new Date();
  const q=Math.floor(d.getMonth()/3);
  return{start:new Date(d.getFullYear(),q*3,1),end:new Date(d.getFullYear(),q*3+3,0,23,59,59),q:q+1,y:d.getFullYear()};
}
function parseQuarterKey(key){
  const m=(key||'').match(/^(\d{4})-Q(\d)$/);
  if(!m) return currentQuarterRange();
  const y=parseInt(m[1],10), q=parseInt(m[2],10);
  return{start:new Date(y,(q-1)*3,1),end:new Date(y,(q-1)*3+3,0,23,59,59),q,y};
}
function quarterEndKeyFor(qk){
  const{end}=parseQuarterKey(qk);
  return end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');
}
function quarterEndKey(){return quarterEndKeyFor(viewQuarter||currentQuarterKey());}
function daysLeft(){return daysLeftFor(viewQuarter||currentQuarterKey());}
function daysLeftFor(qk){const{end}=parseQuarterKey(qk);return Math.max(0,Math.ceil((end.getTime()-Date.now())/86400000));}
function daysUntilFor(qk){const{start}=parseQuarterKey(qk);return Math.ceil((start.getTime()-Date.now())/86400000);}
function quarterStatus(qk){
  const{start,end}=parseQuarterKey(qk);
  const now=Date.now();
  if(now<start.getTime()) return'future';
  if(now>end.getTime()) return'past';
  return'current';
}
function shiftQuarterKey(qk,delta){
  const{q,y}=parseQuarterKey(qk);
  let nq=q+delta, ny=y;
  while(nq<1){nq+=4;ny--;}
  while(nq>4){nq-=4;ny++;}
  return ny+'-Q'+nq;
}
function qkLabel(qk){const{q,y}=parseQuarterKey(qk); return'Q'+q+' '+y;}
function shiftQuarter(delta){viewQuarter=shiftQuarterKey(viewQuarter,delta); renderAll();}
function jumpToCurrentQuarter(){viewQuarter=currentQuarterKey(); renderAll();}

function monthRange(qk){
  const{start,end}=parseQuarterKey(qk||viewQuarter);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'long'});
  return fmt(start)+' – '+fmt(end);
}

// ---- Header ----
function renderHeader(){
  const{q,y}=parseQuarterKey(viewQuarter);
  document.getElementById('quarterQ').textContent='Q'+q;
  document.getElementById('quarterSub').textContent=monthRange(viewQuarter)+' · '+y;

  const st=quarterStatus(viewQuarter);
  const daysEl=document.getElementById('daysLeft');
  const daysLbl=document.getElementById('daysLeftLbl');
  if(st==='past'){daysEl.textContent='✓'; daysLbl.textContent='Closed';}
  else if(st==='future'){daysEl.textContent=daysUntilFor(viewQuarter); daysLbl.textContent='Days to start';}
  else{daysEl.textContent=daysLeftFor(viewQuarter); daysLbl.textContent='Days left';}

  const editionNum=((y-2020)*4+q);
  document.getElementById('editionLbl').textContent='Vol '+y+' · No '+editionNum;

  document.getElementById('qnavPrev').innerHTML='‹ '+qkLabel(shiftQuarterKey(viewQuarter,-1));
  document.getElementById('qnavNext').innerHTML=qkLabel(shiftQuarterKey(viewQuarter,1))+' ›';
  const nowBtn=document.getElementById('qnavNow');
  const onNow=viewQuarter===currentQuarterKey();
  nowBtn.classList.toggle('hidden',onNow);
  document.body.classList.toggle('viewing-other-q',!onNow);

  const g=data.goals||[];
  let latest=0;
  g.forEach(x=>{if(x.updatedAt){const t=new Date(x.updatedAt).getTime();if(t>latest)latest=t;}});
  document.getElementById('updatedLbl').textContent=latest?('Updated '+relTime(latest)):'Updated —';
}
function relTime(t){
  const d=(Date.now()-t)/1000;
  if(d<60)return'just now';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  const days=Math.floor(d/86400);
  if(days<30)return days+'d ago';
  return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function goalsForView(){

// ---- List ----
function statusMeta(id){return STATUSES.find(s=>s.id===id)||STATUSES[0]}
function pillarMeta(id){
  // First check the live PILLARS list (derived from boards). If not found,
  // fall back to LEGACY_PILLARS so old goals tagged with 'ezrk', 'vt', etc.
  // still render a sensible badge.
  return PILLARS.find(p=>p.id===id)
      || LEGACY_PILLARS.find(p=>p.id===id)
      || PILLARS[0]
      || LEGACY_PILLARS[0];
}

// Build a unified, sortable item list from both quarterly goals and board cards
function buildUnifiedItems(){
  const rank={on:1,at:0,bl:-1,dn:99};
  const out=[];

  // Quarterly goals (manual) for this quarter
  goalsForView().forEach(g=>{
    const pillar=g.pillar||'personal';
    if(activeFilter!=='all' && pillar!==activeFilter) return;
    out.push({
      kind:'goal',
      id:g.id,
      pillar,
      status:g.status||'on',
      progress:g.progress||0,
      raw:g,
      rank:(rank[g.status]??1)
    });
  });

  // Board cards scoped to viewQuarter
  const bd=loadBoard(); const curQ=currentQuarterKey();
  (bd.boards||[]).forEach(b=>{
    (b.goals||[]).forEach(g=>{
      const cardQ=g.quarter||curQ;
      if(cardQ!==viewQuarter) return;
      if(!showHidden && g.hideFromGoals) return;
      const pillar=boardPillar(b);
      if(activeFilter!=='all' && pillar!==activeFilter) return;
      const col=(b.columns||[]).find(c=>c.id===g.columnId)||{title:'Board',color:'#888'};
      const effectiveStatus=isBoardGoalDone(g)?'dn':(g.status||'on');
      out.push({
        kind:'board',
        id:g.id,
        pillar,
        status:effectiveStatus,
        progress:g.statusProgress||0,
        raw:{b,g,col},
        rank:(rank[effectiveStatus]??1)
      });
    });
  });

  return out.sort((a,b)=>{
    if(a.rank!==b.rank) return a.rank-b.rank;
    return (a.progress||0)-(b.progress||0);
  });
}

function renderList(){
  const el=document.getElementById('list');
  const items=buildUnifiedItems();

  // Count board hidden for toggle
  let totalHidden=0;
  const bd=loadBoard(); const curQ=currentQuarterKey();
  (bd.boards||[]).forEach(b=>{
    (b.goals||[]).forEach(g=>{
      const cardQ=g.quarter||curQ;
      if(cardQ!==viewQuarter) return;
      if(g.hideFromGoals) totalHidden++;
    });
  });
  const btn=document.getElementById('hiddenToggle');
  if(btn){
    btn.style.display=(totalHidden||showHidden)?'':'none';
    btn.classList.toggle('on',showHidden);
    btn.textContent = showHidden
      ? 'Hide hidden'
      : (totalHidden?('Show hidden ('+totalHidden+')'):'Show hidden');
  }

  if(!items.length){
    const isCurrent=viewQuarter===currentQuarterKey();
    const qLbl=qkLabel(viewQuarter);
    const head=activeFilter==='all'
      ? (isCurrent?'No goals or cards yet.':'Nothing in '+qLbl+'.')
      : 'Nothing here in this pillar.';
    const body=isCurrent
      ? 'Quarterly goals are the 3–5 strategic bets for the next 90 days. Board cards land here too. Big moves only.'
      : 'Plan ahead — set the 3–5 big moves for '+qLbl+' before it arrives.';
    el.innerHTML=`<div class="empty">
      <h3>${head}</h3>
      <p>${body}</p>
      <button class="add-btn" onclick="openAddModal()">+ Set a goal for ${qLbl}</button>
    </div>`;
    return;
  }
  el.innerHTML=items.map(it=>it.kind==='goal'?renderCard(it.raw):renderBoardCard(it.raw)).join('');
}

// ============ SHARED TASK ROW (used by both quarterly + board renderers) ============
// State: which task row is expanded (showing date inputs).
let _expandedTaskKey = null;
function toggleTaskExpand(key){
  _expandedTaskKey = (_expandedTaskKey === key) ? null : key;
  renderList();
}
// Days until due (negative = overdue). null if no date.
function daysFromTodayToKey(dk){
  if(!dk) return null;
  const target = new Date(dk+'T12:00:00');
  const now = new Date(); now.setHours(12,0,0,0);
  return Math.round((target.getTime()-now.getTime())/86400000);
}
// Sort: tasks with dueDate first (soonest first), rest preserve their order.
function sortTasksByDue(items){
  items.sort((a,b)=>{
    if(a.dueDate && b.dueDate) return a.dueDate < b.dueDate ? -1 : a.dueDate > b.dueDate ? 1 : 0;
    if(a.dueDate) return -1;
    if(b.dueDate) return 1;
    return 0;
  });
}
// Build one task row (used by quarterly + board renderers).
function renderTaskRow(it, key, handlers){
  const expanded = (_expandedTaskKey === key) ? ' expanded' : '';
  const pushed = it.pushedToPersonal ? `<span class="bwg-task-pushed" title="Auto-pushed to Personal on ${escapeHtml(it.pushedAt||'')}">→ Personal</span>` : '';
  // Due/overdue pill — visible inline next to text whenever dueDate is set
  let duePill = '';
  if(it.dueDate && !it.done){
    const d = daysFromTodayToKey(it.dueDate);
    let cls = '', label = '';
    if(d<0){ cls='overdue'; label = `${Math.abs(d)}d overdue`; }
    else if(d===0){ cls='soon'; label='due today'; }
    else if(d<=7){ cls='soon'; label = `${d}d`; }
    else { label = `${d}d`; }
    duePill = `<span class="bwg-task-due-pill ${cls}" title="Due ${escapeHtml(it.dueDate)}">${label}</span>`;
  }
  return `<div class="bwg-task-wrap${it.done?' done':''}${expanded}">
    <div class="bwg-task" onclick="toggleTaskExpand('${key}')">
      <input type="checkbox" ${it.done?'checked':''} onclick="event.stopPropagation()" onchange="${handlers.onCheck}">
      <span class="bwg-task-txt">${escapeHtml(it.text||it.title||'')}</span>
      ${duePill}
      ${pushed}
      <button class="bwg-task-plan" type="button" onclick="event.stopPropagation();event.preventDefault();${handlers.onPlan}" title="Add to Personal now">+ Personal</button>
    </div>
    <div class="bwg-task-dates" onclick="event.stopPropagation()">
      <span class="bwg-task-dates-lbl">Start</span>
      <input type="date" class="bwg-task-date" value="${it.startDate||''}" onclick="event.stopPropagation()" onchange="${handlers.onSetDate('startDate')}">
      <span class="bwg-task-dates-lbl">Due</span>
      <input type="date" class="bwg-task-date" value="${it.dueDate||''}" onclick="event.stopPropagation()" onchange="${handlers.onSetDate('dueDate')}">
      ${it.startDate ? `<span class="bwg-task-auto-hint">auto-pushes when start hits</span>` : ''}
    </div>
  </div>`;
}

function renderCard(g){
  const pm=pillarMeta(g.pillar);
  const sm=statusMeta(g.status);
  const progress=Math.max(0,Math.min(100,g.progress||0));
  const days = g.targetDate ? daysUntil(g.targetDate) : daysLeft();
  const overdue = days===0 && g.status!=='dn';
  const soon = days>0 && days<=7 && g.status!=='dn';
  // If start date is set, show as range "Mar 5 → May 1"; otherwise just target.
  const targetLbl = g.startDate && g.targetDate
    ? `${fmtDate(g.startDate)} → ${fmtDate(g.targetDate)}`
    : (g.targetDate ? fmtDate(g.targetDate) : 'End of Q');
  const isDone = g.status==='dn';
  const cardCls = 'card'+(isDone?' dn':'')+(g.status==='bl'?' bl':'');
  const topRCls = 'card-top-r'+(overdue?' overdue':(soon?' soon':''));
  const notesHTML = g.notes
    ? `<div class="notes" onclick="openEditModal('${g.id}')">${escapeHtml(g.notes)}</div>`
    : '';

  const items=g.tasks||[];
  const doneCt=items.filter(i=>i.done).length;
  const taskPct=items.length?Math.round((doneCt/items.length)*100):0;
  const tasksHTML=renderGoalTasksHTML(g);

  const taskProgRow = items.length
    ? `<div class="prog-row">
        <span class="prog-label">Tasks</span>
        <div class="prog-bar"><div class="prog-fill ${sm.cls}" style="width:${taskPct}%"></div></div>
        <div class="prog-num">${doneCt}/${items.length}</div>
      </div>`
    : '';

  return `<article class="${cardCls}" data-id="${g.id}">
    <div class="card-top">
      <div class="card-top-l">
        <span class="pillar"><span class="d" style="background:${pm.color}"></span>${pm.label}</span>
        <span class="status ${sm.cls}">${sm.label}</span>
      </div>
      <span class="${topRCls}">${targetLbl}${days!=null?' · '+(overdue?'due':days+'d'):''}</span>
    </div>
    <div class="title">${escapeHtml(g.title||'Untitled')}</div>
    ${notesHTML}
    ${tasksHTML}
    <div class="prog-row">
      <span class="prog-label">Status</span>
      <div class="prog-bar"><div class="prog-fill ${sm.cls}" style="width:${progress}%"></div></div>
      <div class="prog-num">${progress}%</div>
    </div>
    ${taskProgRow}
    <div class="actions">
      <button class="ab" onclick="cycleStatus('${g.id}')" title="Cycle status">Status</button>
      <button class="ab" onclick="nudgeProgress('${g.id}',-10)">–10%</button>
      <button class="ab primary" onclick="nudgeProgress('${g.id}',10)">+10%</button>
      ${isDone?'':`<button class="ab ship" onclick="markShipped('${g.id}')">Ship</button>`}
      <button class="ab" onclick="openEditModal('${g.id}')">Edit</button>
      <button class="ab del" onclick="deleteGoal('${g.id}')">Delete</button>
    </div>
  </article>`;
}

      <button class="ab del" onclick="toggleHideBoardCard('${b.id}','${g.id}')">${g.hideFromGoals?'Unhide':'Hide'}</button>
    </div>
  </article>`;
}

// ---- Opens a board card in goal-board.html (top-level nav in case we're in an iframe) ----
function openBoardCard(boardId,goalId){
  const url='/goal-board.html?board='+encodeURIComponent(boardId)+'&goal='+encodeURIComponent(goalId);
  try{
    if(window.top && window.top!==window.self){
      window.top.location.href=url;
      return;
    }
  }catch(e){}
  window.location.href=url;
}

function cycleStatus(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  const order=['on','at','bl','dn'];
  g.status=order[(order.indexOf(g.status||'on')+1)%order.length];
  g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function nudgeProgress(gid,delta){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  g.progress=Math.max(0,Math.min(100,(g.progress||0)+delta));
  if(g.progress===100 && g.status!=='dn')g.status='dn';
  if(g.progress<100 && g.status==='dn')g.status='on';
  g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function markShipped(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  g.status='dn';g.progress=100;g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function deleteGoal(gid){
  if(!confirm('Delete this goal?'))return;
  data.goals=data.goals.filter(x=>x.id!==gid);
  save();renderAll();
}

// ---- Quarterly goal tasks ----
function toggleGoalTasksHidden(gid){
  const g=data.goals.find(x=>x.id===gid); if(!g) return;
  g.hideTasks=!g.hideTasks;
  save(); renderList();
}
function toggleGoalTask(gid,taskId){
  const g=data.goals.find(x=>x.id===gid); if(!g) return;
  const it=(g.tasks||[]).find(t=>t.id===taskId); if(!it) return;
  it.done=!it.done;
  g.updatedAt=new Date().toISOString();
  save(); renderList();
}
function addGoalTask(evt,gid){
  evt.preventDefault();
  const input=evt.target.querySelector('input');
  const text=(input.value||'').trim();
  if(!text) return false;
  const g=data.goals.find(x=>x.id===gid); if(!g) return false;
  if(!Array.isArray(g.tasks)) g.tasks=[];
  g.tasks.push({id:uid(),text,done:false});
  g.updatedAt=new Date().toISOString();
  save();
  input.value='';
  renderList();
  setTimeout(()=>{
    const el=document.querySelector(`[data-id="${gid}"] .bwg-add-task input`);
    if(el) el.focus();
  },40);
  return false;
}
function addGoalTaskToToday(gid,taskId){
  const g=data.goals.find(x=>x.id===gid); if(!g) return;
  const it=(g.tasks||[]).find(t=>t.id===taskId); if(!it) return;
  const domain=pillarToDomain(g.pillar||'personal');
  addTaskToTodaysPlan(it.text,domain);
}
function addBoardTaskToToday(boardId,goalId,taskId){
  const bd=loadBoard(); const r=findBoardGoal(bd,boardId,goalId); if(!r) return;
  const it=(r.g.actionItems||[]).find(x=>x.id===taskId); if(!it) return;
  const domain=pillarToDomain(boardPillar(r.b));
  addTaskToTodaysPlan(it.text||it.title||'',domain);
}

// ---- Modal ----
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='New Quarterly Goal';
  document.getElementById('fTitle').value='';
  document.getElementById('fNotes').value='';
  setSlider(0);
  modalQuarter=viewQuarter||currentQuarterKey();
  document.getElementById('fTarget').value=quarterEndKeyFor(modalQuarter);
  document.getElementById('fStart').value='';
  modalPillar='ezrk';modalStatus='on';
  renderPickers();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),60);
}
function openEditModal(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  editingId=gid;
  document.getElementById('modalTitle').textContent='Edit Goal';
  document.getElementById('fTitle').value=g.title||'';
  document.getElementById('fNotes').value=g.notes||'';
  setSlider(g.progress||0);
  modalQuarter=g.quarter||currentQuarterKey();
  document.getElementById('fTarget').value=g.targetDate||quarterEndKeyFor(modalQuarter);
  document.getElementById('fStart').value=g.startDate||'';
  modalPillar=g.pillar||'ezrk';modalStatus=g.status||'on';
  renderPickers();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function setModalQuarter(qk){
  modalQuarter=qk;
  // If target date is outside the selected quarter, snap to that quarter's end
  const cur=document.getElementById('fTarget').value;
  const{start,end}=parseQuarterKey(qk);
  const tgt=cur?new Date(cur+'T12:00:00'):null;
  if(!tgt || tgt<start || tgt>end){
    document.getElementById('fTarget').value=quarterEndKeyFor(qk);
  }
  renderPickers();
}
function renderPickers(){
  document.getElementById('pillarPicker').innerHTML=PILLARS.map(p=>
    `<button class="pk ${modalPillar===p.id?'active':''}" onclick="modalPillar='${p.id}';renderPickers()"><span class="d" style="background:${p.color}"></span>${p.label}</button>`
  ).join('');
  document.getElementById('statusPicker').innerHTML=STATUSES.map(s=>
    `<button class="pk ${modalStatus===s.id?'active':''}" onclick="modalStatus='${s.id}';renderPickers()">${s.label}</button>`
  ).join('');
  // Quarter picker — window of prev 2 to +6
  const base=parseQuarterKey(currentQuarterKey());
  const opts=[];
  for(let i=-2;i<=6;i++){
    let nq=base.q+i, ny=base.y;
    while(nq<1){nq+=4;ny--;}
    while(nq>4){nq-=4;ny++;}
    opts.push(ny+'-Q'+nq);
  }
  // Ensure modalQuarter appears even if outside the default window
  if(!opts.includes(modalQuarter)) opts.push(modalQuarter);
  opts.sort();
  document.getElementById('quarterPicker').innerHTML=opts.map(qk=>{
    const l=parseQuarterKey(qk);
    const isNow=qk===currentQuarterKey();
    return `<button class="pk ${modalQuarter===qk?'active':''}" onclick="setModalQuarter('${qk}')">Q${l.q} ${l.y}${isNow?' · now':''}</button>`;
  }).join('');
}
function setSlider(v){
  document.getElementById('fProgressSlider').value=String(v);
  document.getElementById('fProgressLbl').textContent=v+'%';
}
document.getElementById('fProgressSlider').addEventListener('input',e=>{
  document.getElementById('fProgressLbl').textContent=e.target.value+'%';
});

function saveGoal(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('Give the goal a title.');return;}
  const notes=document.getElementById('fNotes').value.trim();
  const progress=Math.max(0,Math.min(100,parseInt(document.getElementById('fProgressSlider').value||'0',10)));
  const targetDate=document.getElementById('fTarget').value||quarterEndKeyFor(modalQuarter);
  const startDate=document.getElementById('fStart').value||'';
  const quarter=modalQuarter||currentQuarterKey();
  const now=new Date().toISOString();
  if(editingId){
    const g=data.goals.find(x=>x.id===editingId);
    if(g)Object.assign(g,{title,notes,progress,targetDate,startDate,pillar:modalPillar,status:modalStatus,quarter,updatedAt:now});
  } else {
    if(!Array.isArray(data.goals))data.goals=[];
    data.goals.unshift({
      id:uid(),title,notes,progress,targetDate,startDate,pillar:modalPillar,status:modalStatus,
      createdAt:now,updatedAt:now,quarter
    });
  }
  // Snap to the quarter that was saved so the new/edited goal is visible
  viewQuarter=quarter;
  save();closeModal();renderAll();
}

// ---- Utilities ----
function escapeHtml(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}
function fmtDate(dk){const d=new Date(dk+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function daysUntil(dk){const d=new Date(dk+'T12:00:00');return Math.max(0,Math.ceil((d.getTime()-Date.now())/86400000))}

// ============ TIMELINE VIEW (12-week rolling) ============
// Each row = one calendar week (Mon → Sun). For each week, show goals whose
// targetDate falls in the week, plus any tasks on any goal whose dueDate
// falls in the week. Goals with no signal in a given week are skipped.
function setGoalsView(v){
  goalsView = (v === 'timeline') ? 'timeline' : 'list';
  try { localStorage.setItem('weekly-goals-view', goalsView); } catch {}
  applyGoalsView();
  renderAll();
}
function applyGoalsView(){
  const listEl = document.getElementById('list');
  const tlEl   = document.getElementById('timeline');
  const vtList = document.getElementById('vtList');
  const vtTl   = document.getElementById('vtTimeline');
  if (listEl) listEl.style.display = (goalsView === 'list') ? '' : 'none';
  if (tlEl)   tlEl.style.display   = (goalsView === 'timeline') ? '' : 'none';
  if (vtList) vtList.classList.toggle('active', goalsView === 'list');
  if (vtTl)   vtTl.classList.toggle('active', goalsView === 'timeline');
}
// yyyy-mm-dd for a Date in local time (no UTC drift)
function dkeyLocal(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
// Monday-anchored start of the week containing d
function startOfWeekMon(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = x.getDay(); // 0=Sun
  const diff = (dow === 0 ? -6 : 1 - dow); // shift back to Monday
  x.setDate(x.getDate() + diff);
  return x;
}
function addDays(d, n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtWeekRange(start, end){
  const sameMonth = start.getMonth() === end.getMonth();
  const sFmt = { month:'short', day:'numeric' };
  const eFmt = sameMonth ? { day:'numeric' } : { month:'short', day:'numeric' };
  return `${start.toLocaleDateString('en-US', sFmt)} – ${end.toLocaleDateString('en-US', eFmt)}`;
}
// Pull every active goal (quarterly + board) regardless of viewQuarter — the
// timeline is a rolling 12-week look-ahead, not bound to a specific quarter.
function loadAllGoalsForTimeline(){
  const out = [];
  (data.goals || []).forEach(g => {
    if (g.status === 'dn') return;
    out.push({
      id: g.id,
      title: g.title || 'Untitled',
      pillar: g.pillar || 'personal',
      status: g.status || 'on',
      progress: g.progress || 0,
      targetDate: g.targetDate || '',
      tasks: (g.tasks || []).map(t => ({ id: t.id, text: t.text || '', done: !!t.done, dueDate: t.dueDate || '' })),
      _source: 'quarterly',
    });
  });
  const bd = loadBoard();
  (bd.boards || []).forEach(b => {
    (b.goals || []).forEach(g => {
      if (g.hideFromGoals) return;
      const effStatus = (typeof isBoardGoalDone === 'function' && isBoardGoalDone(g)) ? 'dn' : (g.status || 'on');
      if (effStatus === 'dn') return;
      out.push({
        id: `bd:${b.id}:${g.id}`,
        title: g.title || 'Untitled',
        pillar: boardPillar(b),
        status: effStatus,
        progress: g.statusProgress || 0,
        targetDate: g.targetDate || '',
        tasks: (g.actionItems || []).map(it => ({ id: it.id, text: it.text || it.title || '', done: !!it.done, dueDate: it.dueDate || '' })),
        _source: 'board',
      });
    });
  });
  return out;
}
function pillarMetaTL(pillarId){
  const p = (PILLARS || []).find(x => x.id === pillarId);
  if (p) return p;
  const lp = LEGACY_PILLARS.find(x => x.id === pillarId);
  return lp || { id: pillarId, label: pillarId || '—', color: '#888' };
}
function dueClassTL(dueKey, weekStartKey){
  if (!dueKey) return '';
  const todayKey = dkeyLocal(new Date());
  if (dueKey < todayKey) return 'overdue';
  if (dueKey === todayKey) return 'today';
  if (dueKey <= weekStartKey) return 'soon';
  return 'soon';
}
function renderTimeline(){
  const el = document.getElementById('timeline');
  if (!el) return;
  const allGoals = loadAllGoalsForTimeline().filter(g => {
    if (activeFilter === 'all') return true;
    return g.pillar === activeFilter;
  });
  const today = new Date();
  const week0 = startOfWeekMon(today);
  const todayKey = dkeyLocal(today);
  const weeks = [];
  for (let i = 0; i < 12; i++) {
    const start = addDays(week0, i * 7);
    const end   = addDays(start, 6);
    const startKey = dkeyLocal(start);
    const endKey   = dkeyLocal(end);
    // Bucket goals/tasks into this week
    const buckets = []; // [{goal, reasonTargets:bool, tasks:[]}]
    allGoals.forEach(g => {
      const targetInWeek = g.targetDate && g.targetDate >= startKey && g.targetDate <= endKey;
      const tasksInWeek = (g.tasks || []).filter(t => t.dueDate && t.dueDate >= startKey && t.dueDate <= endKey);
      if (!targetInWeek && tasksInWeek.length === 0) return;
      buckets.push({ goal: g, reasonTargets: !!targetInWeek, tasks: tasksInWeek });
    });
    weeks.push({ start, end, startKey, endKey, buckets });
  }
  el.innerHTML = weeks.map((w, idx) => {
    const isCurrent = (todayKey >= w.startKey && todayKey <= w.endKey);
    const eyebrow = idx === 0 ? 'This week' : (idx === 1 ? 'Next week' : `Week +${idx}`);
    const range = fmtWeekRange(w.start, w.end);
    if (w.buckets.length === 0) {
      return `<div class="tl-week empty${isCurrent ? ' current' : ''}">
        <div class="tl-week-head">
          <div class="tl-week-label">
            <span class="tl-week-eyebrow">${eyebrow}</span>
            <span class="tl-week-title">${escapeHtml(range)}</span>
          </div>
          <span class="tl-week-count">—</span>
        </div>
        <div class="tl-week-empty">No goal targets or task due dates this week.</div>
      </div>`;
    }
    const goalsHTML = w.buckets.map(bk => {
      const g = bk.goal;
      const pm = pillarMetaTL(g.pillar);
      const tagHTML = bk.reasonTargets
        ? `<span class="tl-goal-tag">Target ${escapeHtml(fmtDate(g.targetDate))}</span>`
        : '';
      const tasksHTML = bk.tasks.length
        ? `<div class="tl-tasks">${bk.tasks.map(t => {
            const cls = dueClassTL(t.dueDate, w.startKey);
            const dueLabel = t.dueDate ? new Date(t.dueDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}) : '';
            return `<div class="tl-task ${t.done ? 'done' : ''}">
              <span class="cb"></span>
              <span class="txt">${escapeHtml(t.text || '')}</span>
              ${dueLabel ? `<span class="due ${cls}">${escapeHtml(dueLabel)}</span>` : ''}
            </div>`;
          }).join('')}</div>`
        : '';
      return `<div class="tl-goal" style="border-left-color:${pm.color}">
        <div class="tl-goal-head">
          <span class="tl-goal-pillar" style="color:${pm.color};background:${pm.color}1f">${escapeHtml(pm.label)}</span>
          <span class="tl-goal-title">${escapeHtml(g.title)}</span>
          ${tagHTML}
        </div>
        ${tasksHTML}
      </div>`;
    }).join('');
    const totalTasks = w.buckets.reduce((s, b) => s + b.tasks.length, 0);
    const targetsCt = w.buckets.filter(b => b.reasonTargets).length;
    const countLbl = [
      targetsCt ? `${targetsCt} target${targetsCt === 1 ? '' : 's'}` : '',
      totalTasks ? `${totalTasks} task${totalTasks === 1 ? '' : 's'}` : '',
    ].filter(Boolean).join(' · ');
    return `<div class="tl-week${isCurrent ? ' current' : ''}">
      <div class="tl-week-head">
        <div class="tl-week-label">
          <span class="tl-week-eyebrow">${eyebrow}</span>
          <span class="tl-week-title">${escapeHtml(range)}</span>
        </div>
        <span class="tl-week-count">${escapeHtml(countLbl)}</span>
      </div>
      <div class="tl-goals">${goalsHTML}</div>
    </div>`;
  }).join('');
}

function renderAll(){
  renderHeader();renderHealth();renderChips();
  applyGoalsView();
  if (goalsView === 'timeline') renderTimeline();
  else renderList();
}
