<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Quarterly Goals</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quarterly">
<meta name="theme-color" content="#050507">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* War Room dark — same tokens as daily-planner */
  --bg:#050507; --surface:#101014; --surface-2:#1C1C22; --surface-3:#24242C;
  --border:rgba(255,255,255,0.09); --border-2:rgba(255,255,255,0.14);
  --text:#FFFFFF; --text-mid:rgba(255,255,255,0.75); --text-dim:rgba(255,255,255,0.55); --text-fade:rgba(255,255,255,0.35);
  --accent:#FF8A3D;
  --accent-bg:rgba(255,138,61,0.14);
  --accent-soft:rgba(255,138,61,0.08);
  --ok:#30D158; --ok-bg:rgba(48,209,88,0.12);
  --warn:#FFD60A; --warn-bg:rgba(255,214,10,0.12);
  --block:#FF453A; --block-bg:rgba(255,69,58,0.12);
  --done:#5AC8FA; --done-bg:rgba(90,200,250,0.12);

  --p-ezrk:#FF8A3D;
  --p-vt:#30D158;
  --p-bha:#BF5AF2;
  --p-work:#5AC8FA;
  --p-personal:#FF9F0A;

  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
  --radius:12px;
  --radius-sm:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{padding:16px 14px 120px}
@media(min-width:900px){body{padding:24px 32px 140px}}

/* ============ HEADER ============ */
.hero{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 18px 16px;margin-bottom:14px;position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-bg) 0%,transparent 70%);pointer-events:none;
}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);position:relative;z-index:1}
.hero-top .updated{color:var(--text-fade)}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;position:relative;z-index:1}
.hero-title{font-size:clamp(28px,7vw,40px);font-weight:900;letter-spacing:-.03em;line-height:1}
.hero-title .q{color:var(--accent)}
.hero-sub{font-size:12px;font-weight:600;color:var(--text-mid);margin-top:6px;letter-spacing:.2px}
.hero-days{text-align:right;flex-shrink:0}
.hero-days .n{font-size:clamp(32px,8vw,44px);font-weight:900;line-height:1;letter-spacing:-.03em;color:var(--text)}
.hero-days .l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px}

/* ============ HEALTH STRIP ============ */
.health{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;
}
.hc{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 8px;text-align:center;
}
.hc .v{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.02em}
.hc .l{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-top:5px}
.hc.on .v{color:var(--ok)}
.hc.at .v{color:var(--warn)}
.hc.bl .v{color:var(--block)}
.hc.dn .v{color:var(--done)}

/* ============ TOOLBAR ============ */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chips{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:7px 11px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px;
}
.chip:active{transform:scale(.96)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip .num{font-size:9px;opacity:.6;font-weight:700;margin-left:2px}
.chip.active .num{opacity:.9}

.add-btn{
  font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:9px 14px;border-radius:10px;background:var(--accent);color:#000;border:none;cursor:pointer;
  flex-shrink:0;transition:transform .1s,filter .1s;
}
.add-btn:active{transform:scale(.97);filter:brightness(.95)}

/* ============ CARD ============ */
.list{display:flex;flex-direction:column;gap:10px}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 14px 12px;display:flex;flex-direction:column;gap:10px;
  transition:border-color .12s,transform .12s;position:relative;
}
.card:hover{border-color:var(--border-2)}
.card.dn{background:linear-gradient(180deg,var(--surface) 0%,rgba(90,200,250,.04) 100%);border-color:rgba(90,200,250,.18)}
.card.bl{border-color:rgba(255,69,58,.28)}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-top-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.pillar{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-mid);
}
.pillar .d{width:8px;height:8px;border-radius:50%}
.status{
  font-size:9.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
}
.status.on{color:var(--ok);background:var(--ok-bg)}
.status.at{color:var(--warn);background:var(--warn-bg)}
.status.bl{color:var(--block);background:var(--block-bg)}
.status.dn{color:var(--done);background:var(--done-bg)}
.card-top-r{font-size:10.5px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;white-space:nowrap}
.card-top-r.overdue{color:var(--block)}
.card-top-r.soon{color:var(--warn)}

.title{font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.02em;color:var(--text);word-break:break-word}
.card.dn .title{color:var(--text-mid);text-decoration:line-through;text-decoration-thickness:1.5px}

.notes{
  font-size:13px;font-weight:400;line-height:1.5;color:var(--text-mid);
  padding:9px 11px;background:var(--surface-2);border-left:2px solid var(--accent);border-radius:4px;
  white-space:pre-wrap;word-break:break-word;cursor:text;
}
.notes.empty{color:var(--text-fade);font-style:italic;border-left-color:var(--border)}

.prog-row{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;transition:width .25s ease;border-radius:3px}
.prog-fill.on{background:var(--ok)}
.prog-fill.at{background:var(--warn)}
.prog-fill.bl{background:var(--block)}
.prog-fill.dn{background:var(--done)}
.prog-num{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.01em;min-width:42px;text-align:right}

.actions{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--border);margin-top:2px;padding-top:10px}
.ab{
  font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.3px;
  padding:6px 10px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-mid);cursor:pointer;
  transition:all .1s;display:inline-flex;align-items:center;gap:4px;
}
.ab:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}
.ab:active{transform:scale(.97)}
.ab.primary{background:var(--accent-bg);color:var(--accent);border-color:rgba(255,138,61,.3)}
.ab.ship{color:var(--done);border-color:rgba(90,200,250,.25)}
.ab.del{color:var(--block);border-color:rgba(255,69,58,.22);margin-left:auto}
.ab svg{width:11px;height:11px}

/* ============ LINKED WORK ============ */
.work{
  border-top:1px solid var(--border);margin-top:2px;padding-top:10px;
  display:flex;flex-direction:column;gap:8px;
}
.work-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.work-title{
  font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;
}
.work-title .tally{
  color:var(--text);background:var(--surface-2);padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:800;letter-spacing:.3px;text-transform:none;
}
.work-link{
  font-family:inherit;font-size:10px;font-weight:800;letter-spacing:.3px;
  padding:5px 9px;border-radius:6px;background:var(--accent-bg);color:var(--accent);
  border:1px solid rgba(255,138,61,.3);cursor:pointer;transition:all .1s;
}
.work-link:hover{filter:brightness(1.1)}
.work-link:active{transform:scale(.97)}
.work-list{display:flex;flex-direction:column;gap:5px}
.wk-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;background:var(--surface-2);border-radius:7px;
  cursor:pointer;transition:background .1s;border:1px solid transparent;
}
.wk-row:hover{background:var(--surface-3);border-color:var(--border)}
.wk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wk-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.wk-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-sub{font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.wk-sub .sep{opacity:.5}
.wk-right{font-size:11px;font-weight:800;color:var(--text-mid);letter-spacing:-.01em;flex-shrink:0}
.wk-right.done{color:var(--done)}
.wk-empty{
  font-size:12px;font-weight:500;color:var(--text-fade);font-style:italic;
  padding:6px 2px;
}

/* ============ LINK MODAL ============ */
.link-modal-card{max-width:540px}
.link-search{
  width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:14px;color:var(--text);outline:none;margin-bottom:12px;
}
.link-search:focus{border-color:var(--accent)}
.link-body{max-height:55vh;overflow-y:auto;padding-right:4px;margin-bottom:6px}
.link-body::-webkit-scrollbar{width:6px}
.link-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.link-board{margin-bottom:14px}
.link-board-head{
  font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.link-board-head .d{width:8px;height:8px;border-radius:50%}
.link-board-head .n{color:var(--text-fade);font-weight:700}
.link-card-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;margin-bottom:5px;transition:all .1s;
}
.link-card-row:hover{border-color:var(--border-2)}
.link-card-row.on{background:var(--accent-soft);border-color:rgba(255,138,61,.35)}
.link-card-row.foreign{opacity:.55}
.link-card-row.foreign .foreign-tag{
  font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text-fade);
  padding:2px 6px;border:1px solid var(--border);border-radius:4px;white-space:nowrap;
}
.link-check{
  width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;background:transparent;transition:all .1s;
}
.link-card-row.on .link-check{background:var(--accent);border-color:var(--accent)}
.link-card-row.on .link-check::after{
  content:'';width:4px;height:8px;border-right:2px solid #000;border-bottom:2px solid #000;
  transform:rotate(45deg) translate(-1px,-1px);
}
.link-card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.link-card-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;word-break:break-word}
.link-card-sub{font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.link-card-sub .cdot{width:6px;height:6px;border-radius:50%}
.link-card-prog{font-size:10.5px;font-weight:800;color:var(--text-mid);flex-shrink:0;letter-spacing:-.01em}
.link-empty{
  padding:28px 14px;text-align:center;color:var(--text-fade);font-size:13px;
  border:1.5px dashed var(--border);border-radius:10px;
}

/* ============ EMPTY ============ */
.empty{
  padding:48px 22px;text-align:center;border:2px dashed var(--border);border-radius:var(--radius);
  background:var(--surface);
}
.empty h3{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.empty p{font-size:13px;line-height:1.55;color:var(--text-mid);max-width:340px;margin:0 auto 16px}

/* ============ MODAL ============ */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;
}
.modal.open{display:flex}
.modal-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  max-width:480px;width:100%;padding:18px 18px 14px;position:relative;
  animation:popIn .2s ease-out;
}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:16px;font-weight:800;letter-spacing:-.01em;
  padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;padding:4px 8px;line-height:1}
.modal-close:hover{color:var(--text)}

.f{margin-bottom:12px}
.f-l{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block}
.f-i{
  width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:15px;color:var(--text);outline:none;transition:border-color .1s;
}
.f-i:focus{border-color:var(--accent)}
.f-i::placeholder{color:var(--text-fade)}
textarea.f-i{min-height:70px;resize:vertical;line-height:1.5;font-size:14px}

.picker{display:flex;flex-wrap:wrap;gap:5px}
.pk{
  font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:7px 11px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:6px;
}
.pk.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.pk .d{width:7px;height:7px;border-radius:50%}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:420px){.row{grid-template-columns:1fr}}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:5px;background:var(--surface-2);border-radius:3px;outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);
}
.slider-row .val{font-size:15px;font-weight:800;min-width:46px;text-align:right;letter-spacing:-.01em}

.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.btn{
  font-family:inherit;font-size:12px;font-weight:800;letter-spacing:.3px;
  padding:10px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text-mid);
  transition:all .1s;
}
.btn:hover{color:var(--text);border-color:var(--border-2)}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.97)}

/* FAB */
.fab{
  position:fixed;right:18px;bottom:22px;z-index:60;
  width:54px;height:54px;border-radius:50%;background:var(--accent);color:#000;
  border:none;cursor:pointer;font-size:26px;font-weight:800;line-height:1;
  box-shadow:0 6px 18px rgba(255,138,61,.35),0 2px 4px rgba(0,0,0,.25);
  transition:transform .1s,filter .1s;
}
.fab:active{transform:scale(.95)}
.fab:hover{filter:brightness(1.05)}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <span id="editionLbl">Edition —</span>
    <span class="updated" id="updatedLbl">Updated —</span>
  </div>
  <div class="hero-row">
    <div>
      <div class="hero-title">The <span class="q" id="quarterQ">Q2</span> Plan</div>
      <div class="hero-sub" id="quarterSub">April – June · 2026</div>
    </div>
    <div class="hero-days">
      <div class="n" id="daysLeft">—</div>
      <div class="l">Days left</div>
    </div>
  </div>
</header>

<div class="health">
  <div class="hc on"><div class="v" id="cntOn">0</div><div class="l">On Track</div></div>
  <div class="hc at"><div class="v" id="cntAt">0</div><div class="l">At Risk</div></div>
  <div class="hc bl"><div class="v" id="cntBl">0</div><div class="l">Blocked</div></div>
  <div class="hc dn"><div class="v" id="cntDn">0</div><div class="l">Shipped</div></div>
</div>

<div class="toolbar">
  <div class="chips" id="chips"></div>
  <button class="add-btn" onclick="openAddModal()">+ Goal</button>
</div>

<div class="list" id="list"></div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" aria-label="Add goal">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head">
      <span id="modalTitle">New Quarterly Goal</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div class="f">
      <label class="f-l">Title</label>
      <input type="text" class="f-i" id="fTitle" placeholder="Ship EZ Reader to the App Store" />
    </div>

    <div class="f">
      <label class="f-l">Pillar</label>
      <div class="picker" id="pillarPicker"></div>
    </div>

    <div class="row">
      <div class="f">
        <label class="f-l">Status</label>
        <div class="picker" id="statusPicker"></div>
      </div>
      <div class="f">
        <label class="f-l">Target date</label>
        <input type="date" class="f-i" id="fTarget" />
      </div>
    </div>

    <div class="f">
      <label class="f-l">Progress</label>
      <div class="slider-row">
        <input type="range" id="fProgressSlider" min="0" max="100" step="5" value="0" />
        <span class="val" id="fProgressLbl">0%</span>
      </div>
    </div>

    <div class="f">
      <label class="f-l">Notes (optional)</label>
      <textarea class="f-i" id="fNotes" placeholder="Context, blockers, anything worth remembering next check-in."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>

<!-- LINK MODAL -->
<div class="modal" id="linkModal">
  <div class="modal-card link-modal-card">
    <div class="modal-head">
      <span id="linkModalTitle">Link board cards</span>
      <button class="modal-close" onclick="closeLinkModal()">&times;</button>
    </div>
    <input type="text" class="link-search" id="linkSearch" placeholder="Search cards…" oninput="renderLinkModalBody()" />
    <div class="link-body" id="linkBody"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeLinkModal()">Cancel</button>
      <button class="btn primary" onclick="saveLinks()">Save</button>
    </div>
  </div>
</div>

<script>
const SK='quarterly-goals-v1';
const BOARD_SK='goal-board-v2';
const PILLARS=[
  {id:'ezrk',label:'EZRK',color:'var(--p-ezrk)'},
  {id:'vt',label:'VitalTouch',color:'var(--p-vt)'},
  {id:'bha',label:'BHA',color:'var(--p-bha)'},
  {id:'work',label:'Day Job',color:'var(--p-work)'},
  {id:'personal',label:'Personal',color:'var(--p-personal)'}
];
const STATUSES=[
  {id:'on',label:'On Track',cls:'on'},
  {id:'at',label:'At Risk',cls:'at'},
  {id:'bl',label:'Blocked',cls:'bl'},
  {id:'dn',label:'Shipped',cls:'dn'}
];

let data=load();
let activeFilter='all';
let editingId=null;
let modalPillar='ezrk';
let modalStatus='on';

// Link modal state
let linkingGoalId=null;
let linkSelections={}; // {boardCardId: true}

// ---- Board data access ----
function loadBoard(){
  try{const raw=localStorage.getItem(BOARD_SK); if(raw){const d=JSON.parse(raw); if(d&&Array.isArray(d.boards))return d;}}catch(e){}
  return{boards:[]};
}
function saveBoard(d){
  try{
    const s=JSON.stringify(d);
    localStorage.setItem(BOARD_SK,s);
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push(BOARD_SK,s)}catch{} }
  }catch(e){}
}
function allBoardCards(){
  const bd=loadBoard();
  const out=[];
  (bd.boards||[]).forEach(b=>{
    (b.goals||[]).forEach(g=>{
      const col=(b.columns||[]).find(c=>c.id===g.columnId)||{title:'',color:'#888'};
      out.push({
        boardId:b.id,boardName:b.name||'Board',boardColor:b.color||'#888',
        goalId:g.id,title:g.title||'(untitled)',
        columnId:col.id,columnTitle:col.title||'',columnColor:col.color||'#888',
        actionItems:g.actionItems||[],
        quarterlyGoalId:g.quarterlyGoalId||null,
        completedAt:g.completedAt||null
      });
    });
  });
  return out;
}
function isBoardGoalDone(g){
  const items=g.actionItems||[];
  if(!items.length) return !!g.completedAt;
  return items.every(i=>i.done);
}
function linkedCardsFor(quarterlyGoalId){
  return allBoardCards().filter(c=>c.quarterlyGoalId===quarterlyGoalId);
}
function linkedTally(quarterlyGoalId){
  const cards=linkedCardsFor(quarterlyGoalId);
  let tasksTotal=0,tasksDone=0,cardsDone=0;
  cards.forEach(c=>{
    const items=c.actionItems||[];
    tasksTotal+=items.length;
    tasksDone+=items.filter(i=>i.done).length;
    if(isBoardGoalDone({actionItems:items,completedAt:c.completedAt}))cardsDone++;
  });
  return{cards:cards.length,cardsDone,tasksTotal,tasksDone};
}

// ---- Data ----
function load(){
  try{const raw=localStorage.getItem(SK); if(raw) return JSON.parse(raw);}catch(e){}
  return{currentQuarter:currentQuarterKey(),goals:[]};
}
function save(){
  try{
    const s=JSON.stringify(data);
    localStorage.setItem(SK,s);
    if(window.syncClient && typeof window.syncClient.push==='function'){ try{window.syncClient.push(SK,s)}catch{} }
  }catch(e){}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ---- Quarter calc ----
function currentQuarterKey(d){d=d||new Date();return d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1)}
function currentQuarterRange(d){
  d=d||new Date();
  const q=Math.floor(d.getMonth()/3);
  return{start:new Date(d.getFullYear(),q*3,1),end:new Date(d.getFullYear(),q*3+3,0,23,59,59),q:q+1,y:d.getFullYear()};
}
function quarterEndKey(){const{end}=currentQuarterRange();return end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0')+'-'+String(end.getDate()).padStart(2,'0');}
function daysLeft(){const{end}=currentQuarterRange();return Math.max(0,Math.ceil((end.getTime()-Date.now())/86400000));}

function monthRange(){
  const{start,end}=currentQuarterRange();
  const fmt=d=>d.toLocaleDateString('en-US',{month:'long'});
  return fmt(start)+' – '+fmt(end);
}

// ---- Header ----
function renderHeader(){
  const{q,y}=currentQuarterRange();
  document.getElementById('quarterQ').textContent='Q'+q;
  document.getElementById('quarterSub').textContent=monthRange()+' · '+y;
  document.getElementById('daysLeft').textContent=daysLeft();
  const editionNum=((y-2020)*4+q);
  document.getElementById('editionLbl').textContent='Vol '+y+' · No '+editionNum;
  const g=data.goals||[];
  let latest=0;
  g.forEach(x=>{if(x.updatedAt){const t=new Date(x.updatedAt).getTime();if(t>latest)latest=t;}});
  document.getElementById('updatedLbl').textContent=latest?('Updated '+relTime(latest)):'Updated —';
}
function relTime(t){
  const d=(Date.now()-t)/1000;
  if(d<60)return'just now';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  const days=Math.floor(d/86400);
  if(days<30)return days+'d ago';
  return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ---- Health ----
function renderHealth(){
  const g=data.goals||[];
  const c={on:0,at:0,bl:0,dn:0};
  g.forEach(x=>{if(c[x.status]!=null)c[x.status]++;});
  document.getElementById('cntOn').textContent=c.on;
  document.getElementById('cntAt').textContent=c.at;
  document.getElementById('cntBl').textContent=c.bl;
  document.getElementById('cntDn').textContent=c.dn;
}

// ---- Chips ----
function renderChips(){
  const all=data.goals||[];
  const counts={all:all.length};
  PILLARS.forEach(p=>{counts[p.id]=all.filter(g=>g.pillar===p.id).length;});
  let html=`<button class="chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All<span class="num">${counts.all}</span></button>`;
  PILLARS.forEach(p=>{
    if(!counts[p.id])return;
    html+=`<button class="chip ${activeFilter===p.id?'active':''}" onclick="setFilter('${p.id}')"><span class="dot" style="background:${p.color}"></span>${p.label}<span class="num">${counts[p.id]}</span></button>`;
  });
  document.getElementById('chips').innerHTML=html;
}
function setFilter(f){activeFilter=f;renderChips();renderList();}

// ---- List ----
function statusMeta(id){return STATUSES.find(s=>s.id===id)||STATUSES[0]}
function pillarMeta(id){return PILLARS.find(p=>p.id===id)||PILLARS[0]}

function renderList(){
  const el=document.getElementById('list');
  let goals=data.goals||[];
  if(activeFilter!=='all')goals=goals.filter(g=>g.pillar===activeFilter);
  const rank={on:1,at:0,bl:-1,dn:99};
  goals=goals.slice().sort((a,b)=>{
    if((rank[a.status]??1)!==(rank[b.status]??1))return(rank[a.status]??1)-(rank[b.status]??1);
    return(a.progress||0)-(b.progress||0);
  });
  if(!goals.length){
    el.innerHTML=`<div class="empty">
      <h3>${activeFilter==='all'?'No quarterly goals yet.':'Nothing here in this pillar.'}</h3>
      <p>Quarterly goals are the 3–5 strategic bets for the next 90 days. Not todos. Big moves.</p>
      <button class="add-btn" onclick="openAddModal()">+ Set your first goal</button>
    </div>`;
    return;
  }
  el.innerHTML=goals.map(renderCard).join('');
}

function renderCard(g){
  const pm=pillarMeta(g.pillar);
  const sm=statusMeta(g.status);
  const progress=Math.max(0,Math.min(100,g.progress||0));
  const days = g.targetDate ? daysUntil(g.targetDate) : daysLeft();
  const overdue = days===0 && g.status!=='dn';
  const soon = days>0 && days<=7 && g.status!=='dn';
  const targetLbl = g.targetDate ? fmtDate(g.targetDate) : 'End of Q';
  const isDone = g.status==='dn';
  const cardCls = 'card'+(isDone?' dn':'')+(g.status==='bl'?' bl':'');
  const topRCls = 'card-top-r'+(overdue?' overdue':(soon?' soon':''));
  const notesHTML = g.notes
    ? `<div class="notes" onclick="openEditModal('${g.id}')">${escapeHtml(g.notes)}</div>`
    : '';

  // Linked work
  const linked=linkedCardsFor(g.id);
  const tally=linkedTally(g.id);
  const workTally = linked.length
    ? `<span class="tally">${tally.cardsDone}/${tally.cards} cards${tally.tasksTotal?` · ${tally.tasksDone}/${tally.tasksTotal} tasks`:''}</span>`
    : '';
  const workRows = linked.length
    ? linked.slice(0,5).map(c=>{
        const itemsTotal=(c.actionItems||[]).length;
        const itemsDone=(c.actionItems||[]).filter(i=>i.done).length;
        const cardDone=isBoardGoalDone({actionItems:c.actionItems,completedAt:c.completedAt});
        const rightTxt=cardDone
          ? 'Done'
          : (itemsTotal?`${itemsDone}/${itemsTotal}`:'—');
        return `<div class="wk-row" onclick="openBoardCard('${c.boardId}','${c.goalId}')">
          <span class="wk-dot" style="background:${c.columnColor}"></span>
          <div class="wk-main">
            <div class="wk-title">${escapeHtml(c.title)}</div>
            <div class="wk-sub"><span>${escapeHtml(c.boardName)}</span><span class="sep">·</span><span>${escapeHtml(c.columnTitle)}</span></div>
          </div>
          <div class="wk-right${cardDone?' done':''}">${rightTxt}</div>
        </div>`;
      }).join('') + (linked.length>5?`<div class="wk-empty">+${linked.length-5} more</div>`:'')
    : `<div class="wk-empty">No linked cards. Link work from your boards to track execution under this goal.</div>`;

  return `<article class="${cardCls}" data-id="${g.id}">
    <div class="card-top">
      <div class="card-top-l">
        <span class="pillar"><span class="d" style="background:${pm.color}"></span>${pm.label}</span>
        <span class="status ${sm.cls}">${sm.label}</span>
      </div>
      <span class="${topRCls}">${targetLbl}${days!=null?' · '+(overdue?'due':days+'d'):''}</span>
    </div>
    <div class="title">${escapeHtml(g.title||'Untitled')}</div>
    ${notesHTML}
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill ${sm.cls}" style="width:${progress}%"></div></div>
      <div class="prog-num">${progress}%</div>
    </div>
    <div class="work">
      <div class="work-head">
        <div class="work-title">Work ${workTally}</div>
        <button class="work-link" onclick="openLinkModal('${g.id}')">${linked.length?'Manage':'+ Link cards'}</button>
      </div>
      <div class="work-list">${workRows}</div>
    </div>
    <div class="actions">
      <button class="ab" onclick="cycleStatus('${g.id}')" title="Cycle status">Status</button>
      <button class="ab" onclick="nudgeProgress('${g.id}',-10)">–10%</button>
      <button class="ab primary" onclick="nudgeProgress('${g.id}',10)">+10%</button>
      ${isDone?'':`<button class="ab ship" onclick="markShipped('${g.id}')">Ship</button>`}
      <button class="ab" onclick="openEditModal('${g.id}')">Edit</button>
      <button class="ab del" onclick="deleteGoal('${g.id}')">Delete</button>
    </div>
  </article>`;
}

function openBoardCard(boardId,goalId){
  window.location.href='/goal-board.html?board='+encodeURIComponent(boardId)+'&goal='+encodeURIComponent(goalId);
}

function cycleStatus(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  const order=['on','at','bl','dn'];
  g.status=order[(order.indexOf(g.status||'on')+1)%order.length];
  g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function nudgeProgress(gid,delta){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  g.progress=Math.max(0,Math.min(100,(g.progress||0)+delta));
  if(g.progress===100 && g.status!=='dn')g.status='dn';
  if(g.progress<100 && g.status==='dn')g.status='on';
  g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function markShipped(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  g.status='dn';g.progress=100;g.updatedAt=new Date().toISOString();
  save();renderAll();
}
function deleteGoal(gid){
  if(!confirm('Delete this goal?'))return;
  data.goals=data.goals.filter(x=>x.id!==gid);
  save();renderAll();
}

// ---- Modal ----
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='New Quarterly Goal';
  document.getElementById('fTitle').value='';
  document.getElementById('fNotes').value='';
  setSlider(0);
  document.getElementById('fTarget').value=quarterEndKey();
  modalPillar='ezrk';modalStatus='on';
  renderPickers();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),60);
}
function openEditModal(gid){
  const g=data.goals.find(x=>x.id===gid);if(!g)return;
  editingId=gid;
  document.getElementById('modalTitle').textContent='Edit Goal';
  document.getElementById('fTitle').value=g.title||'';
  document.getElementById('fNotes').value=g.notes||'';
  setSlider(g.progress||0);
  document.getElementById('fTarget').value=g.targetDate||quarterEndKey();
  modalPillar=g.pillar||'ezrk';modalStatus=g.status||'on';
  renderPickers();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function renderPickers(){
  document.getElementById('pillarPicker').innerHTML=PILLARS.map(p=>
    `<button class="pk ${modalPillar===p.id?'active':''}" onclick="modalPillar='${p.id}';renderPickers()"><span class="d" style="background:${p.color}"></span>${p.label}</button>`
  ).join('');
  document.getElementById('statusPicker').innerHTML=STATUSES.map(s=>
    `<button class="pk ${modalStatus===s.id?'active':''}" onclick="modalStatus='${s.id}';renderPickers()">${s.label}</button>`
  ).join('');
}
function setSlider(v){
  document.getElementById('fProgressSlider').value=String(v);
  document.getElementById('fProgressLbl').textContent=v+'%';
}
document.getElementById('fProgressSlider').addEventListener('input',e=>{
  document.getElementById('fProgressLbl').textContent=e.target.value+'%';
});

// ---- Link Modal ----
function openLinkModal(quarterlyGoalId){
  linkingGoalId=quarterlyGoalId;
  linkSelections={};
  allBoardCards().forEach(c=>{
    if(c.quarterlyGoalId===quarterlyGoalId) linkSelections[c.goalId]=true;
  });
  const g=data.goals.find(x=>x.id===quarterlyGoalId);
  document.getElementById('linkModalTitle').textContent=g?('Link cards → '+(g.title||'Goal')):'Link board cards';
  document.getElementById('linkSearch').value='';
  renderLinkModalBody();
  document.getElementById('linkModal').classList.add('open');
  setTimeout(()=>{try{document.getElementById('linkSearch').focus()}catch{}},80);
}
function closeLinkModal(){
  document.getElementById('linkModal').classList.remove('open');
  linkingGoalId=null;linkSelections={};
}
function toggleLinkCard(cardId){
  if(linkSelections[cardId]) delete linkSelections[cardId];
  else linkSelections[cardId]=true;
  renderLinkModalBody();
}
function renderLinkModalBody(){
  const body=document.getElementById('linkBody');
  const q=String(document.getElementById('linkSearch').value||'').trim().toLowerCase();
  const bd=loadBoard();
  if(!bd.boards||!bd.boards.length){
    body.innerHTML=`<div class="link-empty">No boards yet. Create a board and add cards first.</div>`;
    return;
  }
  let anyShown=false;
  let html='';
  bd.boards.forEach(b=>{
    const goals=(b.goals||[]).filter(g=>{
      if(!q) return true;
      return String(g.title||'').toLowerCase().includes(q);
    });
    if(!goals.length) return;
    anyShown=true;
    html+=`<div class="link-board">
      <div class="link-board-head">
        <span class="d" style="background:${b.color||'#888'}"></span>
        <span>${escapeHtml(b.name||'Board')}</span>
        <span class="n">· ${goals.length}</span>
      </div>`;
    goals.forEach(g=>{
      const col=(b.columns||[]).find(c=>c.id===g.columnId)||{title:'',color:'#888'};
      const items=g.actionItems||[];
      const done=items.filter(i=>i.done).length;
      const prog=items.length?`${done}/${items.length}`:'';
      const selected=!!linkSelections[g.id];
      const foreignLink=g.quarterlyGoalId && g.quarterlyGoalId!==linkingGoalId;
      const foreignTag=foreignLink?`<span class="foreign-tag">Linked</span>`:'';
      html+=`<div class="link-card-row ${selected?'on':''} ${foreignLink?'foreign':''}" onclick="toggleLinkCard('${g.id}')">
        <span class="link-check"></span>
        <div class="link-card-main">
          <div class="link-card-title">${escapeHtml(g.title||'(untitled)')}</div>
          <div class="link-card-sub"><span class="cdot" style="background:${col.color}"></span>${escapeHtml(col.title||'')} ${foreignTag}</div>
        </div>
        ${prog?`<div class="link-card-prog">${prog}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  if(!anyShown) html=`<div class="link-empty">No cards match your search.</div>`;
  body.innerHTML=html;
}
function saveLinks(){
  if(!linkingGoalId){closeLinkModal();return;}
  const bd=loadBoard();
  let mutated=false;
  (bd.boards||[]).forEach(b=>{
    (b.goals||[]).forEach(g=>{
      const wantsLinked=!!linkSelections[g.id];
      const isLinkedHere=g.quarterlyGoalId===linkingGoalId;
      if(wantsLinked && !isLinkedHere){
        g.quarterlyGoalId=linkingGoalId;mutated=true;
      } else if(!wantsLinked && isLinkedHere){
        delete g.quarterlyGoalId;mutated=true;
      }
    });
  });
  if(mutated) saveBoard(bd);
  closeLinkModal();
  renderAll();
}

function saveGoal(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){alert('Give the goal a title.');return;}
  const notes=document.getElementById('fNotes').value.trim();
  const progress=Math.max(0,Math.min(100,parseInt(document.getElementById('fProgressSlider').value||'0',10)));
  const targetDate=document.getElementById('fTarget').value||quarterEndKey();
  const now=new Date().toISOString();
  if(editingId){
    const g=data.goals.find(x=>x.id===editingId);
    if(g)Object.assign(g,{title,notes,progress,targetDate,pillar:modalPillar,status:modalStatus,updatedAt:now});
  } else {
    if(!Array.isArray(data.goals))data.goals=[];
    data.goals.unshift({
      id:uid(),title,notes,progress,targetDate,pillar:modalPillar,status:modalStatus,
      createdAt:now,updatedAt:now,quarter:currentQuarterKey()
    });
  }
  save();closeModal();renderAll();
}

// ---- Utilities ----
function escapeHtml(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}
function fmtDate(dk){const d=new Date(dk+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function daysUntil(dk){const d=new Date(dk+'T12:00:00');return Math.max(0,Math.ceil((d.getTime()-Date.now())/86400000))}

function renderAll(){renderHeader();renderHealth();renderChips();renderList();}

// Close modal on backdrop/Esc
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('linkModal').addEventListener('click',e=>{if(e.target.id==='linkModal')closeLinkModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLinkModal();}});

// Cross-tab sync (our data + board data both trigger a re-render)
window.addEventListener('storage',e=>{
  if(e.key===SK){data=load();renderAll();}
  if(e.key===BOARD_SK){renderAll(); if(document.getElementById('linkModal').classList.contains('open'))renderLinkModalBody();}
});

renderAll();

try{window._quarterly={data,save,load,render:renderAll};}catch{}
</script>

</body>
</html>
