<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh; background: #050507;
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    color: #fff; overflow: hidden;
  }
  .glow-tr {
    position: fixed; top: -200px; right: -200px; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,138,61,.06) 0%, transparent 70%); pointer-events: none;
  }
  .glow-bl {
    position: fixed; bottom: -300px; left: -200px; width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,26,.04) 0%, transparent 70%); pointer-events: none;
  }
  .layout { display: flex; height: 100vh; position: relative; z-index: 1; }
  /* Sidebar */
  .sidebar {
    width: 280px; min-width: 280px; padding: 56px 36px;
    display: flex; flex-direction: column;
    border-right: 1px solid rgba(255,255,255,.04);
  }
  .day-name {
    font-size: 48px; font-weight: 800; letter-spacing: -2px; line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .date-sub { font-size: 20px; font-weight: 500; color: rgba(255,255,255,.35); margin-top: 8px; letter-spacing: 1px; }
  .date-nav { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
  .date-nav-btn {
    background: rgba(255,255,255,.06); border: none; color: rgba(255,255,255,.5);
    width: 36px; height: 36px; border-radius: 10px; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-family: inherit;
  }
  .date-nav-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
  .today-btn {
    background: none; border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.4);
    padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .2s; font-family: inherit;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .today-btn:hover { border-color: #FF8A3D; color: #FF8A3D; }
  .today-btn.hidden { display: none; }
  /* Sidebar nav buttons */
  .sidebar-nav { display: flex; flex-direction: column; gap: 6px; margin-top: 28px; }
  .sidebar-nav-btn {
    background: rgba(255,255,255,.03); border: none; color: rgba(255,255,255,.35);
    padding: 12px 16px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .2s; font-family: inherit; text-align: left;
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-nav-btn:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6); }
  .sidebar-nav-btn.active { background: rgba(255,138,61,.08); color: #FF8A3D; }
  .sidebar-nav-btn svg { flex-shrink: 0; }
  .sidebar-spacer { flex: 1; }
  .carryover-notice {
    font-size: 13px; font-weight: 500; color: #FF8A3D;
    padding: 10px 0; opacity: .8;
  }
  .total-time-section { margin-bottom: 28px; }
  .total-time-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2px; color: rgba(255,255,255,.2); margin-bottom: 6px;
  }
  .total-time-value {
    font-size: 36px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, #FF8A3D, #FF6B1A);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .total-time-value.empty { background: none; -webkit-text-fill-color: rgba(255,255,255,.1); }
  .time { font-size: 32px; font-weight: 700; color: rgba(255,255,255,.4); letter-spacing: -1px; }
  .progress-section { margin-top: 24px; }
  .progress-info { font-size: 15px; font-weight: 600; color: #FF8A3D; margin-bottom: 10px; }
  .progress-track {
    width: 100%; height: 4px; background: rgba(255,255,255,.06);
    border-radius: 2px; overflow: hidden; display: none;
  }
  .progress-track.visible { display: block; }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #FF8A3D, #FF6B1A);
    border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .clear-btn {
    margin-top: 24px; background: none; border: none;
    color: rgba(255,255,255,.25); font-size: 14px; font-weight: 500;
    cursor: pointer; padding: 0; transition: color .2s; font-family: inherit;
    display: none; text-align: left;
  }
  .clear-btn.visible { display: inline-block; }
  .clear-btn:hover { color: #FF8A3D; }
  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .list {
    flex: 1; overflow-y: auto; padding: 48px 48px 24px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 80px 0; color: rgba(255,255,255,.2); font-size: 18px;
  }
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 16px;
  }
  .empty-icon {
    font-size: 48px; font-weight: 200; color: rgba(255,255,255,.1);
    width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.06);
  }
  .empty-text { font-size: 20px; color: rgba(255,255,255,.2); font-weight: 500; }
  .section-label {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2px; color: rgba(255,255,255,.2); margin-bottom: 2px;
    margin-top: 16px; padding-left: 4px;
  }
  .todo-wrapper { flex-shrink: 0; }
  .todo-item {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px; background: rgba(255,255,255,.03);
    border-radius: 16px; cursor: pointer; transition: background .2s, opacity .2s, transform .15s;
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    user-select: none; position: relative;
  }
  .todo-item:hover { background: rgba(255,255,255,.06); }
  .todo-item.done { opacity: .45; }
  .todo-item.timing { background: rgba(255,138,61,.04); }
  .todo-item.countdown-done { animation: flashDone 1s ease 3; }
  @keyframes flashDone {
    0%, 100% { background: rgba(255,138,61,.04); }
    50% { background: rgba(255,138,61,.12); }
  }
  .todo-item.dragging {
    opacity: .85; background: rgba(255,138,61,.08);
    transform: scale(1.02); z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .todo-item.drag-over-above { box-shadow: 0 -2px 0 0 #FF8A3D; }
  .todo-item.drag-over-below { box-shadow: 0 2px 0 0 #FF8A3D; }
  .drag-handle {
    display: flex; flex-direction: column; gap: 3px;
    cursor: grab; padding: 6px 4px; opacity: .2;
    transition: opacity .2s; min-width: 18px; align-items: center;
  }
  .drag-handle:hover { opacity: .5; }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle span { display: block; width: 14px; height: 2px; background: #fff; border-radius: 1px; }
  .checkbox {
    width: 32px; height: 32px; min-width: 32px; border-radius: 10px;
    border: 2px solid rgba(255,255,255,.2); display: flex;
    align-items: center; justify-content: center; transition: all .2s;
  }
  .todo-item.done .checkbox {
    background: linear-gradient(135deg, #FF8A3D, #FF6B1A); border-color: transparent;
  }
  .checkbox svg { display: none; }
  .todo-item.done .checkbox svg { display: block; }
  .todo-text { font-size: 22px; font-weight: 500; flex: 1; letter-spacing: -.3px; line-height: 1.4; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .timer-inline { display: flex; align-items: center; gap: 10px; }
  .timer-countdown {
    font-size: 18px; font-weight: 700; color: rgba(255,255,255,.4);
    font-variant-numeric: tabular-nums; letter-spacing: .5px; min-width: 60px; text-align: right;
  }
  .timer-countdown.active { color: #FF8A3D; }
  .timer-countdown.warning { color: #ff4444; }
  .timer-play-btn {
    background: none; border: 2px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.4); width: 44px; height: 44px;
    border-radius: 50%; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all .2s; padding: 0; flex-shrink: 0;
  }
  .timer-play-btn:hover { border-color: #FF8A3D; color: #FF8A3D; }
  .timer-play-btn.active {
    border-color: #FF8A3D; color: #FF8A3D;
    background: rgba(255,138,61,.1); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,138,61,.2); }
    50% { box-shadow: 0 0 0 6px rgba(255,138,61,0); }
  }
  .timer-set-btn {
    background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.1);
    color: rgba(255,255,255,.3); height: 44px; padding: 0 16px;
    border-radius: 12px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: all .2s; font-family: inherit; font-size: 14px; font-weight: 600; flex-shrink: 0;
  }
  .timer-set-btn:hover { border-color: #FF8A3D; color: #FF8A3D; background: rgba(255,138,61,.06); }
  .timer-picker {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 24px; margin-top: 6px;
    background: rgba(255,255,255,.02); border-radius: 14px; flex-wrap: wrap;
  }
  .timer-picker-label {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,.25);
    margin-right: 4px; text-transform: uppercase; letter-spacing: 1px;
  }
  .preset-btn {
    background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.5); height: 46px; min-width: 64px; padding: 0 18px;
    border-radius: 12px; cursor: pointer; font-family: inherit;
    font-size: 16px; font-weight: 700; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .preset-btn:hover { background: rgba(255,138,61,.12); border-color: #FF8A3D; color: #FF8A3D; transform: scale(1.05); }
  .preset-btn.selected { background: linear-gradient(135deg, #FF8A3D, #FF6B1A); border-color: transparent; color: #050507; }
  .preset-cancel {
    background: none; border: 1.5px solid rgba(255,255,255,.06);
    color: rgba(255,255,255,.25); height: 46px; padding: 0 16px;
    border-radius: 12px; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 600; transition: all .15s; margin-left: auto;
  }
  .preset-cancel:hover { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.5); }
  .custom-time-row {
    display: flex; align-items: center; gap: 8px;
    width: 100%; margin-top: 8px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,.04);
  }
  .custom-time-row label {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,.25);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .custom-time-input {
    width: 72px; padding: 10px 12px; font-size: 18px; font-weight: 700;
    color: #fff; background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px;
    outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
    text-align: center; font-variant-numeric: tabular-nums;
  }
  .custom-time-input:focus { border-color: rgba(255,138,61,.4); }
  .custom-time-input::placeholder { color: rgba(255,255,255,.15); }
  .custom-time-sep {
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,.2);
  }
  .custom-time-go {
    background: linear-gradient(135deg, #FF8A3D, #FF6B1A);
    border: none; color: #050507; height: 44px; padding: 0 22px;
    border-radius: 10px; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 700; transition: all .15s; margin-left: 4px;
  }
  .custom-time-go:hover { background: linear-gradient(135deg, #FF9B57, #FF8A3D); }
  .done-time { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.3); font-variant-numeric: tabular-nums; }
  .remove-btn {
    background: none; border: none; color: #fff; font-size: 26px;
    cursor: pointer; opacity: .15; transition: opacity .2s;
    padding: 4px 8px; font-family: inherit;
  }
  .remove-btn:hover { opacity: 1; }
  /* Recurring / Archive items */
  .template-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px; background: rgba(255,255,255,.03);
    border-radius: 14px; transition: all .2s;
  }
  .template-item:hover { background: rgba(255,255,255,.06); }
  .template-item .todo-text { font-size: 20px; }
  .template-add-btn {
    background: rgba(255,138,61,.1); border: 1.5px solid rgba(255,138,61,.2);
    color: #FF8A3D; height: 40px; padding: 0 20px;
    border-radius: 10px; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 700; transition: all .15s; flex-shrink: 0;
  }
  .template-add-btn:hover { background: rgba(255,138,61,.2); border-color: #FF8A3D; }
  .template-remove-btn {
    background: none; border: none; color: #fff; font-size: 22px;
    cursor: pointer; opacity: .15; transition: opacity .2s;
    padding: 4px 8px; font-family: inherit;
  }
  .template-remove-btn:hover { opacity: 1; }
  .archive-date {
    font-size: 15px; font-weight: 700; color: rgba(255,255,255,.3);
    margin-top: 20px; margin-bottom: 8px; padding-left: 4px;
  }
  .archive-date:first-child { margin-top: 0; }
  .archive-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px; background: rgba(255,255,255,.02);
    border-radius: 12px; opacity: .5;
  }
  .archive-item .todo-text { font-size: 18px; text-decoration: line-through; }
  /* Panel header */
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 24px;
  }
  .panel-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .panel-back {
    background: rgba(255,255,255,.06); border: none; color: rgba(255,255,255,.5);
    padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  .panel-back:hover { background: rgba(255,255,255,.1); color: #fff; }
  /* Add recurring input */
  .add-recurring {
    display: flex; gap: 12px; align-items: center; margin-top: 16px;
  }
  .add-recurring input {
    flex: 1; padding: 16px 20px; font-size: 18px; font-weight: 500;
    color: #fff; background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
    outline: none; font-family: 'Plus Jakarta Sans', sans-serif; transition: border-color .2s;
  }
  .add-recurring input:focus { border-color: rgba(255,138,61,.3); }
  .add-recurring input::placeholder { color: rgba(255,255,255,.2); }
  .add-recurring button {
    padding: 16px 28px; font-size: 16px; font-weight: 700;
    color: #050507; background: linear-gradient(135deg, #FF8A3D, #FF6B1A);
    border: none; border-radius: 12px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif; transition: all .2s;
  }
  .add-recurring button:hover { background: linear-gradient(135deg, #FF9B57, #FF8A3D); }
  /* Input */
  .input-area {
    display: flex; gap: 14px; align-items: center;
    padding: 20px 48px 40px;
    background: linear-gradient(to top, #050507 60%, transparent);
  }
  .input-area input {
    flex: 1; padding: 20px 24px; font-size: 20px; font-weight: 500;
    color: #fff; background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
    outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    transition: border-color .2s;
  }
  .input-area input:focus { border-color: rgba(255,138,61,.3); }
  .input-area input::placeholder { color: rgba(255,255,255,.2); }
  .add-btn {
    padding: 20px 36px; font-size: 18px; font-weight: 700;
    color: #050507; background: linear-gradient(135deg, #FF8A3D, #FF6B1A);
    border: none; border-radius: 14px; cursor: pointer;
    transition: all .2s; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -.3px;
  }
  .add-btn:hover { background: linear-gradient(135deg, #FF9B57, #FF8A3D); }

  /* ------- Embed mode for War Room iframe ------- */
  body.embed .glow-tr, body.embed .glow-bl { display: none; }
  body.embed { background: #050507; }
  body.embed .sidebar {
    width: 220px; min-width: 220px; padding: 24px 20px;
  }
  body.embed .day-name { font-size: 28px; letter-spacing: -1px; }
  body.embed .date-sub { font-size: 13px; }
  body.embed .date-nav { gap: 6px; margin-top: 10px; }
  body.embed .date-nav-btn { width: 32px; height: 32px; font-size: 14px; }
  body.embed .sidebar-nav { margin-top: 20px; gap: 4px; }
  body.embed .time { font-size: 16px; }
  body.embed .total-time-value { font-size: 28px; }
  body.embed .main { height: 100vh; }
  @media (max-width: 760px) {
    body.embed .sidebar { width: 100%; min-width: 0; padding: 16px; border-right: none; border-bottom: 1px solid rgba(255,255,255,.06); }
    body.embed .layout { flex-direction: column; height: auto; }
    body.embed .main { height: auto; min-height: 60vh; }
    body.embed .day-name { font-size: 22px; }
  }
</style>
</head>
<body>
<script>
  (function(){
    try {
      var p = new URLSearchParams(window.location.search);
      if (p.get('embed') === '1' || window.self !== window.top) {
        document.body.classList.add('embed');
      }
    } catch(e) {}
  })();
</script>

<div class="glow-tr"></div>
<div class="glow-bl"></div>
<div class="layout">
  <div class="sidebar">
    <div class="day-name" id="dayName"></div>
    <div class="date-sub" id="dateSub"></div>
    <div class="date-nav">
      <button class="date-nav-btn" id="prevDay">&larr;</button>
      <button class="date-nav-btn" id="nextDay">&rarr;</button>
      <button class="today-btn hidden" id="todayBtn">Today</button>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-nav-btn active" id="navTasks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Tasks
      </button>
      <button class="sidebar-nav-btn" id="navRecurring">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Recurring
      </button>
      <button class="sidebar-nav-btn" id="navArchive">

        Archive
      </button>
    </div>
    <div class="carryover-notice" id="carryoverNotice" style="display:none"></div>
    <div class="sidebar-spacer"></div>

      <div class="total-time-value empty" id="totalTime">0:00</div>

      <div class="progress-info" id="progressInfo"></div>

    <div class="list" id="list"></div>

      <input type="text" id="todoInput" placeholder="Add a task...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>
  </div>
</div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, query, where, orderBy, writeBatch } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
  const firebaseConfig = {
    apiKey: "AIzaSyDAWnQSN96g-zVpaeAZbaaw4btvCmGSRTs",
    authDomain: "tv-todos.firebaseapp.com",
    projectId: "tv-todos",
    storageBucket: "tv-todos.firebasestorage.app",
    messagingSenderId: "566644863130",
    appId: "1:566644863130:web:dacb2e5e7699c0a2e9af23"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const todosCol = collection(db, 'tv_todos');
  const recurringCol = collection(db, 'recurring_tasks');

  function playVoiceClip(text) {
    let key = null;
    const t = text.trim();
    if (t === "Time's up") { key = 'timesup'; }
    else if (t.endsWith(' minutes')) {
      const n = parseInt(t);
      if (VOICE['min_' + n]) key = 'min_' + n;
    } else if (t.endsWith(' thirty')) {
      const n = parseInt(t);
      if (VOICE['mid_' + n]) key = 'mid_' + n;
    } else {
      const n = parseInt(t);
      if (!isNaN(n) && VOICE['n_' + n]) key = 'n_' + n;
    }
    if (key && VOICE[key]) {
      try {
        const a = new Audio(VOICE[key]);
        a.volume = 1.0;
        a.play().catch(() => {});
        return true;
      } catch(e) { return false; }
    }
    return false;
  }
  function speak(text) {
    // 1. Try pre-recorded voice clip (works on TV + desktop)
    const voicePlayed = playVoiceClip(text);
    // 2. Only play beeps if voice clip failed
    if (!voicePlayed) playBeepAnnouncement(text);
    // 3. Also try speech synthesis if no voice clip (desktop only)
    if (!voicePlayed && speechSupported) {
      try {
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.1; utter.volume = 1;
        const voices = speechSynthesis.getVoices();
        const pref = voices.find(v => v.name.includes('Samantha'))
          || voices.find(v => v.lang === 'en-US' && v.localService);
        if (pref) utter.voice = pref;
        speechSynthesis.speak(utter);
      } catch {}
    }
  }
  // ---- Audio ----
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function beep(freq, duration, delay = 0, vol = 0.15) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.start(t); osc.stop(t + duration);
    } catch {}
  }
  function playBeepAnnouncement(text) {
    if (text === "Time's up") {
      // Alarm: 6 rapid high beeps
      [880,1100,880,1100,880,1320].forEach((f,i) => beep(f, 0.15, i*0.18, 0.2));
      return;
    }
    const num = parseInt(text);
    if (text.includes('thirty')) {
      // Midpoint: two quick soft beeps
      beep(700, 0.1, 0, 0.08); beep(700, 0.1, 0.15, 0.08);
    } else if (text.includes('minutes')) {
      // Minute milestones: distinct patterns
      const mins = parseInt(text);
      if (mins === 15) { beep(800,.15,0); beep(1000,.15,.2); beep(1200,.15,.4); beep(1000,.15,.6); }
      else if (mins === 10) { beep(900,.15,0); beep(1100,.15,.2); beep(900,.15,.4); }
      else if (mins === 5) { [0,1,2,3,4].forEach(i => beep(1000,.1,i*.12)); }
      else if (mins === 2) { beep(1200,.2,0); beep(1200,.2,.3); }
      else { beep(800,.12,0); beep(1000,.12,.15); } // generic 5-min marks
    } else if (!isNaN(num)) {
      // Countdown seconds: single beep, pitch rises as number decreases
      const pitch = 600 + (20 - num) * 40;
      beep(pitch, 0.12, 0, 0.12);
    }
  }
  function playStart() {
    beep(600, 0.12, 0, 0.12); beep(900, 0.12, 0.1, 0.12);
  }
  function playStop() { beep(500, 0.18, 0, 0.1); }
  function playAlarm() {
    [880,1100,880,1100,880,1320].forEach((f,i) => beep(f, 0.15, i*0.18, 0.2));
  }
  // ---- Helpers ----
  function dkey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayKey() { return dkey(new Date()); }
  function isToday() { return dkey(currentDate) === todayKey(); }
  function fmtTime(secs) {
    const s = Math.max(0, Math.floor(secs));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }
  function fmtDateLabel(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }
  function getActiveElapsed() {
    if (!activeTimerId || !timerStartedAt) return 0;
    return (Date.now() - timerStartedAt) / 1000;
  }
  function getTotalTime() {
    let total = 0;
    for (const t of todos) {
      total += (t.timeSpent || 0);
      if (t.id === activeTimerId) total += getActiveElapsed();
    }
    return total;
  }
  function updateTotalTimeDisplay() {
    const el = document.getElementById('totalTime');
    const total = getTotalTime();
    el.textContent = fmtTime(total);
    el.classList.toggle('empty', total < 1);
  }
  function updateActiveTimerDisplay() {
    if (!activeTimerId) return;
    const todo = todos.find(t => t.id === activeTimerId);
    if (!todo) return;
    const el = document.querySelector(`.todo-wrapper[data-id="${activeTimerId}"] .timer-countdown`);
    if (el) {
      const elapsed = (todo.timeSpent || 0) + getActiveElapsed();
      if (todo.countdownSecs) {
        const remaining = Math.max(0, todo.countdownSecs - elapsed);
        const remainingSecs = Math.floor(remaining);
        el.textContent = fmtTime(remaining);
        el.classList.toggle('warning', remaining <= 30 && remaining > 0);
        for (const m of [15, 10, 5, 2]) {
          const key = `min-${m}`;
          if (Math.floor(remaining / 60) === m && remainingSecs % 60 === 0 && !announcedMilestones.has(key)) {
            announcedMilestones.add(key);
            speak(`${m} minutes`);
          }
        }
        // Every 5-min mark (except ones already announced above)
        if (remainingSecs > 20 && remainingSecs % 300 === 0) {
          const mins = remainingSecs / 60;
          const key = `5min-${mins}`;
          if (!announcedMilestones.has(key) && ![15,10,5,2].includes(mins)) {
            announcedMilestones.add(key);
            speak(`${mins} minutes`);
          }
        }
        // Midpoint between 5-min marks (every 2:30)
        if (remainingSecs > 20 && remainingSecs % 300 === 150) {
          const key = `mid-${remainingSecs}`;
          if (!announcedMilestones.has(key)) {
            announcedMilestones.add(key);
            const mins = Math.floor(remainingSecs / 60);
            const secs = remainingSecs % 60;
            speak(`${mins} thirty`);
          }
        }
        if (remainingSecs <= 20 && remainingSecs >= 0) {
          const key = `sec-${remainingSecs}`;
          if (!announcedMilestones.has(key)) {
            announcedMilestones.add(key);
            speak(remainingSecs === 0 ? "Time's up" : `${remainingSecs}`);
          }
        }
        if (remaining <= 0) {
          playAlarm();
          const itemEl = document.querySelector(`.todo-wrapper[data-id="${activeTimerId}"] .todo-item`);
          if (itemEl) itemEl.classList.add('countdown-done');
          stopTimer(); return;
        }
      } else {
        el.textContent = fmtTime(elapsed);
      }
    }
    updateTotalTimeDisplay();
  }
  function startTimer(id) {
    if (activeTimerId) stopTimer(false);
    activeTimerId = id; timerStartedAt = Date.now();
    announcedMilestones = new Set(); pickerOpenId = null;
    playStart();
    tickInterval = setInterval(updateActiveTimerDisplay, 1000);
    render();
  }
  async function stopTimer(doRender = true) {
    if (!activeTimerId || !timerStartedAt) {
      activeTimerId = null; timerStartedAt = null;
      if (tickInterval) clearInterval(tickInterval); tickInterval = null; return;
    }
    const elapsed = getActiveElapsed();
    const todo = todos.find(t => t.id === activeTimerId);
    const id = activeTimerId;
    activeTimerId = null; timerStartedAt = null;
    if (tickInterval) clearInterval(tickInterval); tickInterval = null;
    if (todo) {
      todo.timeSpent = (todo.timeSpent || 0) + elapsed;
      playStop();
      try { await updateDoc(doc(db, 'tv_todos', id), { timeSpent: todo.timeSpent }); } catch {}
      // Bridge this segment to War Room analytics (Personal domain)
      try {
        if (elapsed >= 1 && window.parent && window.parent !== window) {
          window.parent.postMessage({
            type: 'warroom:personal-time',
            seconds: Math.round(elapsed),
            taskName: todo.text || 'Personal task',
            taskId: id
          }, '*');
        }
      } catch {}
    }
    if (doRender) render();
  }
  function toggleTimer(id) {
    if (activeTimerId === id) stopTimer(); else startTimer(id);
  }
  async function setCountdown(id, minutes, extraSecs = 0) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.countdownSecs = (minutes * 60) + extraSecs; todo.timeSpent = 0;
    announcedMilestones = new Set(); pickerOpenId = null;
    render();
    try { await updateDoc(doc(db, 'tv_todos', id), { countdownSecs: todo.countdownSecs, timeSpent: 0 }); } catch {}
  }
  async function clearCountdown(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.countdownSecs = 0; pickerOpenId = null; render();
    try { await updateDoc(doc(db, 'tv_todos', id), { countdownSecs: 0 }); } catch {}
  }
  // ---- Auto carry-over ----
  async function carryOverIncompleteTasks() {
    const tk = todayKey();
    try {
      const q = query(todosCol, where('done', '==', false), where('date', '<', tk));
      const snap = await getDocs(q);
      if (snap.empty) return 0;
      const batch = writeBatch(db);
      const maxPos = todos.length > 0 ? Math.max(...todos.map(t => t.position)) + 1 : 0;
      let count = 0;
      snap.docs.forEach((d, i) => {
        batch.update(doc(db, 'tv_todos', d.id), { date: tk, position: maxPos + i, timeSpent: 0, countdownSecs: 0 });
        const data = { id: d.id, ...d.data(), date: tk, position: maxPos + i, timeSpent: 0, countdownSecs: 0 };
        todos.push(data);
        count++;
      });
      await batch.commit();
      return count;
    } catch (e) { console.error('Carry-over error:', e); return 0; }
  }
  // ---- Firebase CRUD ----
  async function loadTodos() {
    if (activeTimerId) await stopTimer(false);
    loading = true; render();
    try {
      const q = query(todosCol, where('date', '==', dkey(currentDate)), orderBy('position'));
      const snap = await getDocs(q);
      todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) { console.error('Load error:', e); todos = []; }
    loading = false;
    // Auto carry-over when viewing today
    if (isToday()) {
      const carried = await carryOverIncompleteTasks();
      if (carried > 0) {
        const notice = document.getElementById('carryoverNotice');
        notice.textContent = `${carried} task${carried > 1 ? 's' : ''} carried over`;
        notice.style.display = 'block';
        setTimeout(() => notice.style.display = 'none', 5000);
      }
    }
    render();
  }
  async function addTodoItem(text) {
    const maxPos = todos.length > 0 ? Math.max(...todos.map(t => t.position)) + 1 : 0;
    try {
      const ref = await addDoc(todosCol, {
        text, done: false, date: dkey(currentDate), position: maxPos,
        timeSpent: 0, countdownSecs: 0, createdAt: new Date().toISOString()
      });
      todos.push({ id: ref.id, text, done: false, date: dkey(currentDate), position: maxPos, timeSpent: 0, countdownSecs: 0 });
      render();
    } catch (e) { console.error('Add error:', e); }
  }
  async function toggleTodo(id) {
    if (activeTimerId === id) await stopTimer(false);
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.done = !todo.done; render();
    try { await updateDoc(doc(db, 'tv_todos', id), { done: todo.done }); } catch {}
  }
  async function removeTodo(id) {
    if (activeTimerId === id) await stopTimer(false);
    todos = todos.filter(t => t.id !== id); render();
    try { await deleteDoc(doc(db, 'tv_todos', id)); } catch {}
  }
  async function clearCompleted() {
    const done = todos.filter(t => t.done);
    todos = todos.filter(t => !t.done); render();
    try {
      const batch = writeBatch(db);
      done.forEach(t => batch.delete(doc(db, 'tv_todos', t.id)));
      await batch.commit();
    } catch {}
  }
  async function savePositions() {
    try {
      const batch = writeBatch(db);
      todos.forEach((t, i) => batch.update(doc(db, 'tv_todos', t.id), { position: i }));
      await batch.commit();
    } catch {}
  }
  // ---- Recurring ----
  async function loadRecurring() {
    try {
      const snap = await getDocs(query(recurringCol, orderBy('createdAt')));
      recurringTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch { recurringTasks = []; }
  }
  async function addRecurring(text) {
    try {
      const ref = await addDoc(recurringCol, { text, createdAt: new Date().toISOString() });
      recurringTasks.push({ id: ref.id, text });
      render();
    } catch {}
  }
  async function removeRecurring(id) {
    recurringTasks = recurringTasks.filter(t => t.id !== id); render();
    try { await deleteDoc(doc(db, 'recurring_tasks', id)); } catch {}
  }
  async function addRecurringToToday(text) {
    await addTodoItem(text);
    switchView('tasks');
  }
  // ---- Archive ----
  async function loadArchive() {
    try {
      const q = query(todosCol, where('done', '==', true), orderBy('date'));
      const snap = await getDocs(q);
      archiveTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Sort newest first
      archiveTasks.reverse();
    } catch { archiveTasks = []; }
  }
  // ---- Navigation ----
  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(view === 'tasks' ? 'navTasks' : view === 'recurring' ? 'navRecurring' : 'navArchive').classList.add('active');
    const inputArea = document.getElementById('inputArea');
    inputArea.style.display = view === 'tasks' ? 'flex' : 'none';
    if (view === 'recurring') { loadRecurring().then(render); }
    else if (view === 'archive') { loadArchive().then(render); }
    else { render(); }
  }
  function shiftDate(days) {
    currentDate = new Date(currentDate);
    currentDate.setDate(currentDate.getDate() + days);
    updateHeader(); loadTodos();
  }
  function goToday() { currentDate = new Date(); updateHeader(); loadTodos(); }
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }
  function updateHeader() {
    document.getElementById('dayName').textContent = DAYS[currentDate.getDay()];
    document.getElementById('dateSub').textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}`;
    const todayBtn = document.getElementById('todayBtn');
    if (isToday()) todayBtn.classList.add('hidden'); else todayBtn.classList.remove('hidden');
  }
  const playSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>`;
  const pauseSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>`;
  const clockSVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  // ---- Render ----
  function render() {
    if (currentView === 'recurring') return renderRecurring();
    if (currentView === 'archive') return renderArchive();
    renderTasks();
  }
  function renderTasks() {
    const list = document.getElementById('list');
    const progressTrack = document.getElementById('progressTrack');
    const progressFill = document.getElementById('progressFill');
    const progressInfo = document.getElementById('progressInfo');
    const clearBtn = document.getElementById('clearBtn');
    updateTotalTimeDisplay();
    if (loading) {
      list.innerHTML = '<div class="loading">Loading...</div>';
      progressTrack.classList.remove('visible'); progressInfo.textContent = '';
      clearBtn.classList.remove('visible'); return;
    }
    const doneCount = todos.filter(t => t.done).length;
    const total = todos.length;
    if (total > 0) {
      progressTrack.classList.add('visible');
      progressFill.style.width = `${(doneCount / total) * 100}%`;
      progressInfo.textContent = `${doneCount}/${total} done`;
    } else { progressTrack.classList.remove('visible'); progressInfo.textContent = ''; }
    clearBtn.classList.toggle('visible', doneCount > 0);
    list.innerHTML = '';
    if (total === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">+</div><div class="empty-text">No tasks yet</div></div>`;
      return;
    }
    const pending = todos.filter(t => !t.done);
    const done = todos.filter(t => t.done);
    pending.forEach(todo => list.appendChild(buildItem(todo)));
    if (done.length > 0) {
      const label = document.createElement('div');
      label.className = 'section-label'; label.textContent = 'Completed';
      list.appendChild(label);
      done.forEach(todo => list.appendChild(buildItem(todo)));
    }
  }
  function renderRecurring() {
    const list = document.getElementById('list');
    document.getElementById('progressTrack').classList.remove('visible');
    document.getElementById('progressInfo').textContent = '';
    document.getElementById('clearBtn').classList.remove('visible');
    list.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'panel-header';
    header.innerHTML = `<div class="panel-title">Recurring Tasks</div>`;
    list.appendChild(header);
    if (recurringTasks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty'; empty.style.padding = '60px 0';
      empty.innerHTML = `<div class="empty-text">No recurring tasks yet</div>`;
      list.appendChild(empty);
    }
    recurringTasks.forEach(task => {
      const el = document.createElement('div');
      el.className = 'template-item';
      el.innerHTML = `
        <span class="todo-text">${escHtml(task.text)}</span>
        <button class="template-add-btn">+ Today</button>
        <button class="template-remove-btn">&times;</button>`;
      el.querySelector('.template-add-btn').addEventListener('click', () => addRecurringToToday(task.text));
      el.querySelector('.template-remove-btn').addEventListener('click', () => removeRecurring(task.id));
      list.appendChild(el);
    });
    const addArea = document.createElement('div');
    addArea.className = 'add-recurring';
    addArea.innerHTML = `<input type="text" placeholder="New recurring task..."><button>Add</button>`;
    const inp = addArea.querySelector('input');
    const btn = addArea.querySelector('button');
    const doAdd = () => { const t = inp.value.trim(); if (t) { addRecurring(t); inp.value = ''; } };
    btn.addEventListener('click', doAdd);
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') doAdd(); });
    list.appendChild(addArea);
  }
  function renderArchive() {
    const list = document.getElementById('list');
    document.getElementById('progressTrack').classList.remove('visible');
    document.getElementById('progressInfo').textContent = '';
    document.getElementById('clearBtn').classList.remove('visible');
    list.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'panel-header';
    header.innerHTML = `<div class="panel-title">Archive</div>`;
    list.appendChild(header);
    if (archiveTasks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty'; empty.style.padding = '60px 0';
      empty.innerHTML = `<div class="empty-text">No completed tasks yet</div>`;
      list.appendChild(empty);
      return;
    }
    // Group by date
    const grouped = {};
    archiveTasks.forEach(t => {
      if (!grouped[t.date]) grouped[t.date] = [];
      grouped[t.date].push(t);
    });
    Object.keys(grouped).forEach(date => {
      const label = document.createElement('div');
      label.className = 'archive-date';
      label.textContent = date === todayKey() ? 'Today' : fmtDateLabel(date);
      list.appendChild(label);
      grouped[date].forEach(task => {
        const el = document.createElement('div');
        el.className = 'archive-item';
        el.innerHTML = `
          <span class="todo-text">${escHtml(task.text)}</span>
          ${(task.timeSpent || 0) > 0 ? `<span class="done-time">${fmtTime(task.timeSpent)}</span>` : ''}`;
        list.appendChild(el);
      });
    });
  }
  function buildItem(todo) {
    const isActive = activeTimerId === todo.id;
    const elapsed = (todo.timeSpent || 0) + (isActive ? getActiveElapsed() : 0);
    const hasCountdown = (todo.countdownSecs || 0) > 0;
    const hasTime = elapsed > 0 || hasCountdown;
    const showPicker = pickerOpenId === todo.id;
    let countdownText = '';
    let isWarning = false;
    if (hasCountdown) {
      const remaining = Math.max(0, todo.countdownSecs - elapsed);
      countdownText = fmtTime(remaining);
      if (remaining <= 30 && remaining > 0 && isActive) isWarning = true;
    } else if (elapsed > 0) { countdownText = fmtTime(elapsed); }
    const wrapper = document.createElement('div');
    wrapper.className = 'todo-wrapper'; wrapper.dataset.id = todo.id;
    const el = document.createElement('div');
    el.className = 'todo-item' + (todo.done ? ' done' : '') + (isActive ? ' timing' : '');
    el.dataset.id = todo.id;
    if (!todo.done) el.draggable = true;
    let timerHTML = '';
    if (!todo.done) {
      const cd = countdownText ? `<span class="timer-countdown ${isActive?'active':''} ${isWarning?'warning':''}">${countdownText}</span>` : '';
      const setLabel = hasCountdown ? `${Math.floor(todo.countdownSecs/60)}m` : '';
      timerHTML = `<div class="timer-inline">
        ${cd}
        <button class="timer-set-btn">${clockSVG}${setLabel ? `<span>${setLabel}</span>` : ''}</button>
        <button class="timer-play-btn ${isActive?'active':''}">${isActive ? pauseSVG : playSVG}</button>
      </div>`;
    } else if (hasTime) {
      timerHTML = `<span class="done-time">${fmtTime(elapsed)}</span>`;
    }
    el.innerHTML = `
      <div class="drag-handle" ${todo.done?'style="opacity:0;pointer-events:none"':''}>
        <span></span><span></span><span></span>
      </div>
      <div class="checkbox">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#050507" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="todo-text">${escHtml(todo.text)}</span>
      ${timerHTML}
      <button class="remove-btn">&times;</button>`;
    el.addEventListener('click', (e) => {
      if (e.target.closest('.remove-btn') || e.target.closest('.drag-handle')
        || e.target.closest('.timer-play-btn') || e.target.closest('.timer-set-btn')) return;
      toggleTodo(todo.id);
    });
    el.querySelector('.remove-btn').addEventListener('click', (e) => { e.stopPropagation(); removeTodo(todo.id); });
    const setBtn = el.querySelector('.timer-set-btn');
    if (setBtn) {
      setBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isActive) return;
        pickerOpenId = showPicker ? null : todo.id; render();
      });
    }
    const playBtn = el.querySelector('.timer-play-btn');
    if (playBtn) { playBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleTimer(todo.id); }); }
    wrapper.appendChild(el);
    if (showPicker && !todo.done) {
      const picker = document.createElement('div');
      picker.className = 'timer-picker';
      const presets = [5,10,15,20,25,30,45,60];
      const curMins = hasCountdown ? Math.floor(todo.countdownSecs/60) : 0;
      picker.innerHTML = `
        <span class="timer-picker-label">Set</span>
        ${presets.map(m => `<button class="preset-btn ${curMins===m?'selected':''}">${m>=60?`${m/60}h`:`${m}m`}</button>`).join('')}
        ${hasCountdown ? '<button class="preset-cancel">Clear</button>' : '<button class="preset-cancel">Cancel</button>'}
        <div class="custom-time-row">
          <label>Custom</label>
          <input class="custom-time-input" type="number" min="0" max="999" placeholder="min" id="customMin_${todo.id}">
          <span class="custom-time-sep">:</span>
          <input class="custom-time-input" type="number" min="0" max="59" placeholder="sec" id="customSec_${todo.id}">
          <button class="custom-time-go">Set</button>
        </div>`;
      picker.querySelectorAll('.preset-btn').forEach((btn,i) => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); setCountdown(todo.id, presets[i]); });
      });
      picker.querySelector('.preset-cancel').addEventListener('click', (e) => {
        e.stopPropagation();
        if (hasCountdown) clearCountdown(todo.id);
        else { pickerOpenId = null; render(); }
      });
      // Custom time input
      const customGo = picker.querySelector('.custom-time-go');
      const customMin = picker.querySelector(`#customMin_${todo.id}`);
      const customSec = picker.querySelector(`#customSec_${todo.id}`);
      
      const applyCustom = () => {
        const mins = parseInt(customMin.value) || 0;
        const secs = parseInt(customSec.value) || 0;
        if (mins > 0 || secs > 0) setCountdown(todo.id, mins, secs);
      };
      
      customGo.addEventListener('click', (e) => { e.stopPropagation(); applyCustom(); });
      customMin.addEventListener('click', (e) => e.stopPropagation());
      customSec.addEventListener('click', (e) => e.stopPropagation());
      customMin.addEventListener('keydown', (e) => { e.stopPropagation(); if (e.key === 'Enter') applyCustom(); });
      customSec.addEventListener('keydown', (e) => { e.stopPropagation(); if (e.key === 'Enter') applyCustom(); });
      wrapper.appendChild(picker);
    }
    // Drag
    if (!todo.done) {
      el.addEventListener('dragstart', (e) => { dragSrcId = todo.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragSrcId = null; clearDragStyles(); });
      el.addEventListener('dragover', (e) => {
        e.preventDefault(); e.dataTransfer.dropEffect = 'move'; clearDragStyles();
        const rect = el.getBoundingClientRect();
        el.classList.add(e.clientY < rect.top + rect.height/2 ? 'drag-over-above' : 'drag-over-below');
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over-above','drag-over-below'));
      el.addEventListener('drop', (e) => {
        e.preventDefault(); clearDragStyles();
        if (!dragSrcId || dragSrcId === todo.id) return;
        const srcIdx = todos.findIndex(t => t.id === dragSrcId);
        if (srcIdx === -1) return;
        const [item] = todos.splice(srcIdx, 1);
        let insertAt = todos.findIndex(t => t.id === todo.id);
        if (insertAt === -1) insertAt = todos.length;
        const rect = el.getBoundingClientRect();
        if (e.clientY >= rect.top + rect.height/2) insertAt++;
        todos.splice(insertAt, 0, item);
        todos.forEach((t,i) => t.position = i);
        dragSrcId = null; render(); savePositions();
      });
    }
    return wrapper;
  }
  function clearDragStyles() {
    document.querySelectorAll('.drag-over-above,.drag-over-below').forEach(el =>
      el.classList.remove('drag-over-above','drag-over-below'));
  }
  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function handleAdd() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;
    addTodoItem(text); input.value = ''; input.focus();
  }
  // ---- Init ----
  updateClock(); updateHeader(); loadTodos();
  setInterval(updateClock, 60000);
  document.getElementById('addBtn').addEventListener('click', handleAdd);
  document.getElementById('todoInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAdd(); });
  document.getElementById('clearBtn').addEventListener('click', clearCompleted);
  document.getElementById('prevDay').addEventListener('click', () => shiftDate(-1));
  document.getElementById('nextDay').addEventListener('click', () => shiftDate(1));
  document.getElementById('todayBtn').addEventListener('click', goToday);
  document.getElementById('navTasks').addEventListener('click', () => switchView('tasks'));
  document.getElementById('navRecurring').addEventListener('click', () => switchView('recurring'));
  document.getElementById('navArchive').addEventListener('click', () => switchView('archive'));
</script>
</body>
</html>
