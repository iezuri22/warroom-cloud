<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Grocery — War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="/sync-client.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --surface:#131313;
  --surface-2:#1c1c1c;
  --surface-3:#262626;
  --border:#2a2a2a;
  --text:#f5f3ee;
  --text-mid:#a8a6a0;
  --text-dim:#6b6a66;
  --accent:#fce38a;
  --lime:#c2f970;
  --coral:#ff6b6b;
  --done:#4ade80;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;overscroll-behavior:none}
body{padding:24px 20px 120px;max-width:640px;margin:0 auto;min-height:100vh}
body.embed{padding:16px 16px 120px}

/* HEADER */
.hdr{margin-bottom:28px}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.title{
  font-family:'Instrument Serif',serif;font-size:52px;line-height:1;letter-spacing:-1.5px;font-weight:400;
  color:var(--text);margin-bottom:14px;
}
.title em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--accent)}
.stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.stat{
  font-size:11px;font-weight:700;color:var(--text-mid);letter-spacing:.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.stat .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.stat.done .dot{background:var(--done)}

/* ADD BAR */
.add{
  display:flex;gap:8px;margin-bottom:24px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
  padding:8px;align-items:center;
  transition:border-color .15s;
}
.add:focus-within{border-color:var(--accent)}
.add input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:16px;font-weight:500;color:var(--text);
  padding:10px 12px;
}
.add input::placeholder{color:var(--text-dim)}
.add button{
  background:var(--accent);color:#0a0a0a;border:none;cursor:pointer;
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  padding:12px 18px;border-radius:10px;transition:transform .1s;
}
.add button:active{transform:scale(.95)}

/* CATEGORY PILLS */
.cat-pills{
  display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;padding:8px 14px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);color:var(--text-mid);
  cursor:pointer;transition:all .15s;-webkit-appearance:none;
}
.cat-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.cat-pill:active{transform:scale(.96)}

/* LIST */
.list{display:flex;flex-direction:column;gap:22px}
.cat-group{display:flex;flex-direction:column;gap:4px}
.cat-header{
  display:flex;align-items:center;gap:10px;margin-bottom:6px;
}
.cat-header .label{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;
}
.cat-header .line{flex:1;height:1px;background:var(--border)}
.cat-header .count{
  font-size:11px;font-weight:700;color:var(--text-dim);
  background:var(--surface-2);padding:3px 9px;border-radius:10px;letter-spacing:.5px;
}

.item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  cursor:pointer;transition:all .15s;
  position:relative;
}
.item:active{transform:scale(.98)}
.item.done{opacity:.4}
.item.done .item-text{text-decoration:line-through;color:var(--text-dim)}

.check{
  width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;background:var(--surface-2);
}
.item.done .check{background:var(--done);border-color:var(--done)}
.check svg{width:14px;height:14px;color:var(--bg);opacity:0;transition:opacity .1s}
.item.done .check svg{opacity:1}

.item-text{
  flex:1;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;font-weight:600;color:var(--text);
  background:none;border:none;outline:none;padding:0;min-width:0;
  -webkit-appearance:none;
}
.item-qty{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:11px;font-weight:700;color:var(--accent);
  background:rgba(252,227,138,.12);padding:3px 8px;border-radius:6px;letter-spacing:.5px;
}

.item-del{
  background:none;border:none;cursor:pointer;color:var(--text-dim);
  padding:6px;border-radius:6px;opacity:.7;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.item-del:hover,.item-del:active{background:var(--surface-3);color:var(--coral);opacity:1}
.item-del svg{width:14px;height:14px}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 30px;
  background:var(--surface);border:1.5px dashed var(--border);border-radius:18px;
  margin-top:30px;
}
.empty .big{
  font-family:'Instrument Serif',serif;font-size:36px;line-height:1.1;letter-spacing:-1px;
  margin-bottom:10px;color:var(--text);
}
.empty .big em{font-style:italic;color:var(--accent)}
.empty .sub{font-size:14px;color:var(--text-mid);line-height:1.5}

/* FOOTER ACTIONS */
.actions{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:100;
  padding:0 16px;
}
.action-btn{
  background:var(--surface);border:1.5px solid var(--border);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:12px 18px;border-radius:24px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  transition:all .15s;
}
.action-btn:active{transform:scale(.95)}
.action-btn svg{width:14px;height:14px}
.action-btn.danger{color:var(--coral);border-color:rgba(255,107,107,.3)}
.action-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}

/* SUGGESTION CHIPS (category auto-detect hint) */
.suggest{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:-12px;margin-bottom:20px;
  padding:0 2px;
}
.suggest-chip{
  font-size:11px;font-weight:600;color:var(--text-dim);
  background:var(--surface-2);padding:5px 10px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);transition:all .15s;
}
.suggest-chip:active{transform:scale(.95);color:var(--accent);border-color:var(--accent)}

@media(max-width:500px){
  body{padding:16px 14px 120px}
  .title{font-size:38px}
  .eyebrow{font-size:9px;letter-spacing:2px}
  .add input{font-size:15px;padding:10px}
  .item{padding:12px 14px}
  .item-text{font-size:14px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="eyebrow">Shopping</div>
  <h1 class="title">Grocery <em>list</em></h1>
  <div class="stats">
    <div class="stat"><span class="dot"></span><span id="remainingCount">0 to buy</span></div>
    <div class="stat done"><span class="dot"></span><span id="doneCount">0 done</span></div>
  </div>
</div>

<form class="add" id="addForm" onsubmit="addItem(event)">
  <input type="text" id="addInput" placeholder="Add an item (e.g. 2 avocados, milk, chicken breast)" autocomplete="off">
  <button type="submit">Add</button>
</form>

<div class="suggest" id="suggestionChips"></div>

<div class="cat-pills" id="catPills">
  <button class="cat-pill active" onclick="filterCat('all')" data-cat="all">All</button>
</div>

<div class="list" id="list"></div>

<div class="actions">
  <button class="action-btn" onclick="shareList()" title="Share list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</button>
  <button class="action-btn danger" onclick="clearDone()" title="Clear done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Clear Done</button>
</div>

<script>
// Categories and their auto-detect keywords
const CATEGORIES = {
  produce:   { name:'Produce',   keywords:['apple','banana','orange','grape','berry','strawberr','blueberr','raspberr','lemon','lime','avocado','tomato','onion','garlic','potato','carrot','lettuce','spinach','kale','cucumber','pepper','broccoli','cauliflower','zucchini','squash','corn','mushroom','celery','ginger','cilantro','parsley','basil','mint','fruit','veggie','herb','salad','greens','kiwi','mango','pineapple','watermelon','pear','peach','plum','cherry'] },
  meat:      { name:'Meat & Fish', keywords:['chicken','beef','pork','lamb','turkey','bacon','sausage','ham','steak','fish','salmon','tuna','shrimp','crab','lobster','cod','tilapia','meat','ground','breast','thigh','wing','rib','chop'] },
  dairy:     { name:'Dairy & Eggs', keywords:['milk','egg','cheese','butter','yogurt','cream','sour cream','cottage','cheddar','mozzarella','parmesan','feta','greek yogurt','almond milk','oat milk','soy milk','half and half','buttermilk'] },
  pantry:    { name:'Pantry',    keywords:['bread','rice','pasta','noodle','flour','sugar','salt','pepper','spice','oil','vinegar','soy sauce','ketchup','mustard','mayo','honey','syrup','jam','peanut butter','cereal','oat','granola','tortilla','bean','lentil','quinoa','pasta sauce','tomato sauce','broth','stock','coffee','tea','chips','crackers','nuts','almond','peanut','cashew','walnut','dried'] },
  frozen:    { name:'Frozen',    keywords:['frozen','ice cream','pizza','fries','popsicle','sorbet'] },
  drinks:    { name:'Drinks',    keywords:['water','juice','soda','beer','wine','sparkling','seltzer','kombucha','gatorade','red bull','lacroix','coke','pepsi','sprite','lemonade'] },
  bakery:    { name:'Bakery',    keywords:['bagel','muffin','croissant','donut','pastry','cake','cookie','pie','brownie','scone','baguette','roll','bun'] },
  household: { name:'Household', keywords:['paper towel','toilet paper','tissue','detergent','soap','shampoo','conditioner','toothpaste','toothbrush','deodorant','razor','lotion','sunscreen','trash bag','zip lock','ziploc','foil','plastic wrap','dish soap','sponge','laundry','cleaner','bleach','diaper','wipes'] },
  other:     { name:'Other',     keywords:[] }
};

const CATEGORY_ORDER = ['produce','meat','dairy','bakery','pantry','frozen','drinks','household','other'];

const STORAGE_KEY = 'grocery-list-v1';

function loadItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let currentFilter = 'all';

function detectCategory(text) {
  const lower = text.toLowerCase();
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    if (cat.keywords.some(kw => lower.includes(kw))) return key;
  }
  return 'other';
}

function parseInput(raw) {
  const text = raw.trim();
  if (!text) return null;
  // Parse leading quantity: "2 avocados" -> qty: "2", text: "avocados"
  const match = text.match(/^(\d+(?:\.\d+)?(?:\s*(?:lb|lbs|oz|kg|g|pack|packs|dozen|doz|bag|bags|bottle|bottles|box|boxes|can|cans|bunch|bunches|gal|gallon|gallons|qt|quart|pt|pint))?)\s+(.+)$/i);
  let qty = '', itemText = text;
  if (match) {
    qty = match[1].trim();
    itemText = match[2].trim();
  }
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    text: itemText,
    qty,
    category: detectCategory(itemText),
    done: false,
    createdAt: new Date().toISOString()
  };
}

function addItem(ev) {
  if (ev) ev.preventDefault();
  const input = document.getElementById('addInput');
  const newItem = parseInput(input.value);
  if (!newItem) return;
  const items = loadItems();
  items.unshift(newItem);
  saveItems(items);
  input.value = '';
  render();
  updateSuggestions();
}

function toggleDone(id) {
  const items = loadItems();
  const item = items.find(i => i.id === id);
  if (item) {
    item.done = !item.done;
    saveItems(items);
    render();
  }
}

function deleteItem(id) {
  const items = loadItems().filter(i => i.id !== id);
  saveItems(items);
  render();
}

function clearDone() {
  const items = loadItems().filter(i => !i.done);
  saveItems(items);
  render();
}

function filterCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === cat);
  });
  render();
}

function shareList() {
  const items = loadItems().filter(i => !i.done);
  if (!items.length) { alert('Nothing to share — list is empty or all done.'); return; }
  const byCat = {};
  items.forEach(i => {
    if (!byCat[i.category]) byCat[i.category] = [];
    byCat[i.category].push(i);
  });
  let text = '🛒 Grocery List\n\n';
  CATEGORY_ORDER.forEach(cat => {
    if (byCat[cat] && byCat[cat].length) {
      text += CATEGORIES[cat].name.toUpperCase() + '\n';
      byCat[cat].forEach(i => {
        text += `• ${i.qty ? i.qty + ' ' : ''}${i.text}\n`;
      });
      text += '\n';
    }
  });
  if (navigator.share) {
    navigator.share({ title: 'Grocery List', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text);
    alert('List copied to clipboard');
  }
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render() {
  const items = loadItems();
  const remaining = items.filter(i => !i.done).length;
  const done = items.filter(i => i.done).length;
  document.getElementById('remainingCount').textContent = remaining === 1 ? '1 to buy' : remaining + ' to buy';
  document.getElementById('doneCount').textContent = done === 1 ? '1 done' : done + ' done';

  renderPills(items);

  let visible = items;
  if (currentFilter !== 'all') visible = items.filter(i => i.category === currentFilter);

  const list = document.getElementById('list');
  if (!visible.length) {
    if (!items.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="big">Nothing <em>yet</em>.</div>
          <div class="sub">Tap the input above and start adding things. Write "2 avocados" or "chicken breast" — it'll auto-sort them into categories.</div>
        </div>`;
    } else {
      list.innerHTML = `<div class="empty"><div class="big">No items <em>here</em>.</div><div class="sub">Try "All" to see everything.</div></div>`;
    }
    return;
  }

  // Group by category
  const byCat = {};
  visible.forEach(i => {
    if (!byCat[i.category]) byCat[i.category] = [];
    byCat[i.category].push(i);
  });

  // Sort: pending items before done items within each category
  Object.values(byCat).forEach(arr => arr.sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0)));

  let html = '';
  CATEGORY_ORDER.forEach(cat => {
    if (!byCat[cat] || !byCat[cat].length) return;
    html += `
      <div class="cat-group">
        <div class="cat-header">
          <span class="label">${CATEGORIES[cat].name}</span>
          <div class="line"></div>
          <span class="count">${byCat[cat].length}</span>
        </div>`;
    byCat[cat].forEach(i => {
      html += `
        <div class="item ${i.done ? 'done' : ''}" onclick="toggleDone('${i.id}')">
          <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="item-text">${escapeHTML(i.text)}</div>
          ${i.qty ? `<div class="item-qty">${escapeHTML(i.qty)}</div>` : ''}
          <button class="item-del" onclick="event.stopPropagation();deleteItem('${i.id}')" aria-label="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>`;
    });
    html += `</div>`;
  });
  list.innerHTML = html;
}

function renderPills(items) {
  const pills = document.getElementById('catPills');
  const present = new Set(items.map(i => i.category));
  let html = `<button class="cat-pill ${currentFilter === 'all' ? 'active' : ''}" onclick="filterCat('all')" data-cat="all">All</button>`;
  CATEGORY_ORDER.forEach(cat => {
    if (present.has(cat)) {
      html += `<button class="cat-pill ${currentFilter === cat ? 'active' : ''}" onclick="filterCat('${cat}')" data-cat="${cat}">${CATEGORIES[cat].name}</button>`;
    }
  });
  pills.innerHTML = html;
}

function updateSuggestions() {
  // Show recent unique items as quick-add suggestions
  const container = document.getElementById('suggestionChips');
  const items = loadItems();
  const frequent = {};
  items.forEach(i => {
    const key = i.text.toLowerCase();
    frequent[key] = (frequent[key] || 0) + 1;
  });
  const top = Object.entries(frequent)
    .sort(([, a], [, b]) => b - a)
    .slice(0, 5)
    .map(([text]) => text);
  if (!top.length) { container.innerHTML = ''; return; }
  container.innerHTML = top.map(t => `<button class="suggest-chip" onclick="quickAdd('${t.replace(/'/g, "\\'")}')">+ ${escapeHTML(t)}</button>`).join('');
}

function quickAdd(text) {
  const input = document.getElementById('addInput');
  input.value = text;
  input.focus();
}

// Cross-tab sync
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) render();
});

// Embed mode
if (new URLSearchParams(location.search).has('embed')) document.body.classList.add('embed');

render();
updateSuggestions();
</script>
</body>
</html>
