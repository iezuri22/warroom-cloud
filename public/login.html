<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>War Room — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:#f4f3f0;color:#1a1a1a;
  display:flex;align-items:center;justify-content:center;padding:24px;
  min-height:100vh;
}
.box{
  width:100%;max-width:340px;
  background:#fff;border:1px solid #e5e3dc;border-radius:20px;
  padding:36px 28px;box-shadow:0 20px 60px rgba(0,0,0,.08);
}
.brand{font-size:11px;font-weight:800;letter-spacing:2px;color:#6b6a66;text-transform:uppercase;margin-bottom:8px}
h1{font-size:26px;font-weight:900;margin-bottom:6px;letter-spacing:-.02em}
.sub{font-size:13px;color:#6b6a66;margin-bottom:24px}
label{font-size:11px;font-weight:700;color:#6b6a66;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
input[type="password"]{
  width:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:16px;font-weight:500;
  padding:14px 16px;border:1.5px solid #e5e3dc;border-radius:10px;
  background:#fafaf7;color:#1a1a1a;outline:none;transition:all .15s;
}
input[type="password"]:focus{border-color:#1a1a1a;background:#fff}
.btn{
  width:100%;margin-top:16px;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;font-weight:700;
  padding:14px;border-radius:10px;border:none;cursor:pointer;
  background:#1a1a1a;color:#fff;transition:all .15s;
}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{
  margin-top:14px;padding:10px 12px;border-radius:8px;
  background:rgba(220,38,38,.08);color:#dc2626;font-size:12px;font-weight:600;
  display:none;
}
.err.show{display:block}
.foot{margin-top:20px;text-align:center;font-size:10px;color:#a8a6a0;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
</style>
</head>
<body>
<div class="box">
  <div class="brand">Personal OS</div>
  <h1>War Room</h1>
  <div class="sub">Enter your password to access your planner.</div>
  <form id="loginForm">
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" required autofocus>
    <button class="btn" type="submit" id="submitBtn">Sign In</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">Synced via Neon</div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const next = params.get('next') || '/daily-planner.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('err');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value })
    });
    if (res.ok) {
      window.location.href = next;
    } else {
      const data = await res.json().catch(() => ({}));
      err.textContent = data.error || 'Wrong password';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (ex) {
    err.textContent = 'Network error. Try again.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

// Auto-redirect if already logged in
fetch('/api/me', { credentials: 'same-origin' })
  .then(r => r.ok && (window.location.href = next))
  .catch(() => {});
</script>
</body>
</html>
