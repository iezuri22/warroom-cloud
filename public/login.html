<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F1E8">
<title>War Room — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
:root{
  /* Apple paper (warm beige) */
  --ios-bg:#F5F1E8;
  --ios-surface:#FFFFFF;
  --ios-surface-2:#EDE7D7;
  --ios-fill:rgba(120,120,128,0.14);
  --ios-fill-2:rgba(120,120,128,0.08);
  --ios-separator:rgba(60,60,67,0.14);
  --ios-label:#1C1C1E;
  --ios-label-2:rgba(60,60,67,0.65);
  --ios-label-3:rgba(60,60,67,0.38);
  --ios-blue:#007AFF;
  --ios-red:#C93030;
  --ios-font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
}
body{
  font-family:var(--ios-font);
  background:var(--ios-bg);color:var(--ios-label);
  display:flex;align-items:center;justify-content:center;padding:20px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.01em;
}
.wrap{width:100%;max-width:380px}
.logo{
  width:64px;height:64px;margin:0 auto 24px;
  background:linear-gradient(180deg,#007AFF 0%,#0051D5 100%);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 28px rgba(0,122,255,0.22),inset 0 1px 0 rgba(255,255,255,0.25);
}
.logo svg{width:32px;height:32px;color:#fff}
.brand{
  font-size:13px;font-weight:600;color:var(--ios-label-2);
  text-align:center;margin-bottom:6px;letter-spacing:-0.08px;
}
h1{
  font-size:34px;font-weight:700;letter-spacing:-0.4px;
  text-align:center;margin-bottom:8px;line-height:1.12;
}
.sub{
  font-size:15px;color:var(--ios-label-2);text-align:center;
  margin-bottom:28px;line-height:1.35;letter-spacing:-0.24px;
}
.card{
  background:var(--ios-surface);border-radius:14px;
  padding:4px 16px;margin-bottom:16px;
}
.field{
  display:flex;align-items:center;padding:14px 0;
  border-bottom:0.5px solid var(--ios-separator);
}
.field:last-child{border-bottom:none}
.field label{
  font-size:17px;font-weight:400;color:var(--ios-label);
  width:96px;flex-shrink:0;letter-spacing:-0.4px;
}
.field input{
  flex:1;font-family:var(--ios-font);font-size:17px;font-weight:400;
  border:none;background:transparent;color:var(--ios-label);
  outline:none;padding:0;letter-spacing:-0.4px;
}
.field input::placeholder{color:var(--ios-label-3)}
.btn{
  width:100%;font-family:var(--ios-font);font-size:17px;font-weight:600;
  padding:14px;border-radius:14px;border:none;cursor:pointer;
  background:var(--ios-blue);color:#fff;
  transition:opacity .15s,transform .1s;
  letter-spacing:-0.4px;
  box-shadow:0 1px 3px rgba(0,122,255,0.2);
}
.btn:hover{opacity:.92}
.btn:active{transform:scale(0.98);opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.err{
  margin-top:14px;padding:12px 14px;border-radius:12px;
  background:rgba(255,59,48,0.1);color:var(--ios-red);
  font-size:14px;font-weight:500;text-align:center;
  display:none;letter-spacing:-0.2px;
}
.err.show{display:block}
.foot{
  margin-top:24px;text-align:center;font-size:12px;
  color:var(--ios-label-3);letter-spacing:-0.08px;font-weight:400;
}
@media (prefers-color-scheme: dark) {
  /* Stay light per user preference */
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 L3 7 L3 12 C3 17 7 21 12 22 C17 21 21 17 21 12 L21 7 Z"/>
    </svg>
  </div>
  <div class="brand">Personal OS</div>
  <h1>War Room</h1>
  <div class="sub">Sign in to access your planner.</div>
  <form id="loginForm">
    <div class="card">
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" placeholder="Required" required autofocus>
      </div>
    </div>
    <button class="btn" type="submit" id="submitBtn">Sign In</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">Synced via Neon</div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const next = params.get('next') || '/daily-planner.html';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('err');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value })
    });
    if (res.ok) {
      window.location.href = next;
    } else {
      const data = await res.json().catch(() => ({}));
      err.textContent = data.error || 'Wrong password';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (ex) {
    err.textContent = 'Network error. Try again.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

// Auto-redirect if already logged in
fetch('/api/me', { credentials: 'same-origin' })
  .then(r => r.ok && (window.location.href = next))
  .catch(() => {});
</script>
</body>
</html>
